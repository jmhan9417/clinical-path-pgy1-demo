<!DOCTYPE html>
<!-- clinical-path cast-v1: Harlin, Belle Deans, Joey Han + real hospital bg -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Clinical Path — PGY-1 with Dr. Harlin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#3a2e4a; --pink:#ff7fa8; --pink2:#ff9db8; --rose:#ffdfe9;
    --teal:#2bb7a8; --sky:#5cb8ff; --lav:#b28bff; --peach:#ffb36b;
    --gold:#ffd166;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:"Nunito","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    color:var(--ink);background:#12101a;overflow:hidden;user-select:none;-webkit-tap-highlight-color:transparent}
  .display{font-family:"Jua",sans-serif}
  #app{position:relative;width:100vw;height:100vh;overflow:hidden}

  /* ---------- backgrounds ---------- */
  .stage{position:absolute;inset:0;transition:background .6s ease}
  .bg-title{background:radial-gradient(120% 90% at 50% 0%,#ffd7e6 0%,#c9b8ff 45%,#8fb8ff 100%)}
  .bg-core{background:linear-gradient(160deg,#fff1f6,#ffe0ec 55%,#ffd0e2)}
  .bg-R1{background:linear-gradient(160deg,#e7fbf6,#c8f5ec 55%,#a7ecdf)}
  .bg-R2{background:linear-gradient(160deg,#eaf4ff,#cfe6ff 55%,#b3d6ff)}
  .bg-R3{background:linear-gradient(160deg,#f3ecff,#e3d4ff 55%,#d3bcff)}
  .bg-R4{background:linear-gradient(160deg,#fff4e6,#ffe6c9 55%,#ffd7a8)}
  /* floating bokeh */
  .bokeh{position:absolute;border-radius:50%;background:rgba(255,255,255,.5);filter:blur(2px);
    animation:float 9s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-22px)}}

  /* ---------- HUD ---------- */
  .hud{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:10px;
    padding:14px 18px;z-index:20}
  .hud .area-pill{background:rgba(255,255,255,.75);backdrop-filter:blur(6px);border-radius:20px;
    padding:6px 15px;font-weight:800;font-size:13px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
  .hud .spacer{flex:1}
  .bond{background:rgba(255,255,255,.75);backdrop-filter:blur(6px);border-radius:20px;padding:6px 14px;
    display:flex;align-items:center;gap:8px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
  .bond .lbl{font-size:12px;font-weight:800;color:var(--pink)}
  .bond .hbar{width:78px;height:9px;background:#ffdfe9;border-radius:9px;overflow:hidden}
  .bond .hbar i{display:block;height:100%;background:linear-gradient(90deg,#ff9db8,#ff5f92);transition:width .5s}
  .menu-btn{background:rgba(255,255,255,.75);backdrop-filter:blur(6px);border:none;border-radius:14px;
    width:38px;height:38px;font-size:16px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.08)}

  /* ---------- character ---------- */
  .char-layer{position:absolute;left:50%;bottom:112px;transform:translateX(-50%);
    height:78vh;max-height:740px;z-index:8;animation:breathe 4.5s ease-in-out infinite;
    filter:drop-shadow(0 22px 30px rgba(90,50,90,.3));pointer-events:none}
  @keyframes breathe{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-10px)}}
  .char-layer svg{height:100%}
  .char-layer img{height:100%;width:auto;object-fit:contain;filter:drop-shadow(0 20px 26px rgba(15,25,40,.55))}
  .stage.scene-photo{background-size:cover;background-position:center;background-repeat:no-repeat}
  .scene-tint{position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(10,22,40,.30),rgba(10,22,40,.10) 42%,rgba(10,20,38,.42))}
  .scene-vig{position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 240px rgba(6,14,26,.6)}
  .scene-dim{position:absolute;left:0;right:0;bottom:0;height:46%;pointer-events:none;background:linear-gradient(180deg,rgba(6,14,26,0),rgba(6,14,26,.6))}
  .char-pop{animation:pop .5s cubic-bezier(.3,1.4,.5,1)}
  @keyframes pop{0%{transform:translateX(-50%) scale(.8);opacity:0}100%{transform:translateX(-50%) scale(1);opacity:1}}

  /* sparkles / hearts on praise */
  .fx{position:absolute;inset:0;z-index:9;pointer-events:none;overflow:hidden}
  .fx .p{position:absolute;font-size:26px;animation:rise 1.4s ease-out forwards;opacity:0}
  @keyframes rise{0%{transform:translateY(20px) scale(.5);opacity:0}
    25%{opacity:1}100%{transform:translateY(-160px) scale(1.15);opacity:0}}

  /* ---------- VN dialogue box ---------- */
  .vn-wrap{position:absolute;left:0;right:0;bottom:0;z-index:15;padding:0 16px 18px}
  .vn-name{display:inline-block;background:linear-gradient(120deg,#ff7fa8,#ff4f86);color:#fff;
    font-family:"Jua",sans-serif;font-size:19px;padding:7px 26px;border-radius:18px 18px 4px 0;
    margin-left:26px;box-shadow:0 -2px 12px rgba(255,79,134,.35);position:relative;z-index:2}
  .vn-box{background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(255,244,249,.97));
    backdrop-filter:blur(12px);border:3px solid rgba(255,150,185,.9);
    border-radius:8px 22px 22px 22px;padding:20px 28px 22px;min-height:128px;max-width:960px;margin:0 auto;
    box-shadow:0 18px 46px rgba(120,50,90,.32),inset 0 2px 0 rgba(255,255,255,.7);position:relative;cursor:pointer}
  .vn-box.nameless{border-radius:22px}
  .vn-text{font-size:19px;line-height:1.6;font-weight:700;color:#4a3540;min-height:52px}
  .vn-ctrl{position:absolute;top:-15px;right:22px;display:flex;gap:6px}
  .vn-ctrl span{font-family:"Jua";font-size:11px;color:#fff;background:rgba(140,90,120,.6);
    padding:3px 13px;border-radius:12px;letter-spacing:1px;box-shadow:0 3px 8px rgba(0,0,0,.12)}
  .char-glow{position:absolute;left:50%;top:8%;width:74vh;height:74vh;transform:translateX(-50%);
    background:radial-gradient(circle,rgba(255,255,255,.6),rgba(255,255,255,0) 60%);z-index:6;pointer-events:none}
  .scene-floor{position:absolute;left:0;right:0;bottom:0;height:30%;
    background:linear-gradient(180deg,rgba(255,255,255,0),rgba(255,255,255,.3));pointer-events:none}
  .scene-beam{position:absolute;left:-4%;top:0;width:46%;height:120%;pointer-events:none;
    background:linear-gradient(118deg,rgba(255,255,255,.5),rgba(255,255,255,0) 42%);transform:rotate(6deg);transform-origin:top left}
  .scene-win{position:absolute;left:5%;top:12%;width:180px;height:132px;border-radius:14px;pointer-events:none;
    background:linear-gradient(160deg,rgba(255,255,255,.55),rgba(180,220,255,.35));
    border:7px solid rgba(255,255,255,.6);box-shadow:0 10px 34px rgba(255,255,255,.4)}
  .scene-win i{position:absolute;left:50%;top:0;bottom:0;width:5px;background:rgba(255,255,255,.6);transform:translateX(-50%)}
  .scene-win b{position:absolute;top:50%;left:0;right:0;height:5px;background:rgba(255,255,255,.6);transform:translateY(-50%)}
  .vn-note{margin-top:11px;background:#f4f0ff;border-left:4px solid var(--lav);border-radius:10px;
    padding:10px 13px;font-size:13.5px;line-height:1.5;font-weight:600;color:#4a3d63;cursor:default}
  .vn-note b{color:#2a2140}
  .adv{position:absolute;right:18px;bottom:12px;font-size:14px;color:var(--pink);animation:blink 1s infinite}
  @keyframes blink{0%,100%{opacity:.25}50%{opacity:1}}

  /* choices */
  .vn-choices{max-width:900px;margin:0 auto}
  .choices{max-width:760px;margin:0 auto 12px;display:flex;flex-direction:column;gap:10px}
  .choice{background:rgba(255,255,255,.96);border:2.5px solid #ffd0e0;border-radius:16px;
    padding:13px 18px;font-size:15px;font-weight:700;cursor:pointer;text-align:left;
    box-shadow:0 6px 18px rgba(90,50,90,.14);transition:.14s}
  .choice:hover{border-color:var(--pink);background:#fff4f8;transform:translateX(4px)}
  .choice:disabled{cursor:default;opacity:.65}
  .choice.correct{border-color:var(--teal);background:#dff9f3}
  .choice.wrong{border-color:#ff6b8a;background:#ffe4ea}
  .choice .k{color:var(--pink);font-family:"Jua";margin-right:8px}

  /* order UI */
  .ord-dst{max-width:760px;margin:0 auto 8px;min-height:46px;background:rgba(255,255,255,.85);
    border:2.5px dashed #ffc4d8;border-radius:16px;padding:8px;display:flex;flex-wrap:wrap;gap:7px}
  .ord-src{max-width:760px;margin:0 auto 10px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  .oitem{background:#fff;border:2.5px solid #ffd0e0;border-radius:13px;padding:9px 14px;font-size:14px;
    font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(90,50,90,.12)}
  .oitem:hover{border-color:var(--pink);background:#fff4f8}
  .oitem.placed{opacity:.45;cursor:default}
  .oitem .idx{color:var(--pink);font-family:"Jua";margin-right:5px}
  .ord-btns{max-width:760px;margin:0 auto 10px;display:flex;gap:9px;justify-content:center}

  /* generic pretty button */
  .btn{background:linear-gradient(120deg,#ff7fa8,#ff5f92);color:#fff;border:none;border-radius:16px;
    padding:12px 26px;font-family:"Jua";font-size:17px;cursor:pointer;box-shadow:0 8px 20px rgba(255,95,146,.35);
    transition:.14s}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(255,95,146,.45)}
  .btn.mint{background:linear-gradient(120deg,#3fd0bf,#22a897);box-shadow:0 8px 20px rgba(43,183,168,.35)}
  .btn.ghost{background:#fff;color:var(--pink);border:2.5px solid #ffd0e0;box-shadow:0 6px 16px rgba(90,50,90,.12)}
  .btn.sm{padding:9px 18px;font-size:14px}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

  /* ---------- overlays: title / hub / notes / ending ---------- */
  .center-layer{position:absolute;inset:0;z-index:16;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:24px}
  .logo{font-family:"Jua";line-height:1.15}
  .logo .big{display:block;font-size:min(9.5vw,60px);color:#c23b6b;text-shadow:0 3px 0 #fff,0 6px 16px rgba(150,60,110,.25)}
  .logo .small{display:block;font-size:min(4.6vw,21px);color:#7a4d8f;margin-top:8px;font-weight:800}
  .title-plate{background:rgba(255,255,255,.55);backdrop-filter:blur(8px);border:3px solid rgba(255,255,255,.8);
    border-radius:26px;padding:20px 34px;box-shadow:0 16px 40px rgba(120,70,130,.22)}
  .heart-input{margin-top:26px;display:flex;flex-direction:column;align-items:center;gap:12px}
  .heart-input input{font-family:"Nunito";font-weight:700;padding:12px 18px;border:3px solid #fff;
    border-radius:16px;font-size:16px;width:min(76vw,300px);text-align:center;outline:none;
    box-shadow:0 8px 20px rgba(90,50,90,.2)}
  .avatars{display:flex;gap:10px;margin:6px 0}
  .av{width:52px;height:52px;border-radius:14px;border:3px solid #fff;background:rgba(255,255,255,.7);
    font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .av.sel{border-color:var(--pink);background:#fff;transform:scale(1.08)}

  /* hub / rotation select */
  .hub-panel{background:rgba(255,255,255,.82);backdrop-filter:blur(10px);border-radius:26px;
    padding:20px 22px;max-width:940px;width:100%;box-shadow:0 20px 50px rgba(90,50,90,.28);
    max-height:86vh;overflow:auto}
  .hub-panel h2{font-family:"Jua";font-size:24px;margin:2px 0 4px;color:#c23b6b;text-align:center}
  .hub-sub{text-align:center;font-size:13px;color:#8a6f82;font-weight:700;margin-bottom:14px}
  .comp-row{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:16px}
  @media(max-width:640px){.comp-row{grid-template-columns:1fr 1fr}}
  .compb{background:#fff;border-radius:14px;padding:9px 12px;box-shadow:0 6px 16px rgba(90,50,90,.1)}
  .compb .k{font-family:"Jua";font-size:12px}
  .compb .n{font-size:11px;color:#8a6f82;font-weight:700;margin-bottom:6px}
  .compb .b{height:8px;background:#efe7f5;border-radius:8px;overflow:hidden}
  .compb .b i{display:block;height:100%;transition:width .5s}
  .mcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
  .mc{background:#fff;border-radius:18px;overflow:hidden;cursor:pointer;position:relative;
    box-shadow:0 8px 20px rgba(90,50,90,.14);transition:.15s;border:2.5px solid transparent}
  .mc:hover{transform:translateY(-3px);box-shadow:0 14px 28px rgba(90,50,90,.2)}
  .mc .top{height:64px;display:flex;align-items:center;justify-content:center;font-size:30px}
  .mc .bd{padding:11px 13px 13px}
  .mc .t{font-family:"Jua";font-size:15px;line-height:1.25}
  .mc .bl{font-size:11.5px;color:#8a6f82;font-weight:700;line-height:1.4;margin-top:4px;min-height:32px}
  .mc .f{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
  .mc .cpill{font-family:"Jua";font-size:10px;color:#fff;padding:3px 9px;border-radius:20px}
  .mc .prog{font-size:11px;font-weight:800;color:#b58aa6}
  .mc .heart{position:absolute;top:9px;right:10px;font-size:18px;display:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}
  .mc.done .heart{display:block}
  .mc.done{border-color:#ffbcd2}

  /* notes overlay */
  .notes-ov{position:absolute;inset:0;z-index:40;background:rgba(58,46,74,.55);display:flex;
    align-items:center;justify-content:center;padding:20px}
  .notes-card{background:#fff;border-radius:22px;max-width:760px;width:100%;max-height:84vh;overflow:auto;
    padding:22px 26px;box-shadow:0 24px 60px rgba(0,0,0,.4)}
  .notes-card h3{font-family:"Jua";color:#c23b6b}
  .brief{font-size:14px;line-height:1.6}
  .brief .lead{color:#4a3d63}
  .brief h3{font-size:16px;margin:18px 0 7px;padding-bottom:5px;border-bottom:2px solid #f4eef8;color:#7a4d8f}
  .brief h4{font-size:13px;margin:12px 0 4px;color:#8a6f82}
  .brief ul,.brief ol{margin:5px 0;padding-left:20px}
  .brief li{margin:3px 0}
  .brief b{color:#3a2e4a}
  .callout{border-radius:12px;padding:11px 14px;margin:10px 0;font-size:13px;line-height:1.5}
  .callout.info{background:#eaf4ff;border-left:4px solid var(--sky)}
  .callout.warn{background:#ffe9ee;border-left:4px solid #ff6b8a}
  .callout.pearl{background:#fff6e0;border-left:4px solid var(--peach)}
  .callout b{display:block;margin-bottom:2px}
  .rolegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:9px;margin:10px 0}
  .rolebox{border:1.5px solid #f0e6f5;border-radius:12px;padding:10px 12px;background:#fffafd}
  .rolebox .num{font-family:"Jua";font-size:11px;color:var(--peach)}
  .rolebox .rt{font-family:"Jua";font-size:14px;margin:2px 0 3px}
  .rolebox .rd{font-size:11.5px;color:#8a6f82;line-height:1.4}
  table.ref{width:100%;border-collapse:collapse;margin:10px 0;font-size:12.5px}
  table.ref th,table.ref td{border:1px solid #f0e6f5;padding:7px 9px;text-align:left;vertical-align:top}
  table.ref th{background:#faf5fe;font-family:"Jua";font-weight:400}
  .duty{display:grid;grid-template-columns:1fr 1fr;gap:5px 14px;margin:7px 0}
  @media(max-width:560px){.duty{grid-template-columns:1fr}}
  .duty div{font-size:12.5px;padding-left:16px;position:relative}
  .duty div:before{content:"";position:absolute;left:0;font-size:9px}

  .hosp{position:absolute;inset:0;width:100%;height:100%;z-index:0;opacity:.92;pointer-events:none}
  .char-glow{z-index:2}
  .hidden{display:none!important}

  /* ending */
  .ending-card{background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-radius:26px;
    padding:28px 26px;max-width:520px;width:100%;box-shadow:0 24px 60px rgba(90,50,90,.3);text-align:center}
  .ending-card .medal{font-size:60px}
  .ending-card h2{font-family:"Jua";font-size:26px;color:#c23b6b;margin:6px 0}
  .ending-card .rk{font-size:14px;color:#6b5a78;font-weight:700;line-height:1.55;margin-bottom:14px}
  .sgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
  .sgrid div{background:#fff6fa;border-radius:11px;padding:8px 12px;font-size:12.5px;font-weight:700;
    display:flex;justify-content:space-between}
  .sgrid b{font-family:"Jua";color:var(--pink)}
</style>
</head>
<body>
<div id="app">
  <div class="stage bg-title" id="stage"></div>
  <div class="fx" id="fx"></div>
</div>

<script>
/* ==================================================================
   CHARACTER — hand-drawn SVG"Dr. Harlin" with swappable expressions
   ================================================================== */
const SPRITE_URLS={"harlin":{"neutral":"https://d8j0ntlcm91z4.cloudfront.net/user_3F1GKFSOo29K70AThgRl3A2spWr/hf_20260706_053906_9c5e2aac-da01-4f96-9775-12df64c5ddd0.png","happy":"https://d8j0ntlcm91z4.cloudfront.net/user_3F1GKFSOo29K70AThgRl3A2spWr/hf_20260706_053847_72f7598c-c336-4a95-b8d9-9ab50597c522.png","think":"https://d8j0ntlcm91z4.cloudfront.net/user_3F1GKFSOo29K70AThgRl3A2spWr/hf_20260706_053915_0f71b42e-fc48-43a5-a1bb-836afb7792ee.png","worry":"https://d8j0ntlcm91z4.cloudfront.net/user_3F1GKFSOo29K70AThgRl3A2spWr/hf_20260706_053922_483a2e6e-a12d-439f-8c32-e3c8294c5258.png","proud":"https://d8j0ntlcm91z4.cloudfront.net/user_3F1GKFSOo29K70AThgRl3A2spWr/hf_20260706_053934_7b42370a-fc62-4ebd-8412-bf5a039ed757.png","wink":"https://d8j0ntlcm91z4.cloudfront.net/user_3F1GKFSOo29K70AThgRl3A2spWr/hf_20260706_053858_42cf4308-bd4a-4bf0-bb26-b0d058614aad.png"},"belle":{"neutral":"https://d8j0ntlcm91z4.cloudfront.net/user_3F1GKFSOo29K70AThgRl3A2spWr/hf_20260706_055305_48d0dd62-95fb-4c48-bbd7-bc2445b21a7d.png","proud":"https://d8j0ntlcm91z4.cloudfront.net/user_3F1GKFSOo29K70AThgRl3A2spWr/hf_20260706_055320_7278a0d4-7fd7-4abc-b602-d36fb58b29ba.png"},"joey":{"neutral":"https://d8j0ntlcm91z4.cloudfront.net/user_3F1GKFSOo29K70AThgRl3A2spWr/hf_20260706_055331_f6f753bc-13c1-44c6-b449-a666a9692c80.png","happy":"https://d8j0ntlcm91z4.cloudfront.net/user_3F1GKFSOo29K70AThgRl3A2spWr/hf_20260706_055349_6bd8adc3-faf7-49e2-ac65-9d72b9a1638a.png"}};
const BG_URLS={"core":"https://images.unsplash.com/photo-1551076805-e1869033e561?w=1600&q=80","R1":"https://images.unsplash.com/photo-1538108149393-fbbd81895907?w=1600&q=80","R2":"https://images.unsplash.com/photo-1551076805-e1869033e561?w=1600&q=80","R3":"https://images.unsplash.com/photo-1516549655169-df83a0774514?w=1600&q=80","R4":"https://images.unsplash.com/photo-1538108149393-fbbd81895907?w=1600&q=80"};
function faceImg(expr, who){
  who = who||'harlin';
  var SETS={
    harlin:{dir:'assets/harlin/harlin_', has:['neutral','happy','think','worry','proud','wink'], alias:{smile:'neutral'}},
    belle:{dir:'assets/belle/belle_', has:['neutral','proud'], alias:{happy:'proud',smile:'neutral',think:'neutral',worry:'neutral',wink:'proud'}},
    joey:{dir:'assets/joey/joey_', has:['neutral','happy'], alias:{proud:'happy',smile:'neutral',think:'neutral',worry:'neutral',wink:'happy'}}
  };
  var s=SETS[who]||SETS.harlin; var e=expr; if(s.alias&&s.alias[e])e=s.alias[e]; if(s.has.indexOf(e)<0)e='neutral';
  var url=(SPRITE_URLS[who]&&SPRITE_URLS[who][e])||SPRITE_URLS.harlin.neutral;
  return '<img src="'+url+'" alt="'+who+'" draggable="false">';
}
function face(expr, who){ return faceImg(expr, who);
  const P={
    smile:{L:"open",R:"open",m:"smile",b:"soft",bl:0},
    happy:{L:"happy",R:"happy",m:"grin",b:"soft",bl:1},
    think:{L:"half",R:"half",m:"small",b:"up",bl:0},
    worry:{L:"open",R:"open",m:"frown",b:"worry",bl:0},

var VNTYPE={timer:null,full:'',el:null,done:true,onBox:null};
function typeHTML(el,html){ if(!el)return; el.innerHTML=''; VNTYPE.full=html; VNTYPE.el=el; VNTYPE.done=false;
  clearInterval(VNTYPE.timer); var i=0;
  VNTYPE.timer=setInterval(function(){ if(i>=html.length){clearInterval(VNTYPE.timer);VNTYPE.done=true;return;}
    if(html[i]==='<'){var j=html.indexOf('>',i); el.innerHTML=html.slice(0,j+1); i=j+1;}
    else{i++; el.innerHTML=html.slice(0,i);} },15); }
function finishType(){ if(VNTYPE.el){clearInterval(VNTYPE.timer);VNTYPE.el.innerHTML=VNTYPE.full;VNTYPE.done=true;} }
function vnClick(){ if(!VNTYPE.done){finishType();return;} if(VNTYPE.onBox){ try{(new Function(VNTYPE.onBox))();}catch(e){console.log(e);} } }

   <div class="callout warn"><b>NTI drugs demand respect</b>
     Vancomycin, warfarin, phenytoin, digoxin, cyclosporine, tacrolimus, carbamazepine, lithium, theophylline —
     small changes can tip from ineffective to toxic. Always double-check.</div>

 {
  id:"safety", icon:"05", area:"R1", title:"Medication Safety & Stewardship",
  blurb:"ADRs, interactions, error prevention, and antimicrobial stewardship.",
  brief:`
   <p class="lead">You are the safety net of the medication-use system: detect, mitigate, and prevent adverse
   drug events, and steward antimicrobials to protect patients and the community.</p>
   <h3>Beyond the"5 rights"</h3>
   <p>Right patient, drug, dose, route, time — plus verify <b>indication, duration, and monitoring</b>. Most
   errors hide in the last three.</p>
   <h4>High-alert med vigilance</h4>
   <ul>
     <li><b>Anticoagulants</b> — dosing, renal function, interactions, reversal readiness.</li>
     <li><b>Insulin &amp; hypoglycemics</b> — basal/bolus vs sliding scale, renal dosing.</li>
     <li><b>Opioids &amp; sedatives</b> — start low/go slow, avoid stacking, watch respiratory depression.</li>
     <li><b>QT-prolonging combos</b> — ondansetron + haloperidol + methadone + azithromycin stack risk.</li>
   </ul>
   <h3>Antimicrobial stewardship</h3>
   <ul>
     <li>In sepsis, give appropriate <b>broad-spectrum antibiotics early</b>; time-to-antibiotics matters.</li>
     <li><b>De-escalate</b> to the narrowest effective agent once cultures return.</li>
     <li>Convert <b>IV → PO</b> when the patient can absorb.</li>
     <li>Set a <b>stop date / duration</b>; a negative MRSA nares can support stopping vancomycin.</li>
   </ul>
   <div class="callout warn"><b>Serotonin syndrome flag</b>

  brief:`
   <p class="lead">Clinical pharmacists respond to codes: preparing/verifying emergency drugs, advising on doses,

   <h3>Cardiac arrest (ACLS essentials)</h3>
   <ul>
     <li><b>Epinephrine</b> 1 mg IV/IO every 3–5 minutes throughout the arrest.</li>
     <li><b>Shockable rhythms (VF/pulseless VT):</b> defibrillate + CPR; <b>amiodarone</b> 300 mg IV, then 150 mg (or lidocaine).</li>
     <li>Treat reversible causes (the Hs &amp; Ts).</li>
   </ul>
   <h3>Severe hyperkalemia (K⁺ with ECG changes)</h3>
   <table class="ref">
     <tr><th>Step</th><th>Agent</th><th>Why</th></tr>
     <tr><td>1. Stabilize</td><td>IV calcium gluconate/chloride</td><td>Protects the myocardium (does not lower K⁺)</td></tr>
     <tr><td>2. Shift</td><td>Insulin + dextrose, albuterol, ± bicarb</td><td>Drives K⁺ intracellularly</td></tr>
     <tr><td>3. Eliminate</td><td>Diuretics, GI binders, dialysis</td><td>Removes K⁺ from the body</td></tr>
   </table>
   <div class="callout warn"><b>Anaphylaxis</b>
     First-line is <b>IM epinephrine</b> (0.3–0.5 mg of 1 mg/mL) into the anterolateral thigh. Antihistamines and
     steroids are adjuncts, never the primary treatment.</div>
  `,

 {
  id:"jclub", icon:"07", area:"R2", title:"Journal Club & Critical Appraisal",
  blurb:"How to run a journal club and appraise a trial (PICO, validity, NNT).",
  brief:`
   <p class="lead">Evidence-based practice is a core R2 skill. Running a journal club means picking a relevant,
   recent, peer-reviewed article and leading the team through a structured critical appraisal.</p>
   <h3>Step 1 — Frame the question with PICO</h3>
   <table class="ref">
     <tr><th>P</th><th>I</th><th>C</th><th>O</th></tr>
     <tr><td>Population — who was studied?</td><td>Intervention — what was tested?</td><td>Comparison — vs what?</td><td>Outcome — measured how?</td></tr>
   </table>
   <h3>Step 2 — Appraise validity</h3>
   <h4>Internal validity (is it true?) — freedom from bias</h4>
   <ul>
     <li>Was randomization truly random and <b>allocation concealed</b>?</li>
     <li>Were groups balanced at baseline?</li>
     <li>Were patients, clinicians, and outcome assessors <b>blinded</b>?</li>
     <li>Was analysis <b>intention-to-treat</b>, with minimal loss to follow-up?</li>
   </ul>
   <h4>External validity (does it apply?) — generalizability</h4>
   <ul><li>Are your patients and setting similar enough to the trial's to use the result?</li></ul>
   <h3>Step 3 — Interpret the effect size</h3>
   <div class="callout info"><b>Don't be fooled by relative risk</b>
     If events drop from 8% to 4%: the flashy <b>relative</b> reduction is 50%, but the <b>absolute</b> risk
     reduction (ARR) is only 4%, and <b>NNT = 1 ÷ ARR = 1/0.04 = 25</b>. Always report ARR and NNT.</div>
   <h3>Presenting flow (a simple template)</h3>
   <ol>
     <li>Clinical question that led you to the paper</li>
     <li>The article, authors, journal, funding</li>
     <li>PICO / hypothesis &amp; design</li>
     <li>Methods &amp; validity (risk of bias)</li>
     <li>Results (effect size + CI, ARR/NNT)</li>
     <li>Applicability to your patients</li>
     <li>Your bottom-line recommendation</li>
   </ol>
  `,
  cases:[
   {type:"order", kick:"Run the club",
    q:"Order a journal-club presentation:",
    correct:["State the clinical question","Introduce article, authors & journal","Lay out PICO & study design","Appraise methods & risk of bias","Present results (effect size, ARR/NNT)","Assess applicability to your patients","Give your bottom-line recommendation"],
    note:"Question → article → PICO/design → methods/validity → results → applicability → recommendation. Structure keeps the discussion focused."},
   {type:"mcq", kick:"Biostatistics",
    q:"A trial reports the drug cut a bad outcome from 8% to 4%. The ARR and NNT are:",
    opts:[
     {t:"ARR 4%, NNT = 25", ok:true,
      fb:"Correct. ARR = 8% − 4% = 4%; NNT = 1/0.04 = 25. The 50% figure is the relative reduction, which overstates impact."},
     {t:"ARR 50%, NNT = 2", ok:false,
      fb:"50% is the relative risk reduction, not absolute — a classic way trials look bigger than they are."},
     {t:"It cannot be calculated", ok:false,
      fb:"It can — ARR is simply the difference in event rates."},
    ]},
   {type:"mcq", kick:"Validity",
    q:"Which is a threat to a trial's INTERNAL validity?",
    opts:[
     {t:"Allocation was not concealed, so sicker patients were funneled into one arm", ok:true,
      fb:"Correct. Failed allocation concealment introduces selection bias — an internal-validity (truth) problem."},
     {t:"The trial enrolled patients unlike yours, so results may not apply", ok:false,
      fb:"That's an EXTERNAL validity (generalizability) issue, not internal."},
     {t:"The journal has a modest impact factor", ok:false,
      fb:"Impact factor doesn't determine a study's internal validity."},
    ]},
   {type:"mcq", kick:"PICO",
    q:"In 'adults with AFib, does apixaban vs warfarin reduce stroke?', what is the Comparison (C)?",
    opts:[
     {t:"Warfarin", ok:true, fb:"Correct. The comparison is the alternative the intervention is measured against — warfarin."},
     {t:"Adults with AFib", ok:false, fb:"That's the Population."},
     {t:"Stroke reduction", ok:false, fb:"That's the Outcome."},
    ]},
  ]

 {
  id:"precept", icon:"10", area:"R4", title:"Teaching & Precepting: The 4 Roles",
  blurb:"How to precept students/residents using the four sequential preceptor roles.",
  brief:`
   <p class="lead">R4 requires you to teach — and as a resident you'll precept APPE students in a
   <b>layered-learning model</b> (attending → resident → student). ASHP accredits precepting around
   <b>four preceptor roles</b>, used in sequence as the learner grows.</p>
   <h3>The four preceptor roles (in order)</h3>
   <div class="rolegrid">
     <div class="rolebox"><div class="num">ROLE 1</div><div class="rt">Direct Instruction</div><div class="rd">Teach foundational content — readings, lectures, topic discussions. For novices / start of rotation. Check understanding.</div></div>
     <div class="rolebox"><div class="num">ROLE 2</div><div class="rt">Modeling</div><div class="rd">Demonstrate the skill while <b>thinking out loud</b>, so the learner hears your reasoning, not just sees the action.</div></div>
     <div class="rolebox"><div class="num">ROLE 3</div><div class="rt">Coaching</div><div class="rd">Learner performs the task while you observe and give <b>real-time feedback</b>; they think out loud. Fine-tune the skill.</div></div>
     <div class="rolebox"><div class="num">ROLE 4</div><div class="rt">Facilitation</div><div class="rd">Learner works <b>independently</b>; you're available and <b>debrief</b> afterward. Confidence on both sides.</div></div>
   </div>
   <div class="callout info"><b>The roles are sequential — but flexible</b>
     Progress instruction → modeling → coaching → facilitation. If a learner already has the foundation, you can
     start at modeling. If they struggle during coaching, step back to modeling. Match the role to the learner.</div>
   <h3>Pick the role with intent</h3>
   <ul>
     <li>Define the desired endpoint of the learning experience.</li>
     <li>Assess the learner's baseline knowledge, skills, and learning style.</li>
     <li>Individualize — a PGY-1, a PGY-2, and an APPE student need different roles for the same task.</li>
   </ul>
   <div class="callout pearl"><b>Feedback makes coaching work</b>
     Set a safe feedback culture from day 1, ask permission to give feedback, and do it daily. The learner should
     leave knowing what to keep doing and what to improve. Use Bloom's-style questions to push beyond recall toward analysis and evaluation.</div>

 {
  id:"present", icon:"11", area:"R4", title:"Presentations & In-services",
  blurb:"Design and deliver an effective educational presentation to your team.",
  brief:`
   <p class="lead">Whether it's a CE in-service, a case presentation, or a nursing education session, R4 wants
   you to teach effectively — starting from the audience and objectives, not the slides.</p>
   <h3>Plan before you design slides</h3>
   <ol>
     <li><b>Know your audience &amp; level</b> — pharmacists vs nurses vs patients need different depth.</li>
     <li><b>Write measurable objectives</b> —"By the end, participants will be able to <i>select</i> appropriate DOAC dosing…" (use action verbs: select, apply, evaluate — not"understand").</li>
     <li><b>Choose active learning</b> — cases, polling, questions beat pure lecture.</li>
     <li><b>Use evidence-based, current content</b> with accurate citations and respect for copyright.</li>
   </ol>
   <h3>Slide &amp; delivery craft</h3>
   <ul>
     <li>One idea per slide; limit text — slides support you, they aren't your script.</li>
     <li>Rehearse and time it; know the format expectations (some journal clubs want &lt;5 min, no slides).</li>
     <li>Face the audience, manage Q&amp;A calmly, admit what you don't know.</li>
   </ul>
   <h3>A reliable structure</h3>
   <div class="callout info"><b>Objectives → Background → Content → Summary → References</b>
     Tell them what they'll learn, give context, deliver the content with active engagement, summarize the
     take-home points, and cite your sources.</div>
   <div class="callout pearl"><b>Objectives are the backbone</b>
     Every slide should map to an objective. If a slide doesn't serve an objective, cut it.</div>
  `,
  cases:[

const TEACH = {"orient":["Welcome — I'm Dr. Harlin, your preceptor. Let's make you a great clinical pharmacist.","A clinical pharmacist is accountable for safe, effective medication therapy — the right decision for THIS patient, not just an accurate product.","Order review, rounds, drug info, TDM and renal dosing, med rec, ADR prevention, stewardship — and precepting students. That's the job.","Residency is graded on four ASHP competencies: R1 Patient Care, R2 Practice Advancement, R3 Leadership, R4 Teaching.","Don't worry — we'll learn it one rotation at a time. Ready?"],"jcpp":["Always work patients up the same way. We call it the JCPP.","Collect, Assess, Plan, Implement, Follow-up — burn those five steps into muscle memory.","Document with SOAP: Subjective, Objective, Assessment, Plan.","Quick tip: if you can measure or verify it, it's objective. If the patient reports it, it's subjective."],"rounds":["On rounds, turn your assessment into an intervention the team will actually accept.","Use SBAR: Situation, Background, Assessment, Recommendation.","Be vague and you'll be ignored — name the drug, dose, route, frequency, and monitoring.","Frame it around the patient's goal, not 'the guideline says'."],"pk":["TDM is our signature service.","Check renal function (CrCl) first — vanco, DOACs, and enoxaparin all hinge on it.","Vancomycin is AUC/MIC-guided now (400-600), not trough-only.","Respect the NTI drugs — a small change tips them from useless to toxic. Always double-check."],"safety":["We're the safety net of the medication-use system.","The five rights aren't enough — verify indication, duration, and monitoring too.","Antibiotics: broad and early in sepsis, then de-escalate on cultures.","New clonus, fever, and sweating after adding a serotonergic agent? Think serotonin syndrome."],"code":["We respond to codes too — prepping drugs, advising doses, documenting.","Arrest: epinephrine 1 mg every 3-5 minutes. Shockable rhythm? Defibrillate plus amiodarone.","Hyperkalemia has an order: stabilize (calcium), shift (insulin/dextrose), then eliminate.","Anaphylaxis first-line is IM epinephrine, into the anterolateral thigh."],"jclub":["Evidence-based practice is core to R2. Let me show you how to run a journal club.","Frame the question with PICO: Population, Intervention, Comparison, Outcome.","Judge validity: internal (is it free of bias?) and external (does it apply to your patients?).","Don't be fooled by relative risk. 8% to 4% is ARR 4% and NNT 25."],"project":["R2 is about improving the system — an MUE or QI project.","Flow: find the gap, review the literature, write aims and methods, get IRB approval, collect data, then present and publish.","Approvals come before you pull any data. Don't flip that order.","For a formulary decision, bring a monograph or class review, not a single case."],"lead":["R3 is running the practice well — managing time and resources, and acting like a professional.","Triage by patient risk and urgency. An unstable patient or a critical lab comes first.","The P&T committee owns the formulary. Support it with evidence and run it fairly.","Made an error? Disclose it, fix it, monitor, and report. That's professionalism."],"precept":["R4 — finally, teaching. You'll precept students in a layered-learning model.","Four preceptor roles, in order: Direct Instruction, Modeling, Coaching, Facilitation.","No foundation? Instruct. Then model out loud, then coach with feedback, then let them fly.","Stay flexible — if a learner struggles in coaching, step back to modeling."],"present":["Presenting is an R4 skill too. Start from the audience and objectives, not the slides.","Write measurable objectives — 'select', not 'understand'.","One idea per slide, minimal text, and engage them with cases or polling.","Structure: objectives, background, content, summary, references."]};

function bond(){ let c=0; MODULES.forEach(m=>G.results[m.id].forEach(r=>{if(r===true)c++;})); return c; }
function bondMax(){ let t=0; MODULES.forEach(m=>t+=m.cases.length); return t; }
function areaScore(a){let c=0,t=AREA_TOTALS[a]||0;MODULES.filter(m=>m.area===a).forEach(m=>G.results[m.id].forEach(r=>{if(r===true)c++;}));return{c,t,pct:t?Math.round(c/t*100):0};}
function overall(){let c=0,t=0;MODULES.forEach(m=>m.cases.forEach((_,i)=>{t++;if(G.results[m.id][i]===true)c++;}));return{c,t,pct:t?Math.round(c/t*100):0};}
function modDone(m){return G.results[m.id].every(r=>r!==null);}
function modCorrect(m){return G.results[m.id].filter(r=>r===true).length;}

let curM=null, learnIdx=0, caseIdx=0;
function openModule(id){ curM=MODULES.find(m=>m.id===id); learnIdx=0; runLearn(); }

function runLearn(){
  const m=curM;
  const lines=TEACH[m.id]||[];
  const last=learnIdx>=lines.length-1;
  const expr = learnIdx===0?"smile":(learnIdx%2?"think":"smile");
  drawScene(m.area, expr,"Dr. Harlin", lines[learnIdx], {
    advance:true, onBox:"learnNext()",
    below:`<div style="position:absolute;top:60px;right:18px;z-index:18">
      <button class="btn ghost sm" onclick="openNotes()">Notes</button></div>`
  });
  if(last){
    const wrap=document.querySelector(".vn-wrap");
    const c=document.createElement("div");c.className="choices";
    c.innerHTML=`<button class="btn mint" onclick="startCases()">Start cases ▶</button>`;
    document.getElementById("choiceLayer").appendChild(c);
    // remove advance arrow / box click on last so button is the path
  }
}
function learnNext(){ if(learnIdx<((TEACH[curM.id]||[]).length-1)){ learnIdx++; runLearn(); } }

function openNotes(){
  const m=curM;
  const ov=document.createElement("div");ov.className="notes-ov";ov.id="notesOv";
  ov.innerHTML=`<div class="notes-card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h3 style="margin:0">${m.icon} ${m.title} — Notes</h3>
      <button class="btn ghost sm" onclick="closeNotes()">Close </button></div>
    <div class="brief" style="margin-top:10px">${m.brief}</div></div>`;
  document.getElementById("app").appendChild(ov);
  ov.onclick=e=>{if(e.target===ov)closeNotes();};
}
function closeNotes(){const o=document.getElementById("notesOv");if(o)o.remove();}

function startCases(){ caseIdx=0; runCase(); }

function runCase(){
  const m=curM, c=m.cases[caseIdx];
  const already=G.results[m.id][caseIdx];
  // dialogue = mentor ask, then question emphasized + choices
  drawScene(m.area,"think","Dr. Harlin",
    `Alright, clinical scenario — <b>${c.kick}</b>.`,
    { advance:false,
      note:`<b style="color:#7a4d8f">Q${caseIdx+1}.</b> ${c.q}`,
      below: caseProgress() });
  const wrap=document.querySelector(".vn-wrap");
  const holder=document.createElement("div");holder.id="caseHolder";
  if(c.type==="mcq"){
    holder.className="choices";
    holder.innerHTML=c.opts.map((o,i)=>`<button class="choice" data-i="${i}"><span class="k">${String.fromCharCode(65+i)}</span>${o.t}</button>`).join("");
    document.getElementById("choiceLayer").appendChild(holder);
    holder.querySelectorAll(".choice").forEach(b=>b.onclick=()=>answerMcq(parseInt(b.dataset.i)));
  } else if(c.type==="order"){
    holder.innerHTML=`
      <div class="ord-dst" id="ordDst"><span style="color:#b58aa6;font-size:12px;font-weight:700;padding:6px">Tap the steps in the correct order…</span></div>
      <div class="ord-src" id="ordSrc">${shuffle(c.correct.map((t)=>t)).map(t=>`<button class="oitem" data-t="${encodeURIComponent(t)}">${t}</button>`).join("")}</div>
      <div class="ord-btns"><button class="btn sm" id="ordChk" disabled onclick="checkOrder()">Check order</button>
      <button class="btn ghost sm" onclick="resetOrder()">Reset</button></div>`;
    document.getElementById("choiceLayer").appendChild(holder);
    holder.querySelectorAll("#ordSrc .oitem").forEach(b=>b.onclick=()=>placeOrder(b));
  }
}
function caseProgress(){
  const m=curM;
  const dots=m.cases.map((_,i)=>{const r=G.results[m.id][i];
    const col=i===caseIdx?AREA[m.area].c:(r===true?'#3fd0bf':r===false?'#ff8fa8':'#f0d8e4');
    return `<span style="width:26px;height:7px;border-radius:6px;background:${col};display:inline-block"></span>`;}).join("");
  return `<div style="position:absolute;top:58px;left:0;right:0;text-align:center;z-index:18">${dots}</div>`;
}

/* MCQ answer */
function answerMcq(i){
  const m=curM,c=m.cases[caseIdx];
  if(G.results[m.id][caseIdx]!==null) return;
  const ok=c.opts[i].ok;
  G.results[m.id][caseIdx]=ok;
  const holder=document.getElementById("caseHolder");
  holder.querySelectorAll(".choice").forEach((b,bi)=>{b.disabled=true;
    if(c.opts[bi].ok)b.classList.add("correct"); if(bi===i&&!ok)b.classList.add("wrong");});
  feedback(ok,c.opts[i].fb);
}
/* ORDER */
let ordSeq=[];
function placeOrder(btn){
  if(btn.classList.contains("placed"))return;
  const t=decodeURIComponent(btn.dataset.t);ordSeq.push(t);btn.classList.add("placed");
  const dst=document.getElementById("ordDst");
  dst.innerHTML=ordSeq.map((s,i)=>`<span class="oitem placed"><span class="idx">${i+1}</span>${s}</span>`).join("");
  if(ordSeq.length===curM.cases[caseIdx].correct.length)document.getElementById("ordChk").disabled=false;
}
function resetOrder(){ordSeq=[];const c=curM.cases[caseIdx];
  document.getElementById("ordDst").innerHTML=`<span style="color:#b58aa6;font-size:12px;font-weight:700;padding:6px">Tap the steps in the correct order…</span>`;
  document.querySelectorAll("#ordSrc .oitem").forEach(b=>b.classList.remove("placed"));
  document.getElementById("ordChk").disabled=true;}
function checkOrder(){
  const m=curM,c=m.cases[caseIdx];if(G.results[m.id][caseIdx]!==null)return;
  const ok=JSON.stringify(ordSeq)===JSON.stringify(c.correct);
  G.results[m.id][caseIdx]=ok;
  const fbtext= ok? c.note :"Not quite. The correct order is"+c.correct.map((s,i)=>`${i+1}.${s}`).join(" →")+"."+c.note;
  feedback(ok,fbtext);
}

/* feedback dialogue */
function feedback(ok, expl){
  ordSeq=[];
  const m=curM;
  const cleanExpl = String(expl || '').replace(/^(Correct\.|Not quite\.)\s*/i, '');
  const line = ok? PRAISE[Math.floor(Math.random()*PRAISE.length)] : CONSOLE[Math.floor(Math.random()*CONSOLE.length)];
  const last = caseIdx===m.cases.length-1;
  drawScene(m.area, ok?"happy":"worry","Dr. Harlin", line, {
    advance:false, note:`<b>${ok?'Correct':'Not quite'}</b> · ${cleanExpl}` });
  burst(ok?"good":"bad");
  const wrap=document.querySelector(".vn-wrap");
  const c=document.createElement("div");c.className="choices";
  c.innerHTML=`<button class="btn mint" onclick="nextCase()">${last?'Finish rotation ':'Next case ▶'}</button>`;
  document.getElementById("choiceLayer").appendChild(c);
}
function nextCase(){
  const m=curM;
  if(caseIdx<m.cases.length-1){caseIdx++;runCase();}
  else moduleComplete();
}
function moduleComplete(){
  const m=curM,nc=modCorrect(m),meta=AREA[m.area];
  const perfect=nc===m.cases.length;
  drawScene(m.area, perfect?"wink":"smile","Dr. Harlin",
    perfect? `Amazing, Dr. ${G.name}! You got all ${m.cases.length} right.<br>You are really good at this — I am proud `
           : `Rotation complete! You got ${nc} of ${m.cases.length}. Nice work.<br>Review the notes and retry anytime.`,
    {advance:true, onBox:"goHub()", pop:true,
     below:`<div style="position:absolute;top:66px;left:0;right:0;text-align:center;z-index:18">
       <span class="area-pill" style="color:${meta.c};font-size:15px">${m.title} · ${nc}/${m.cases.length}</span></div>`});
  if(perfect)burst("good");
}

/* ==================================================================
   GRADUATION
   ================================================================== */
function graduate(){
  const ov=overall(),r1=areaScore("R1"),r2=areaScore("R2"),r3=areaScore("R3"),r4=areaScore("R4"),core=areaScore("core");
  const done=MODULES.filter(m=>modDone(m)).length;
  let medal,title,rk,expr;
  if(done<MODULES.length){medal="";title="Still in Training";expr="think";
    rk=`You have finished ${done}/${MODULES.length} rotations (${ov.pct}% of all cases). Finish every rotation to sit for your final evaluation!`;}
  else if(ov.pct>=90 && Math.min(r1.pct,r2.pct,r3.pct,r4.pct)>=75){medal="";title="PGY-1 Graduate — Ready for BCPS / PGY-2";expr="wink";
    rk="Outstanding across all four competencies! You practice safely and independently, teach the next learner, and improve the system. The gold standard";}
  else if(ov.pct>=75){medal="";title="PGY-1 Graduate — Clinical Pharmacist";expr="happy";
    rk="A solid, floor-ready clinical pharmacist. Shore up your weaker competencies and you can branch into a specialty.";}
  else if(ov.pct>=55){medal="";title="Residency Continued — Developing";expr="smile";
    rk="Your competencies are growing. Revisit the notes for weaker areas and retry the cases.";}
  else{medal="";title="Needs Development";expr="worry";
    rk="Build the fundamentals. Read each rotation note and retry the cases to raise your bond!";}
  setBG("core");
  document.getElementById("app").innerHTML=`
    <div class="stage bg-title" id="stage">${bokehHTML()}</div>
    <div class="fx" id="fx2"></div>
    <div class="char-layer" style="bottom:auto;top:6vh;height:44vh">${face(done===MODULES.length?'proud':'neutral','belle')}</div>
    <div class="center-layer" style="justify-content:flex-end;padding-bottom:32px">
      <div class="ending-card">
        <div class="medal">${medal}</div>
        <h2>${title}</h2>
        <div class="rk">Dr. ${G.name} — ${rk}</div>
        <div class="sgrid">
          <div><span>Orientation</span><b>${core.c}/${core.t}</b></div>
          <div><span>R1 Patient Care</span><b>${r1.c}/${r1.t}</b></div>
          <div><span>R2 Practice Adv.</span><b>${r2.c}/${r2.t}</b></div>
          <div><span>R3 Leadership</span><b>${r3.c}/${r3.t}</b></div>
          <div><span>R4 Teaching</span><b>${r4.c}/${r4.t}</b></div>
          <div><span>Total Score</span><b>${ov.c}/${ov.t} (${ov.pct}%)</b></div>
        </div>
        <div style="font-size:11.5px;color:#9a8393;margin-top:6px">Rotations done ${done}/${MODULES.length}</div>
        <div style="margin-top:14px;display:flex;gap:9px;justify-content:center;flex-wrap:wrap">
          <button class="btn ghost sm" onclick="goHub()">← Rotations</button>
          <button class="btn sm" onclick="location.reload()">↻ New resident</button>
        </div>
      </div>
    </div>`;
  if(done===MODULES.length)burst("good");
}

/* util */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* boot */
showTitle();
</script>
