     {t:"Quietly fix it and hope no one notices", ok:false,
      fb:"Concealing errors endangers patients and violates professional accountability."},
     {t:"Blame the ordering physician", ok:false,
      fb:"Own your part; a blame-free, transparent correction is the professional standard."},
    ]},
  ]
 },
 {
  id:"precept", icon:"10", area:"R4", title:"Teaching & Precepting: The 4 Roles",
  blurb:"How to precept students/residents using the four sequential preceptor roles.",
  brief:`
   <p class="lead">R4 requires you to teach — and as a resident you'll precept APPE students in a
   <b>layered-learning model</b> (attending → resident → student). ASHP accredits precepting around
   <b>four preceptor roles</b>, used in sequence as the learner grows.</p>
   <h3>The four preceptor roles (in order)</h3>
   <div class="rolegrid">
     <div class="rolebox"><div class="num">ROLE 1</div><div class="rt">Direct Instruction</div><div class="rd">Teach foundational content — readings, lectures, topic discussions. For novices / start of rotation. Check understanding.</div></div>
     <div class="rolebox"><div class="num">ROLE 2</div><div class="rt">Modeling</div><div class="rd">Demonstrate the skill while <b>thinking out loud</b>, so the learner hears your reasoning, not just sees the action.</div></div>
     <div class="rolebox"><div class="num">ROLE 3</div><div class="rt">Coaching</div><div class="rd">Learner performs the task while you observe and give <b>real-time feedback</b>; they think out loud. Fine-tune the skill.</div></div>
     <div class="rolebox"><div class="num">ROLE 4</div><div class="rt">Facilitation</div><div class="rd">Learner works <b>independently</b>; you're available and <b>debrief</b> afterward. Confidence on both sides.</div></div>
   </div>
   <div class="callout info"><b>The roles are sequential — but flexible</b>
     Progress instruction → modeling → coaching → facilitation. If a learner already has the foundation, you can
     start at modeling. If they struggle during coaching, step back to modeling. Match the role to the learner.</div>
   <h3>Pick the role with intent</h3>
   <ul>
     <li>Define the desired endpoint of the learning experience.</li>
     <li>Assess the learner's baseline knowledge, skills, and learning style.</li>
     <li>Individualize — a PGY-1, a PGY-2, and an APPE student need different roles for the same task.</li>
   </ul>
   <div class="callout pearl"><b>Feedback makes coaching work</b>
     Set a safe feedback culture from day 1, ask permission to give feedback, and do it daily. The learner should
     leave knowing what to keep doing and what to improve. Use Bloom's-style questions to push beyond recall toward analysis and evaluation.</div>
  `,
  cases:[
   {type:"order", kick:"The progression",
    q:"Put the four preceptor roles in their correct order of progression:",
    correct:["Direct Instruction","Modeling","Coaching","Facilitation"],
    note:"Direct Instruction → Modeling → Coaching → Facilitation — foundational content, then demonstrate, then supervised practice, then independence."},
   {type:"mcq", kick:"Name the role",
    q:"You work up a patient out loud in front of your student, narrating why you choose each therapy. Which role is this?",
    opts:[
     {t:"Modeling", ok:true,
      fb:"Correct. Demonstrating the process while thinking out loud so the learner hears your reasoning = Modeling."},
     {t:"Direct Instruction", ok:false,
      fb:"Direct instruction is teaching foundational content (readings/lectures), not demonstrating the live skill."},
     {t:"Facilitation", ok:false,
      fb:"Facilitation is when the learner works independently and you debrief afterward."},
    ]},
   {type:"mcq", kick:"Pick the role",
    q:"It's day 1 for an APPE student who has never done a formal med rec. Which role should you start with?",
    opts:[
     {t:"Direct Instruction — teach the foundational method first", ok:true,
      fb:"Correct. A novice with no foundation needs the content/process taught first, before demonstrating or supervising."},
     {t:"Facilitation — let them do it alone and debrief", ok:false,
      fb:"Too soon; a learner with no foundation can't perform independently yet."},
     {t:"Coaching — watch them attempt it cold", ok:false,
      fb:"Coaching assumes they already have the knowledge and have seen it modeled."},
    ]},
   {type:"mcq", kick:"Adjusting the role",
    q:"A capable student has done med rec well all week under observation with no corrections needed. What's the next role?",
    opts:[
     {t:"Facilitation — let them do it independently and debrief", ok:true,
      fb:"Correct. Once corrective feedback is no longer needed during coaching, advance to facilitation (independent practice with debrief)."},
     {t:"Go back to Direct Instruction", ok:false,
      fb:"They've mastered the content; regressing to lectures wastes the learner's growth."},
     {t:"Keep coaching indefinitely", ok:false,
      fb:"Staying in coaching after they no longer need corrections holds them back from independence."},
    ]},
  ]
 },
 {
  id:"present", icon:"11", area:"R4", title:"Presentations & In-services",
  blurb:"Design and deliver an effective educational presentation to your team.",
  brief:`
   <p class="lead">Whether it's a CE in-service, a case presentation, or a nursing education session, R4 wants
   you to teach effectively — starting from the audience and objectives, not the slides.</p>
   <h3>Plan before you design slides</h3>
   <ol>
     <li><b>Know your audience &amp; level</b> — pharmacists vs nurses vs patients need different depth.</li>
     <li><b>Write measurable objectives</b> —"By the end, participants will be able to <i>select</i> appropriate DOAC dosing…" (use action verbs: select, apply, evaluate — not"understand").</li>
     <li><b>Choose active learning</b> — cases, polling, questions beat pure lecture.</li>
     <li><b>Use evidence-based, current content</b> with accurate citations and respect for copyright.</li>
   </ol>
   <h3>Slide &amp; delivery craft</h3>
   <ul>
     <li>One idea per slide; limit text — slides support you, they aren't your script.</li>
     <li>Rehearse and time it; know the format expectations (some journal clubs want &lt;5 min, no slides).</li>
     <li>Face the audience, manage Q&amp;A calmly, admit what you don't know.</li>
   </ul>
   <h3>A reliable structure</h3>
   <div class="callout info"><b>Objectives → Background → Content → Summary → References</b>
     Tell them what they'll learn, give context, deliver the content with active engagement, summarize the
     take-home points, and cite your sources.</div>
   <div class="callout pearl"><b>Objectives are the backbone</b>
     Every slide should map to an objective. If a slide doesn't serve an objective, cut it.</div>
  `,
  cases:[
   {type:"order", kick:"Build the talk",
    q:"Order a standard educational presentation:",
    correct:["Learning objectives","Background / context","Core content with active learning","Summary / take-home points","References"],
    note:"Objectives → Background → Content → Summary → References. Start by telling the audience what they'll be able to do."},
   {type:"mcq", kick:"Writing objectives",
    q:"Which is the strongest, best-written learning objective?",
    opts:[
     {t:"By the end, participants will be able to SELECT appropriate apixaban dosing for renal impairment.", ok:true,
      fb:"Correct. It's measurable and uses an action verb (select) at an application level — you can assess whether they can do it."},
     {t:"Participants will understand anticoagulation.", ok:false,
      fb:"'Understand' isn't measurable and is too vague to assess."},
     {t:"We will talk about some blood thinners.", ok:false,
      fb:"Not an objective at all — no measurable learner outcome."},
    ]},
   {type:"mcq", kick:"Slide craft",
    q:"Which is best practice for your slides?",
    opts:[
     {t:"One key idea per slide with minimal text and a case/poll to engage the audience", ok:true,
      fb:"Correct. Slides support you; limiting text and adding active learning keeps the audience engaged and improves retention."},
     {t:"Dense paragraphs you read aloud word-for-word", ok:false,
      fb:"Reading text-heavy slides disengages the audience — a classic presentation mistake."},
     {t:"As many animations and colors as possible", ok:false,
      fb:"Decoration isn't the goal; clarity and engagement are."},
    ]},
  ]
 },
];

MODULES.push({"id":"systems","icon":"12","area":"core","title":"Pharmacy Systems, Software & Machines","blurb":"The technology a modern clinical pharmacist runs on — EHR, ADCs, smart pumps, Bayesian dosing, drug databases.","brief":"<p class=\"lead\">A clinical pharmacist is only as safe as the systems they master.</p>\n  <table class=\"ref\"><tr><th>System</th><th>What it is</th></tr>\n  <tr><td><b>EHR</b> (Epic, Oracle/Cerner)</td><td>Where you review labs, notes, MAR, and verify orders</td></tr>\n  <tr><td><b>CPOE</b></td><td>Computerized provider order entry — removes transcription errors</td></tr>\n  <tr><td><b>CDS</b></td><td>Interaction/allergy/dose alerts — beware alert fatigue</td></tr>\n  <tr><td><b>BCMA</b></td><td>Barcode med administration — enforces the rights at bedside</td></tr>\n  <tr><td><b>ADC</b> — Pyxis, Omnicell</td><td>Automated dispensing cabinet; track overrides</td></tr>\n  <tr><td><b>Smart pump</b> — Alaris, Baxter</td><td>Dose-error-reduction software + drug library limits</td></tr>\n  <tr><td><b>PEC/hood</b> — LAFW, BSC, CACI</td><td>Engineering control for sterile/hazardous IV compounding</td></tr>\n  <tr><td><b>CSTD</b> — Equashield, PhaSeal</td><td>Closed-system transfer device for hazardous drugs</td></tr></table>\n  <div class=\"callout pearl\"><b>Bayesian dosing software</b> DoseMeRx, InsightRx, PrecisePK compute vancomycin AUC from 1–2 levels.</div>\n  <div class=\"callout warn\"><b>Drug-info databases</b> Micromedex, Lexicomp, UpToDate — cite them in recommendations.</div>","cases":[{"type":"mcq","kick":"AUC dosing tool","q":"You need AUC-guided vancomycin from one or two levels. Which tool is designed for this?","opts":[{"t":"Bayesian dosing software (DoseMeRx, InsightRx, PrecisePK)","ok":true,"fb":"Correct. Bayesian programs estimate AUC from 1–2 levels even before steady state — the 2020 guideline-preferred method."},{"t":"The barcode scanner (BCMA)","ok":false,"fb":"BCMA verifies administration; it doesn't compute pharmacokinetics."},{"t":"The automated dispensing cabinet","ok":false,"fb":"An ADC stores/dispenses drugs; it doesn't do PK modeling."}]},{"type":"mcq","kick":"Smart pump guardrails","q":"A nurse programs a heparin drip above the library's hard limit. What should the smart pump do?","opts":[{"t":"Block it — a hard limit cannot be overridden","ok":true,"fb":"Correct. DERS hard limits are non-overridable stops; soft limits only warn."},{"t":"Silently infuse at the requested rate","ok":false,"fb":"That defeats dose-error-reduction software."},{"t":"Ask the pharmacist to re-enter the order","ok":false,"fb":"The pump enforces limits itself."}]},{"type":"mcq","kick":"ADC override","q":"A nurse pulls IV metoprolol from the Pyxis as an override before pharmacist verification. When is that acceptable?","opts":[{"t":"Only for a narrow, institution-approved emergent list where waiting would harm the patient","ok":true,"fb":"Correct. Overrides bypass the pharmacist safety check, so they're restricted to a vetted, audited emergency list."},{"t":"Any time the nurse is busy","ok":false,"fb":"Routine overrides erase the verification net and are a top diversion/error risk."},{"t":"Never, under any circumstance","ok":false,"fb":"True emergencies (codes) do justify a controlled override list."}]},{"type":"order","kick":"Order-to-bedside flow","q":"Put the closed-loop medication process in order:","correct":["Prescriber enters order (CPOE)","Pharmacist verifies in the EHR","Drug dispensed (ADC or pharmacy)","Nurse scans patient + drug (BCMA)","Smart pump checks the dose (DERS)","Administer & document on the MAR"],"note":"CPOE → verify → dispense → BCMA → smart-pump guardrails → administer. Each layer catches a different error."},{"type":"mcq","kick":"Alert fatigue","q":"Your CDS fires low-severity alerts on nearly every order and staff click through them. Best action?","opts":[{"t":"Tune/suppress low-value alerts so high-severity ones still get attention","ok":true,"fb":"Correct. Alert fatigue makes clinicians override real alerts; curating the alert set is a pharmacist informatics role."},{"t":"Add more alerts to be safe","ok":false,"fb":"More noise worsens fatigue and hides dangerous alerts."},{"t":"Turn off all interaction alerts","ok":false,"fb":"Removing high-severity alerts is unsafe; the fix is selective tuning."}]}]},
{"id":"renal","icon":"13","area":"R1","title":"Renal & Hepatic Dose Adjustment","blurb":"Cockcroft-Gault, dialysis, DOAC/enoxaparin renal dosing, nephrotoxins, and the hepatic patient.","brief":"<p class=\"lead\">Most dosing errors you'll catch are renal. Estimate function first, then adjust.</p>\n  <div class=\"callout pearl\"><b>Cockcroft-Gault CrCl</b> = [(140 − age) × weight × (0.85 if female)] / (72 × SCr). Use it for drug dosing; eGFR is for CKD staging.</div>\n  <table class=\"ref\"><tr><th>Drug</th><th>Renal rule</th></tr>\n  <tr><td><b>Enoxaparin</b></td><td>CrCl &lt;30: treatment 1 mg/kg q24h; consider anti-Xa</td></tr>\n  <tr><td><b>Apixaban (AFib)</b></td><td>2.5 mg BID if ≥2 of: age ≥80, wt ≤60 kg, SCr ≥1.5</td></tr>\n  <tr><td><b>Gabapentin, β-lactams, vancomycin</b></td><td>Renally cleared — reduce dose / extend interval</td></tr></table>","cases":[{"type":"mcq","kick":"Enoxaparin renal","q":"Treatment enoxaparin 1 mg/kg SC q12h is ordered. CrCl is 22 mL/min. Best action?","opts":[{"t":"Recommend 1 mg/kg q24h and consider anti-Xa monitoring","ok":true,"fb":"Correct. At CrCl <30, treatment enoxaparin accumulates; the labeled adjustment is once daily with anti-Xa if prolonged."},{"t":"Verify as written — weight-based needs no change","ok":false,"fb":"LMWH is renally cleared; q12h at CrCl 22 over-anticoagulates."},{"t":"Switch to full-dose dabigatran","ok":false,"fb":"Dabigatran is renally cleared and worse here."}]},{"type":"mcq","kick":"eGFR vs CrCl","q":"A resident doses vancomycin off the lab's eGFR (indexed to 1.73 m²). Why re-check?","opts":[{"t":"eGFR is BSA-indexed for CKD staging; drug dosing traditionally uses Cockcroft-Gault CrCl","ok":true,"fb":"Correct. eGFR and CG-CrCl diverge at extremes of body size — use the method your protocol validates for dosing."},{"t":"eGFR and CrCl are always identical","ok":false,"fb":"They can differ meaningfully."},{"t":"Renal function never affects vancomycin","ok":false,"fb":"Vancomycin is renally cleared."}]},{"type":"mcq","kick":"Nephrotoxin stacking","q":"On vancomycin, now started on piperacillin-tazobactam with IV contrast planned. Chief concern?","opts":[{"t":"Additive nephrotoxicity / AKI — flag it and monitor renal function","ok":true,"fb":"Correct. Vanco + pip-tazo is a classic AKI-additive combo; contrast adds insult. Consider alternatives and hydration."},{"t":"QT prolongation","ok":false,"fb":"Not the main issue here."},{"t":"Serotonin syndrome","ok":false,"fb":"No serotonergic agents here."}]},{"type":"mcq","kick":"Hepatic patient","q":"Which best guides dosing in significant hepatic impairment?","opts":[{"t":"Child-Pugh class; adjust hepatically-metabolized/highly protein-bound drugs and avoid encephalopathy triggers","ok":true,"fb":"Correct. Child-Pugh grades severity; many drugs need reduction and some sedatives/statins are risky."},{"t":"Cockcroft-Gault CrCl","ok":false,"fb":"That's renal; it doesn't quantify hepatic function."},{"t":"No adjustment is ever needed for the liver","ok":false,"fb":"Hepatic clearance and protein binding change substantially in cirrhosis."}]}]},
{"id":"anticoag","icon":"14","area":"R1","title":"Anticoagulation & Reversal","blurb":"Warfarin/INR, DOAC dosing, heparin & LMWH, HIT, and reversal agents.","brief":"<p class=\"lead\">Anticoagulation is a high-alert class. Know the target, the monitoring, and the reversal.</p>\n  <table class=\"ref\"><tr><th>Agent</th><th>Monitor</th><th>Reversal</th></tr>\n  <tr><td><b>Warfarin</b></td><td>INR (goal 2–3)</td><td>Vitamin K; 4-factor PCC for major bleed</td></tr>\n  <tr><td><b>Dabigatran</b></td><td>—</td><td>Idarucizumab 5 g (two 2.5 g IV)</td></tr>\n  <tr><td><b>Apixaban/rivaroxaban</b></td><td>—</td><td>Andexanet alfa (or 4F-PCC)</td></tr>\n  <tr><td><b>UFH</b></td><td>aPTT or anti-Xa 0.3–0.7</td><td>Protamine</td></tr></table>\n  <div class=\"callout warn\"><b>HIT</b> Platelets drop ~50% at day 5–10 (4T score). Stop all heparin, start argatroban/bivalirudin, and do not start warfarin until platelets recover.</div>","cases":[{"type":"mcq","kick":"Dabigatran bleed","q":"A patient on dabigatran has a life-threatening GI bleed. Specific reversal?","opts":[{"t":"Idarucizumab 5 g IV (given as two 2.5 g doses)","ok":true,"fb":"Correct. Idarucizumab is the specific antidote for dabigatran (RE-VERSE AD)."},{"t":"Andexanet alfa","ok":false,"fb":"Andexanet reverses factor Xa inhibitors, not the direct thrombin inhibitor dabigatran."},{"t":"Protamine","ok":false,"fb":"Protamine reverses heparin, not dabigatran."}]},{"type":"mcq","kick":"Warfarin major bleed","q":"INR 6.8 with a major intracranial bleed. Fastest effective reversal?","opts":[{"t":"4-factor PCC plus IV vitamin K","ok":true,"fb":"Correct. 4F-PCC works within minutes; IV vitamin K sustains reversal since PCC is short-lived."},{"t":"Oral vitamin K alone","ok":false,"fb":"Too slow for a life-threatening bleed."},{"t":"Hold warfarin and recheck tomorrow","ok":false,"fb":"Unacceptable delay with an ICH."}]},{"type":"mcq","kick":"Suspected HIT","q":"Day 7 of UFH, platelets fell 250k → 110k with a new clot. Best next step?","opts":[{"t":"Stop all heparin, start argatroban/bivalirudin; do not start warfarin yet","ok":true,"fb":"Correct. HIT is prothrombotic; switch to a non-heparin anticoagulant and defer warfarin until platelets recover to avoid limb gangrene."},{"t":"Continue heparin and transfuse platelets","ok":false,"fb":"Continuing heparin worsens HIT; prophylactic platelets are generally avoided."},{"t":"Start warfarin immediately","ok":false,"fb":"Early warfarin in HIT can cause skin necrosis/limb gangrene."}]},{"type":"mcq","kick":"Apixaban reversal gap","q":"Andexanet alfa is unavailable for life-threatening apixaban bleeding. Reasonable option?","opts":[{"t":"4-factor PCC as an off-label alternative with supportive care","ok":true,"fb":"Correct. When andexanet isn't available, guidelines support 4F-PCC for major factor Xa-inhibitor bleeding."},{"t":"Idarucizumab","ok":false,"fb":"Specific to dabigatran; won't reverse apixaban."},{"t":"Protamine","ok":false,"fb":"Reverses heparin, not apixaban."}]}]},
{"id":"abx","icon":"15","area":"R1","title":"Antimicrobial Stewardship","blurb":"Empiric therapy, de-escalation, penicillin allergy, IV-to-PO, and duration.","brief":"<p class=\"lead\">Stewardship = right drug, dose, route, and duration — broad early in sepsis, then narrow on data.</p>\n  <table class=\"ref\"><tr><th>Concept</th><th>Point</th></tr>\n  <tr><td><b>Penicillin \"allergy\"</b></td><td>~90% aren't truly allergic; cephalosporin cross-reactivity is low, especially with different side chains (cefazolin is unique)</td></tr>\n  <tr><td><b>Vancomycin flushing</b></td><td>Infusion-rate reaction (formerly \"red man\") — not a true allergy; slow the infusion</td></tr>\n  <tr><td><b>IV-to-PO</b></td><td>Switch when improving &amp; gut works — for high-bioavailability drugs</td></tr></table>","cases":[{"type":"mcq","kick":"Penicillin allergy label","q":"A patient labeled 'penicillin allergy — rash as a child' needs surgical prophylaxis; cefazolin is ideal. Best action?","opts":[{"t":"Clarify the reaction; cefazolin's unique side chain has negligible cross-reactivity and is usually safe","ok":true,"fb":"Correct. Most childhood rash labels aren't true allergy, and cefazolin's distinct side chain makes cross-reactivity very low. Delabeling improves outcomes."},{"t":"Automatically use vancomycin for anyone with a penicillin label","ok":false,"fb":"Reflexive vancomycin is less effective for prophylaxis and drives resistance."},{"t":"Cancel surgery","ok":false,"fb":"Unnecessary — assess the label and pick an appropriate agent."}]},{"type":"mcq","kick":"Not an allergy","q":"During vancomycin the patient flushes red over the upper body. Best response?","opts":[{"t":"Slow the infusion ± antihistamine — this is vancomycin flushing syndrome, not a true allergy","ok":true,"fb":"Correct. It's rate-related histamine release; slowing the infusion resolves it and vancomycin can continue."},{"t":"Document a lifelong vancomycin allergy","ok":false,"fb":"Mislabeling removes a key MRSA drug for a manageable infusion reaction."},{"t":"Give IM epinephrine for anaphylaxis","ok":false,"fb":"This isn't anaphylaxis."}]},{"type":"mcq","kick":"De-escalation","q":"Day 3: empiric vancomycin + pip-tazo; cultures grow pan-sensitive E. coli, MRSA screen negative, improving. Best step?","opts":[{"t":"De-escalate to a narrow agent (e.g., ceftriaxone) and stop vancomycin","ok":true,"fb":"Correct. Cultures allow narrowing; continuing broad therapy adds toxicity, C. diff risk, and resistance."},{"t":"Continue vancomycin + pip-tazo for a full 14 days","ok":false,"fb":"Unjustified broad therapy — poor stewardship."},{"t":"Add a third antibiotic","ok":false,"fb":"Escalating without indication is the opposite of stewardship."}]},{"type":"mcq","kick":"IV to PO","q":"Which favors switching an antibiotic from IV to PO?","opts":[{"t":"Improving, tolerating oral intake, and a high-bioavailability drug (levofloxacin, linezolid, metronidazole)","ok":true,"fb":"Correct. High-bioavailability oral agents in an improving patient allow early IV-to-PO — less line risk, cost, and length of stay."},{"t":"Still on ICU-level vasopressors","ok":false,"fb":"Instability/poor gut perfusion argues against oral switch."},{"t":"The drug has ~10% oral bioavailability","ok":false,"fb":"Low oral bioavailability won't achieve adequate levels."}]}]},
{"id":"tox","icon":"16","area":"R1","title":"Toxicology & Antidotes","blurb":"The antidote table every hospital pharmacist must own — from acetaminophen to lipid emulsion.","brief":"<p class=\"lead\">In an overdose, the pharmacist is the antidote expert. Memorize the pairings.</p>\n  <table class=\"ref\"><tr><th>Poison</th><th>Antidote</th></tr>\n  <tr><td>Acetaminophen</td><td>N-acetylcysteine (per Rumack-Matthew; best &lt;8 h)</td></tr>\n  <tr><td>Opioid</td><td>Naloxone (short t½ — re-dose/drip)</td></tr>\n  <tr><td>Benzodiazepine</td><td>Flumazenil (caution: seizures in chronic/mixed OD)</td></tr>\n  <tr><td>Digoxin</td><td>Digoxin immune Fab (DigiFab)</td></tr>\n  <tr><td>Warfarin</td><td>Vitamin K (± 4F-PCC)</td></tr>\n  <tr><td>Beta-blocker</td><td>Glucagon (+ high-dose insulin)</td></tr>\n  <tr><td>Calcium channel blocker</td><td>Calcium, high-dose insulin-euglycemia, pressors</td></tr>\n  <tr><td>Local anesthetic (LAST)</td><td>IV lipid emulsion 20%</td></tr>\n  <tr><td>Malignant hyperthermia</td><td>Dantrolene</td></tr>\n  <tr><td>Iron</td><td>Deferoxamine</td></tr>\n  <tr><td>Methanol / ethylene glycol</td><td>Fomepizole</td></tr>\n  <tr><td>Sulfonylurea hypoglycemia</td><td>Octreotide (+ dextrose)</td></tr>\n  <tr><td>High-dose methotrexate</td><td>Leucovorin (+ glucarpidase)</td></tr>\n  <tr><td>Serotonin syndrome</td><td>Cyproheptadine + cooling/benzos</td></tr></table>","cases":[{"type":"mcq","kick":"APAP overdose timing","q":"Acetaminophen ingestion; the 4-hour level plots above the treatment line. Best action?","opts":[{"t":"Start N-acetylcysteine — it's most effective within 8 hours","ok":true,"fb":"Correct. NAC replenishes glutathione; efficacy is highest when started early (<8 h). Use the Rumack-Matthew nomogram for the 4-h (or later) level."},{"t":"Give activated charcoal only and observe","ok":false,"fb":"Charcoal helps very early but doesn't replace NAC once the level is toxic."},{"t":"Wait for symptoms of liver failure","ok":false,"fb":"Waiting for hepatotoxicity defeats the purpose — treat before injury."}]},{"type":"mcq","kick":"Opioid reversal pitfall","q":"Naloxone reverses a fentanyl overdose, but 40 minutes later the patient becomes somnolent again. Why?","opts":[{"t":"Naloxone's half-life is shorter than many opioids — re-dose or start an infusion","ok":true,"fb":"Correct. Re-narcotization is common; monitor and re-bolus or run a naloxone drip."},{"t":"The patient developed a new stroke","ok":false,"fb":"The classic explanation is naloxone's short duration versus the opioid."},{"t":"Naloxone caused the sedation","ok":false,"fb":"Naloxone is an antagonist; it doesn't sedate."}]},{"type":"mcq","kick":"Beta-blocker OD","q":"Massive propranolol overdose with refractory bradycardia and hypotension. Pharmacologic antidote to recommend?","opts":[{"t":"Glucagon (and consider high-dose insulin-euglycemia therapy)","ok":true,"fb":"Correct. Glucagon bypasses the β-receptor to raise cAMP; high-dose insulin supports inotropy in severe cases."},{"t":"Additional beta-blocker","ok":false,"fb":"That worsens the toxicity."},{"t":"Flumazenil","ok":false,"fb":"Flumazenil is for benzodiazepines, not beta-blockers."}]},{"type":"mcq","kick":"LAST","q":"During a nerve block the patient seizes then arrests — local anesthetic systemic toxicity. Key antidote?","opts":[{"t":"IV lipid emulsion 20% (plus ACLS)","ok":true,"fb":"Correct. Intravenous lipid emulsion ('lipid rescue') is the specific therapy for LAST alongside resuscitation."},{"t":"Naloxone","ok":false,"fb":"No opioid involved."},{"t":"Dantrolene","ok":false,"fb":"Dantrolene is for malignant hyperthermia, not LAST."}]},{"type":"mcq","kick":"Benzo antidote caution","q":"Why is flumazenil used cautiously in an unknown mixed overdose?","opts":[{"t":"It can precipitate seizures in benzodiazepine-dependent patients or unmask proconvulsant co-ingestants (e.g., TCAs)","ok":true,"fb":"Correct. Flumazenil removes the seizure threshold protection benzos provide, which can be dangerous in chronic use or mixed OD."},{"t":"It causes immediate liver failure","ok":false,"fb":"That's not the concern."},{"t":"It has no risks at all","ok":false,"fb":"The seizure risk is exactly why it's used selectively."}]}]},
{"id":"interactions","icon":"17","area":"R1","title":"Drug Interactions & QT","blurb":"CYP450 inhibitors/inducers, QT-prolonging combinations, serotonergic stacking, and P-gp.","brief":"<p class=\"lead\">Interactions are where a good pharmacist quietly prevents harm.</p>\n  <table class=\"ref\"><tr><th>Type</th><th>Watch</th></tr>\n  <tr><td><b>CYP inhibitors</b></td><td>Azole antifungals, macrolides (clarithro), protease inhibitors, grapefruit, fluoxetine — raise substrate levels</td></tr>\n  <tr><td><b>CYP inducers</b></td><td>Rifampin, carbamazepine, phenytoin, St John's wort — lower substrate levels</td></tr>\n  <tr><td><b>QT prolongers</b></td><td>Methadone, ondansetron, fluoroquinolones, azithromycin, antipsychotics — additive; correct K⁺/Mg²⁺</td></tr>\n  <tr><td><b>Serotonergic</b></td><td>SSRIs/SNRIs, tramadol, linezolid, triptans, MAOIs — serotonin syndrome</td></tr></table>","cases":[{"type":"mcq","kick":"Statin + azole","q":"Simvastatin patient started on itraconazole. Concern?","opts":[{"t":"CYP3A4 inhibition raises simvastatin levels → myopathy/rhabdomyolysis; hold or switch the statin","ok":true,"fb":"Correct. Strong 3A4 inhibitors sharply raise simvastatin exposure; pause it or use a non-3A4 statin during therapy."},{"t":"No interaction — statins are safe with all antifungals","ok":false,"fb":"Simvastatin + strong 3A4 inhibitors is a well-known rhabdomyolysis risk."},{"t":"It lowers the statin level and needs a higher dose","ok":false,"fb":"Inhibition raises, not lowers, the level."}]},{"type":"mcq","kick":"Additive QT","q":"An inpatient on methadone and IV haloperidol is now ordered azithromycin. Best action?","opts":[{"t":"Flag additive QT prolongation; check an ECG and K⁺/Mg²⁺, and reconsider agents","ok":true,"fb":"Correct. Stacking QT-prolonging drugs risks torsades; monitor the QTc and correct electrolytes or choose alternatives."},{"t":"Proceed — QT interactions aren't clinically real","ok":false,"fb":"Torsades from additive QT drugs is a genuine, sometimes fatal risk."},{"t":"Give IV potassium regardless of level","ok":false,"fb":"Repletion is guided by the actual level, not given blindly."}]},{"type":"mcq","kick":"Enzyme induction","q":"A transplant patient on tacrolimus is started on rifampin. Predicted effect?","opts":[{"t":"Rifampin induces CYP3A4/P-gp → tacrolimus levels fall → rejection risk; monitor levels and adjust","ok":true,"fb":"Correct. Potent induction can drop tacrolimus to subtherapeutic; intensify monitoring and expect a dose increase."},{"t":"Tacrolimus levels rise, causing toxicity","ok":false,"fb":"Induction lowers levels; inhibition would raise them."},{"t":"No monitoring needed","ok":false,"fb":"An NTI immunosuppressant with a potent inducer demands close monitoring."}]},{"type":"mcq","kick":"Serotonin risk","q":"Which combination most warrants serotonin-syndrome caution?","opts":[{"t":"An SSRI plus linezolid (an MAOI antibiotic)","ok":true,"fb":"Correct. Linezolid's MAO inhibition plus an SSRI is a classic serotonin-syndrome trigger; often avoided or carefully managed."},{"t":"Lisinopril plus amlodipine","ok":false,"fb":"Neither is serotonergic."},{"t":"Metformin plus atorvastatin","ok":false,"fb":"No serotonergic mechanism."}]}]},
{"id":"law","icon":"18","area":"R3","title":"Pharmacy Law & Controlled Substances","blurb":"DEA schedules, CII rules, PDMP, corresponding responsibility, and current REMS.","brief":"<p class=\"lead\">Legal fluency protects patients, your license, and the institution.</p>\n  <table class=\"ref\"><tr><th>Topic</th><th>Rule</th></tr>\n  <tr><td><b>Schedule II</b></td><td>No refills; written/EPCS; strict recordkeeping (opioids, amphetamines)</td></tr>\n  <tr><td><b>Schedule III–V</b></td><td>Up to 5 refills within 6 months</td></tr>\n  <tr><td><b>PDMP</b></td><td>Check the prescription drug monitoring program for controlled scripts</td></tr>\n  <tr><td><b>Corresponding responsibility</b></td><td>The pharmacist must ensure a controlled prescription is legitimate</td></tr></table>\n  <div class=\"callout warn\"><b>Current REMS facts</b> Clozapine REMS was <b>discontinued (2025)</b> — ANC no longer reported to a REMS, but <b>ANC monitoring is still required</b>. The buprenorphine <b>X-waiver was eliminated</b> — any standard DEA registrant may prescribe it (Schedule III). iPLEDGE (isotretinoin) still requires pregnancy prevention.</div>","cases":[{"type":"mcq","kick":"CII refill","q":"A patient asks the pharmacy to 'refill' their oxycodone (Schedule II) prescription. Correct?","opts":[{"t":"Schedule II prescriptions cannot be refilled — a new valid prescription is required","ok":true,"fb":"Correct. No refills are permitted on CII; the prescriber must issue a new prescription."},{"t":"Allow up to 5 refills in 6 months","ok":false,"fb":"That rule is for Schedule III–V, not CII."},{"t":"Refill once as a courtesy","ok":false,"fb":"Any CII refill violates federal law."}]},{"type":"mcq","kick":"Clozapine monitoring","q":"After the FDA discontinued the clozapine REMS (2025), what still must happen?","opts":[{"t":"ANC monitoring continues clinically (e.g., weekly early, then less often); severe neutropenia still means holding clozapine","ok":true,"fb":"Correct. The REMS reporting ended, but the medical need to monitor the absolute neutrophil count for agranulocytosis did not."},{"t":"Nothing — no monitoring is needed anymore","ok":false,"fb":"Removing REMS paperwork did not remove the agranulocytosis risk."},{"t":"Only monitor liver enzymes","ok":false,"fb":"The signature clozapine risk is neutropenia, tracked by ANC."}]},{"type":"mcq","kick":"Buprenorphine access","q":"A hospitalist wants to prescribe buprenorphine for opioid use disorder. Current federal requirement?","opts":[{"t":"A standard DEA registration is sufficient — the X-waiver was eliminated (MAT Act, 2023)","ok":true,"fb":"Correct. Any prescriber with a standard DEA number may now prescribe buprenorphine (Schedule III); no patient caps, though state rules apply."},{"t":"They must obtain a special X-waiver first","ok":false,"fb":"The X-waiver was removed; it's no longer required."},{"t":"Only addiction specialists may prescribe it","ok":false,"fb":"That restriction no longer exists federally."}]},{"type":"mcq","kick":"Red flags","q":"A new prescriber sends many CII stimulant prescriptions for out-of-state cash-pay patients. Your duty?","opts":[{"t":"Exercise corresponding responsibility — verify legitimacy, check the PDMP, and refuse to fill if it isn't a valid prescription","ok":true,"fb":"Correct. Pharmacists share legal responsibility to dispense only legitimate controlled prescriptions; classic diversion red flags require diligence."},{"t":"Fill everything — it's the prescriber's problem","ok":false,"fb":"Corresponding responsibility makes it the pharmacist's problem too."},{"t":"Report the patient to police immediately","ok":false,"fb":"First verify legitimacy through proper channels; don't skip due diligence."}]}]},
{"id":"compounding","icon":"19","area":"R3","title":"Sterile Compounding: USP <797>/<800>","blurb":"BUDs, garbing, media fills, hazardous drugs, negative pressure, and CSTDs.","brief":"<p class=\"lead\">Compounding standards keep IVs sterile and staff safe. USP <797> (sterile, official Nov 1, 2023) and <800> (hazardous, official Dec 1, 2019).</p>\n  <table class=\"ref\"><tr><th><797> concept</th><th>Point</th></tr>\n  <tr><td>Engineering controls</td><td>ISO 5 PEC (hood) inside an ISO 7 buffer room; a designated person is accountable</td></tr>\n  <tr><td>Garbing competency</td><td>Gloved-fingertip test with 0 CFU action limit, passed 3× initially; plus media-fill</td></tr>\n  <tr><td>BUD</td><td>Set by category/environment, sterility, and storage — not the same as an expiration date</td></tr></table>\n  <table class=\"ref\"><tr><th><800> concept</th><th>Point</th></tr>\n  <tr><td>Hazardous drugs</td><td>Handle per the NIOSH list (antineoplastics, etc.)</td></tr>\n  <tr><td>Containment</td><td>C-PEC (e.g., BSC) inside a negative-pressure, externally-vented C-SEC</td></tr>\n  <tr><td>PPE + CSTD</td><td>Chemo gown + two pairs of chemo gloves; closed-system transfer devices</td></tr></table>","cases":[{"type":"mcq","kick":"Garbing test","q":"Under USP <797>, what is the action limit for the initial gloved-fingertip competency test?","opts":[{"t":"0 CFU — and it must be passed three separate times before compounding independently","ok":true,"fb":"Correct. Initial garbing competency requires >0 CFU to fail; three successive passes are needed, plus a media-fill test."},{"t":"Up to 100 CFU is acceptable","ok":false,"fb":"There is no allowable growth for the initial gloved-fingertip action limit."},{"t":"No testing is required","ok":false,"fb":"Garbing/fingertip and media-fill competencies are mandatory."}]},{"type":"mcq","kick":"Hazardous drug room","q":"Where must an antineoplastic (NIOSH hazardous) IV be compounded?","opts":[{"t":"In a C-PEC (e.g., BSC/CACI) within a negative-pressure, externally-vented containment room","ok":true,"fb":"Correct. USP <800> requires containment engineering controls under negative pressure and external venting to protect staff and the environment."},{"t":"On any open counter with gloves","ok":false,"fb":"Open handling exposes personnel to hazardous drug residue."},{"t":"In a positive-pressure clean room like non-hazardous IVs","ok":false,"fb":"Hazardous compounding requires negative pressure, unlike standard sterile rooms."}]},{"type":"mcq","kick":"BUD vs expiration","q":"How does a beyond-use date (BUD) differ from a manufacturer expiration date?","opts":[{"t":"A BUD is when a compounded preparation must no longer be used, set by environment/sterility/storage — distinct from the manufacturer's expiration","ok":true,"fb":"Correct. BUDs come from USP compounding standards and are usually much shorter than a manufacturer expiration date."},{"t":"They are the same thing","ok":false,"fb":"They're different concepts with different bases."},{"t":"A BUD is always longer than the expiration date","ok":false,"fb":"BUDs are typically shorter, based on compounding conditions."}]},{"type":"mcq","kick":"PPE for chemo","q":"Correct PPE to compound an antineoplastic under USP <800>?","opts":[{"t":"Chemo-rated gown plus two pairs of chemotherapy gloves, with a closed-system transfer device","ok":true,"fb":"Correct. Double chemo gloves, an impermeable gown, and CSTDs minimize exposure to hazardous drugs."},{"t":"A single exam glove is fine","ok":false,"fb":"Hazardous drug handling requires double chemo gloves and a gown."},{"t":"No PPE if you work quickly","ok":false,"fb":"PPE is mandatory regardless of speed."}]}]},
{"id":"toc","icon":"20","area":"R1","title":"Transitions of Care & Med Reconciliation","blurb":"Best-possible med history, admission/discharge reconciliation, and preventing readmissions.","brief":"<p class=\"lead\">Most errors happen at the seams — admission, transfer, discharge. Reconciliation closes them.</p>\n  <div class=\"callout pearl\"><b>Best Possible Medication History (BPMH)</b> Use two or more sources (patient/caregiver, bottles, pharmacy fill records, PDMP) to build an accurate home-med list.</div>\n  <table class=\"ref\"><tr><th>Step</th><th>Goal</th></tr>\n  <tr><td>Admission rec</td><td>Reconcile home meds vs ordered meds; catch omissions/duplications</td></tr>\n  <tr><td>Discharge rec</td><td>Clear list, what changed and why, counsel on high-risk meds</td></tr>\n  <tr><td>High-risk classes</td><td>Anticoagulants, insulin, opioids — leading causes of post-discharge harm</td></tr></table>","cases":[{"type":"mcq","kick":"Building a BPMH","q":"What defines a Best Possible Medication History?","opts":[{"t":"Using two or more independent sources (patient/caregiver, bottles, pharmacy records) to verify the home-med list","ok":true,"fb":"Correct. A BPMH cross-checks multiple sources rather than trusting a single, often-incomplete list."},{"t":"Copying the last discharge summary verbatim","ok":false,"fb":"Old summaries are frequently outdated; verify against current sources."},{"t":"Asking only what the patient remembers","ok":false,"fb":"Single-source recall misses drugs and doses; corroborate it."}]},{"type":"mcq","kick":"Discharge omission","q":"At discharge, the home β-blocker was never restarted after being held for a procedure. Best action?","opts":[{"t":"Reconcile and restart it (or document a deliberate reason to stop) and counsel the patient","ok":true,"fb":"Correct. Unintended omission of a chronic cardiac drug is a classic transition error; reconcile intent and communicate the plan."},{"t":"Ignore it — the inpatient team will fix it later","ok":false,"fb":"Discharge is the pharmacist's chance to catch exactly this omission."},{"t":"Double the dose to make up for missed days","ok":false,"fb":"Restart at the appropriate dose; don't compensate by overdosing."}]},{"type":"mcq","kick":"High-risk counseling","q":"Which discharge medication most warrants intensive counseling to prevent readmission?","opts":[{"t":"A newly started anticoagulant (e.g., warfarin/DOAC) — bleeding and monitoring risks","ok":true,"fb":"Correct. Anticoagulants, insulin, and opioids drive most post-discharge adverse drug events; anticoagulation needs clear counseling and follow-up."},{"t":"A one-time stool softener","ok":false,"fb":"Low-risk; not a leading cause of readmission harm."},{"t":"A daily multivitamin","ok":false,"fb":"Minimal risk compared with anticoagulants."}]}]});


const TEACH = {"orient":["Welcome — I'm Dr. Harlin, your preceptor. Let's make you a great clinical pharmacist.","A clinical pharmacist is accountable for safe, effective medication therapy — the right decision for THIS patient, not just an accurate product.","Order review, rounds, drug info, TDM and renal dosing, med rec, ADR prevention, stewardship — and precepting students. That's the job.","Residency is graded on four ASHP competencies: R1 Patient Care, R2 Practice Advancement, R3 Leadership, R4 Teaching.","Don't worry — we'll learn it one rotation at a time. Ready?"],"jcpp":["Always work patients up the same way. We call it the JCPP.","Collect, Assess, Plan, Implement, Follow-up — burn those five steps into muscle memory.","Document with SOAP: Subjective, Objective, Assessment, Plan.","Quick tip: if you can measure or verify it, it's objective. If the patient reports it, it's subjective."],"rounds":["On rounds, turn your assessment into an intervention the team will actually accept.","Use SBAR: Situation, Background, Assessment, Recommendation.","Be vague and you'll be ignored — name the drug, dose, route, frequency, and monitoring.","Frame it around the patient's goal, not 'the guideline says'."],"pk":["TDM is our signature service.","Check renal function (CrCl) first — vanco, DOACs, and enoxaparin all hinge on it.","Vancomycin is AUC/MIC-guided now (400-600), not trough-only.","Respect the NTI drugs — a small change tips them from useless to toxic. Always double-check."],"safety":["We're the safety net of the medication-use system.","The five rights aren't enough — verify indication, duration, and monitoring too.","Antibiotics: broad and early in sepsis, then de-escalate on cultures.","New clonus, fever, and sweating after adding a serotonergic agent? Think serotonin syndrome."],"code":["We respond to codes too — prepping drugs, advising doses, documenting.","Arrest: epinephrine 1 mg every 3-5 minutes. Shockable rhythm? Defibrillate plus amiodarone.","Hyperkalemia has an order: stabilize (calcium), shift (insulin/dextrose), then eliminate.","Anaphylaxis first-line is IM epinephrine, into the anterolateral thigh."],"jclub":["Evidence-based practice is core to R2. Let me show you how to run a journal club.","Frame the question with PICO: Population, Intervention, Comparison, Outcome.","Judge validity: internal (is it free of bias?) and external (does it apply to your patients?).","Don't be fooled by relative risk. 8% to 4% is ARR 4% and NNT 25."],"project":["R2 is about improving the system — an MUE or QI project.","Flow: find the gap, review the literature, write aims and methods, get IRB approval, collect data, then present and publish.","Approvals come before you pull any data. Don't flip that order.","For a formulary decision, bring a monograph or class review, not a single case."],"lead":["R3 is running the practice well — managing time and resources, and acting like a professional.","Triage by patient risk and urgency. An unstable patient or a critical lab comes first.","The P&T committee owns the formulary. Support it with evidence and run it fairly.","Made an error? Disclose it, fix it, monitor, and report. That's professionalism."],"precept":["R4 — finally, teaching. You'll precept students in a layered-learning model.","Four preceptor roles, in order: Direct Instruction, Modeling, Coaching, Facilitation.","No foundation? Instruct. Then model out loud, then coach with feedback, then let them fly.","Stay flexible — if a learner struggles in coaching, step back to modeling."],"present":["Presenting is an R4 skill too. Start from the audience and objectives, not the slides.","Write measurable objectives — 'select', not 'understand'.","One idea per slide, minimal text, and engage them with cases or polling.","Structure: objectives, background, content, summary, references."]};
Object.assign(TEACH, {"systems":["Before the clinical stuff — you have to master the tools we run on.","The EHR is home base: labs, notes, the MAR, and every order you verify. CPOE feeds it; you're the safety check.","On the floor: automated cabinets (Pyxis, Omnicell) store meds, and smart pumps carry a drug library with hard and soft dose limits.","And for dosing? Bayesian software like DoseMeRx gives you a vancomycin AUC from just one or two levels. Let's make sure you know what each system is for."],"renal":["Honestly, most dosing catches you'll make are renal. So estimate function first, every time.","Cockcroft-Gault gives you the CrCl we dose off of. eGFR is for staging kidney disease, not the same thing.","Enoxaparin, the DOACs, gabapentin, tons of antibiotics, vanco — all renally cleared. Low CrCl means adjust.","And watch the combos that stack on the kidney. Let's practice spotting them."],"anticoag":["Anticoagulation is high-alert, and you'll touch it every single day.","Warfarin you follow by INR. Heparin by aPTT or anti-Xa. The DOACs you dose right and don't routinely monitor.","Know the reversal for each: idarucizumab for dabigatran, andexanet for the Xa inhibitors, PCC plus vitamin K for warfarin, protamine for heparin.","And never miss HIT — platelets crash, you stop all heparin and switch agents. Ready?"],"abx":["Stewardship is one of our proudest jobs — the right drug, dose, route, and duration.","Go broad and early in sepsis, then narrow the moment cultures come back. That's de-escalation.","Most 'penicillin allergies' aren't real, and vancomycin flushing isn't an allergy at all. Don't let a label drive bad therapy.","And switch IV to PO as soon as the patient's improving and the gut works. Let's dig in."],"tox":["In an overdose, everyone looks to the pharmacist for the antidote. So let's own that table.","Acetaminophen gets N-acetylcysteine, opioids get naloxone, digoxin gets DigiFab, beta-blockers get glucagon.","The rescue ones save lives: lipid emulsion for local-anesthetic toxicity, dantrolene for malignant hyperthermia, fomepizole for methanol.","Half of the skill is timing and re-dosing. Let's run some cases."],"interactions":["Interactions are where you quietly prevent a disaster nobody ever sees.","Learn the CYP players: inhibitors like azoles and clarithromycin raise levels; inducers like rifampin drop them.","Stack two QT-prolongers and you flirt with torsades — check the ECG and the potassium and magnesium.","And serotonergic combos — an SSRI plus linezolid — can tip into serotonin syndrome. Let's spot them."],"law":["Law isn't just paperwork — it protects your patient and your license.","Schedule II: no refills, ever. Three through five: up to five refills in six months. Check the PDMP.","You carry corresponding responsibility — only fill a controlled prescription that's legitimate.","And keep current: clozapine's REMS ended but ANC monitoring didn't, and the buprenorphine X-waiver is gone. Let's go."],"compounding":["Sterile compounding keeps IVs sterile and keeps us safe. Two chapters run it: 797 and 800.","Under 797, you compound in an ISO 5 hood inside a cleaner room, and you pass a zero-CFU fingertip test three times plus a media fill.","Under 800, hazardous drugs go in a containment hood under negative pressure, with double chemo gloves, a gown, and a closed-system transfer device.","And a beyond-use date is not a manufacturer expiration — it's usually much shorter. Let's get it right."],"toc":["Most errors happen at the seams — admission, transfer, discharge. Reconciliation is how we close them.","Build a best-possible med history from two or more sources — not just what the patient remembers.","At discharge, make the list clear: what changed, what to watch, and counsel on the high-risk ones.","Anticoagulants, insulin, opioids — those are the readmission-makers. Let's practice."]});

function setBG(area){ stage.className="stage"+(AREA[area]?AREA[area].bg:"bg-title"); }
function bokehHTML(){let s="";for(let i=0;i<7;i++){const sz=20+Math.random()*60,x=Math.random()*100,y=Math.random()*100,d=Math.random()*4;s+=`<div class="bokeh" style="width:${sz}px;height:${sz}px;left:${x}%;top:${y}%;animation-delay:${d}s;opacity:${.25+Math.random()*.35}"></div>`;}return s;}

function bond(){ let c=0; MODULES.forEach(m=>G.results[m.id].forEach(r=>{if(r===true)c++;})); return c; }
function bondMax(){ let t=0; MODULES.forEach(m=>t+=m.cases.length); return t; }
function areaScore(a){let c=0,t=AREA_TOTALS[a]||0;MODULES.filter(m=>m.area===a).forEach(m=>G.results[m.id].forEach(r=>{if(r===true)c++;}));return{c,t,pct:t?Math.round(c/t*100):0};}
function overall(){let c=0,t=0;MODULES.forEach(m=>m.cases.forEach((_,i)=>{t++;if(G.results[m.id][i]===true)c++;}));return{c,t,pct:t?Math.round(c/t*100):0};}
function modDone(m){return G.results[m.id].every(r=>r!==null);}
function modCorrect(m){return G.results[m.id].filter(r=>r===true).length;}

/* particles */
function burst(kind){
  const ic = [];
  for(let i=0;i<10;i++){
    const p=document.createElement("div");p.className="p";
    p.textContent=ic[Math.floor(Math.random()*ic.length)];
    p.style.left=(38+Math.random()*24)+"%";p.style.bottom=(28+Math.random()*22)+"%";
    p.style.animationDelay=(Math.random()*.4)+"s";p.style.fontSize=(18+Math.random()*18)+"px";
    fx.appendChild(p);setTimeout(()=>p.remove(),1600);
  }
}

    <button class="menu-btn" onclick="goHub()"></button>
  </div>`;
}

}

let curM=null, learnIdx=0, caseIdx=0;
function openModule(id){ curM=MODULES.find(m=>m.id===id); learnIdx=0; runLearn(); }

function runLearn(){
  const m=curM;
  const lines=TEACH[m.id]||[];
  const last=learnIdx>=lines.length-1;
  const expr = learnIdx===0?"smile":(learnIdx%2?"think":"smile");
  drawScene(m.area, expr,"Dr. Harlin", lines[learnIdx], {
    advance:true, onBox:"learnNext()",
    below:`<div style="position:absolute;top:60px;right:18px;z-index:18">
      <button class="btn ghost sm" onclick="openNotes()">Notes</button></div>`
  });
  if(last){
    const wrap=document.querySelector(".vn-wrap");
    const c=document.createElement("div");c.className="choices";
    c.innerHTML=`<button class="btn mint" onclick="startCases()">Start cases ▶</button>`;
    document.getElementById("choiceLayer").appendChild(c);

function caseGuide(m,c,introLine,introExpr){
  if(c.type==='chartHunt' || m.id==='chart') return {who:'nurse',name:'Nurse Vance',expr:'neutral',text:`Nurse Vance slides the MAR over. <b>${c.kick}</b> — catch the medication problems before rounds.`};
  if(c.type==='code' || m.id==='seizure') return {who:'attending',name:'Dr. Chen, ICU Attending',expr:'neutral',text:`Dr. Chen looks up from the monitor. <b>${c.kick}</b>. Make the call quickly and safely.`};
  if(c.type==='journal' || m.id==='id') return {who:'attending',name:'Dr. Chen, ICU Attending',expr:'neutral',text:`Dr. Chen hands you the paper. <b>${c.kick}</b> — don't let the abstract do the thinking for you.`};
  if(c.type==='sbar' || m.id==='pain') return {who:'nurse',name:'Nurse Vance',expr:'neutral',text:`Nurse Vance catches you after rounds. <b>${c.kick}</b>. Turn the concern into a clean recommendation.`};
  if(['preg','immun','peds'].includes(m.id)) return {who:'patient',name:'Patient Case',expr:'neutral',text:`Your patient has a question. <b>${c.kick}</b> — answer clearly and safely.`};
  return {who:'harlin',name:'Dr. Harlin',expr:introExpr,text:introLine};
}

function runCase(){
  const m=curM, c=m.cases[caseIdx];
  const already=G.results[m.id][caseIdx];
  // dialogue = mentor ask, then question emphasized + choices
  const it=bondTier();
  const introLine=[
    `Okay, let's think through this one — <b>${c.kick}</b>.`,
    `Here's a good one for you. <b>${c.kick}</b>.`,
    `Ooh, I like this one. <b>${c.kick}</b> — show me what you've got.`
  ][it];
  const introExpr=["neutral","think","encourage"][it];
  const guide=caseGuide(m,c,introLine,introExpr);
  drawScene(m.area,guide.expr,guide.name,
    guide.text,
    { advance:false, who:guide.who,
      note:`<b style="color:#7a4d8f">Q${caseIdx+1}.</b> ${c.q}`,
      below: caseProgress() });
  const wrap=document.querySelector(".vn-wrap");
  const holder=document.createElement("div");holder.id="caseHolder";
  if(c.type==="mcq"){
    holder.className="choices";
    holder.innerHTML=c.opts.map((o,i)=>`<button class="choice" data-i="${i}"><span class="k">${String.fromCharCode(65+i)}</span>${o.t}</button>`).join("");
    document.getElementById("choiceLayer").appendChild(holder);
    holder.querySelectorAll(".choice").forEach(b=>b.onclick=()=>answerMcq(parseInt(b.dataset.i)));
  } else if(c.type==="order"){
    holder.innerHTML=`
      <div class="ord-dst" id="ordDst"><span style="color:#b58aa6;font-size:12px;font-weight:700;padding:6px">Tap the steps in the correct order…</span></div>
      <div class="ord-src" id="ordSrc">${shuffle(c.correct.map((t)=>t)).map(t=>`<button class="oitem" data-t="${encodeURIComponent(t)}">${t}</button>`).join("")}</div>
      <div class="ord-btns"><button class="btn sm" id="ordChk" disabled onclick="checkOrder()">Check order</button>
      <button class="btn ghost sm" onclick="resetOrder()">Reset</button></div>`;
    document.getElementById("choiceLayer").appendChild(holder);
    holder.querySelectorAll("#ordSrc .oitem").forEach(b=>b.onclick=()=>placeOrder(b));
  } else if(c.type==="calc"){
    holder.className="choices";
    holder.innerHTML=`
      <div class="calc-given">${(c.given||[]).map(g=>`<span class="cg"><b>${g.label}:</b> ${g.value}</span>`).join("")}</div>
      <div class="calc-row">
        <input id="calcIn" class="calc-input" type="text" inputmode="decimal" placeholder="?" autocomplete="off"/>
        <span class="calc-unit">${c.answer.unit||""}</span>
        <button class="btn sm" id="calcChk" onclick="answerCalc()">Check</button>
      </div>
      ${c.hint?`<div style="text-align:center;margin-top:8px"><button class="btn ghost sm" onclick="document.getElementById('calcHint').style.display='block'">Formula hint</button></div><div id="calcHint" class="calc-hint" style="display:none">${c.hint}</div>`:""}`;
    document.getElementById("choiceLayer").appendChild(holder);
    const ci=document.getElementById("calcIn"); if(ci){ ci.focus(); ci.addEventListener("keydown",e=>{if(e.key==="Enter")answerCalc();}); }
  } else if(c.type==="chartHunt"){ renderHunt(c);
  } else if(c.type==="sbar"){ renderSbar(c);
  } else if(c.type==="code"){ renderCode(c);
  } else if(c.type==="journal"){ renderJournal(c);
  }
}
function answerCalc(){
  const m=curM,c=m.cases[caseIdx]; if(G.results[m.id][caseIdx]!==null) return;
  const raw=(document.getElementById("calcIn").value||"").replace(/[, ]/g,"");
  const val=parseFloat(raw); if(isNaN(val)) return;
  const ok=Math.abs(val-c.answer.value)<=(c.answer.tolerance||0);
  G.results[m.id][caseIdx]=ok;
  const ci=document.getElementById("calcIn"); if(ci)ci.disabled=true;
  const cc=document.getElementById("calcChk"); if(cc)cc.disabled=true;
  const fb= ok? c.note : `Not quite — the answer is <b>${c.answer.value} ${c.answer.unit||""}</b>. ${c.note}`;
  feedback(ok, fb);
}
function caseProgress(){
  const m=curM;
  const dots=m.cases.map((_,i)=>{const r=G.results[m.id][i];
    const col=i===caseIdx?AREA[m.area].c:(r===true?'#3fd0bf':r===false?'#ff8fa8':'#f0d8e4');
    return `<span style="width:26px;height:7px;border-radius:6px;background:${col};display:inline-block"></span>`;}).join("");
  return `<div style="position:absolute;top:58px;left:0;right:0;text-align:center;z-index:18">${dots}</div>`;
}

/* MCQ answer */
function answerMcq(i){
  const m=curM,c=m.cases[caseIdx];
  if(G.results[m.id][caseIdx]!==null) return;
  const ok=c.opts[i].ok;
  G.results[m.id][caseIdx]=ok;
  const holder=document.getElementById("caseHolder");
  holder.querySelectorAll(".choice").forEach((b,bi)=>{b.disabled=true;
    if(c.opts[bi].ok)b.classList.add("correct"); if(bi===i&&!ok)b.classList.add("wrong");});
  feedback(ok,c.opts[i].fb);
}
/* ORDER */
let ordSeq=[];
function placeOrder(btn){
  if(btn.classList.contains("placed"))return;
  const t=decodeURIComponent(btn.dataset.t);ordSeq.push(t);btn.classList.add("placed");
  const dst=document.getElementById("ordDst");
  dst.innerHTML=ordSeq.map((s,i)=>`<span class="oitem placed"><span class="idx">${i+1}</span>${s}</span>`).join("");
  if(ordSeq.length===curM.cases[caseIdx].correct.length)document.getElementById("ordChk").disabled=false;
}
function resetOrder(){ordSeq=[];const c=curM.cases[caseIdx];
  document.getElementById("ordDst").innerHTML=`<span style="color:#b58aa6;font-size:12px;font-weight:700;padding:6px">Tap the steps in the correct order…</span>`;
  document.querySelectorAll("#ordSrc .oitem").forEach(b=>b.classList.remove("placed"));
  document.getElementById("ordChk").disabled=true;}
function checkOrder(){
  const m=curM,c=m.cases[caseIdx];if(G.results[m.id][caseIdx]!==null)return;
  const ok=JSON.stringify(ordSeq)===JSON.stringify(c.correct);
  G.results[m.id][caseIdx]=ok;
  const fbtext= ok? c.note :"Not quite. The correct order is"+c.correct.map((s,i)=>`${i+1}.${s}`).join(" →")+"."+c.note;
  feedback(ok,fbtext);
}

/* feedback dialogue */
function feedback(ok, expl){
  ordSeq=[];
  const m=curM;
  const cleanExpl = String(expl || '').replace(/^(Correct\.|Not quite\.)\s*/i, '');
  const t = bondTier();
  const line = ok? pick(PRAISE_T[t]) : pick(CONSOLE_T[t]);
  // expression varies by correctness + how close you and Harlin are
  let okExpr =   ["proud","happy","laugh"][t];
  let badExpr =  ["think","worry","encourage"][t];
  if(!ok && (m.id==='safety'||m.id==='code')) badExpr='alarmed';
  if(ok && (m.id==='safety'||m.id==='code')) okExpr='stern';
  if(ok && bond()>=14 && Math.random()<0.4) okExpr='surprised';
  const last = caseIdx===m.cases.length-1;
  drawScene(m.area, ok?okExpr:badExpr,"Dr. Harlin", line, {
    advance:false, note:`<b>${ok?'Correct':'Not quite'}</b> · ${cleanExpl}` });
  burst(ok?"good":"bad");
  const wrap=document.querySelector(".vn-wrap");
  const c=document.createElement("div");c.className="choices";
  c.innerHTML=`<button class="btn mint" onclick="nextCase()">${last?'Finish rotation ':'Next case ▶'}</button>`;
  document.getElementById("choiceLayer").appendChild(c);
}
function nextCase(){
  const m=curM;
  if(caseIdx<m.cases.length-1){caseIdx++;runCase();}
  else moduleComplete();
}
function moduleComplete(){
  const m=curM,nc=modCorrect(m),meta=AREA[m.area];
  const perfect=nc===m.cases.length;
  drawScene(m.area, perfect?"wink":"smile","Dr. Harlin",
    perfect? `Amazing, Dr. ${G.name}! You got all ${m.cases.length} right.<br>You are really good at this — I am proud `
           : `Rotation complete! You got ${nc} of ${m.cases.length}. Nice work.<br>Review the notes and retry anytime.`,
    {advance:true, onBox:"goHub()", pop:true,
     below:`<div style="position:absolute;top:66px;left:0;right:0;text-align:center;z-index:18">
       <span class="area-pill" style="color:${meta.c};font-size:15px">${m.title} · ${nc}/${m.cases.length}</span></div>`});
  if(perfect)burst("good");
}

  else if(ov.pct>=90 && Math.min(r1.pct,r2.pct,r3.pct,r4.pct)>=75){medal="";title="PGY-1 Graduate — Ready for BCPS / PGY-2";expr="wink";
    rk="Outstanding across all four competencies! You practice safely and independently, teach the next learner, and improve the system. The gold standard";}

      <div class="ending-card">

          <div><span>R3 Leadership</span><b>${r3.c}/${r3.t}</b></div>

        </div>

ion (e.g., propofol or dexmedetomidine), minimizing benzodiazepines","ok":true,"fb":"Correct. Benzodiazepine-sparing, light, analgesia-based sedation lowers delirium and ventilator days (PADIS guidelines)."},{"t":"Deep continuous benzodiazepine infusion for everyone","ok":false,"fb":"Benzodiazepines increase delirium; deep sedation prolongs ventilation."},{"t":"No analgesia to keep the patient alert","ok":false,"fb":"Untreated pain is harmful and worsens agitation."}]},{"type":"order","kick":"Hour-1 sepsis bundle","q":"Order the hour-1 sepsis actions:","correct":["Measure lactate","Obtain blood cultures","Give broad-spectrum antibiotics","Start fluids for hypotension/high lactate","Add vasopressors if MAP stays low"],"note":"Lactate → cultures → antibiotics → fluids → vasopressors. Cultures before antibiotics, but never delay antibiotics in shock."}]},
{"id":"glycemic","icon":"23","area":"R1","title":"Glycemic Control & DKA","blurb":"Insulin drips, DKA resolution, basal-bolus vs sliding scale, and hypoglycemia rescue.","brief":"<p class=\"lead\">Insulin is a top high-alert drug. Precision prevents both hyper- and hypoglycemia.</p>\n  <table class=\"ref\"><tr><th>Topic</th><th>Point</th></tr>\n  <tr><td><b>DKA</b></td><td>IV fluids + insulin infusion + potassium repletion; add dextrose when glucose ~200 to keep the drip closing the anion gap</td></tr>\n  <tr><td><b>Potassium first</b></td><td>Hold insulin if K⁺ &lt; 3.3 — insulin drives K⁺ into cells and can cause lethal hypokalemia</td></tr>\n  <tr><td><b>Inpatient regimen</b></td><td>Scheduled basal-bolus beats sliding-scale-only coverage</td></tr></table>","cases":[{"type":"mcq","kick":"DKA + low potassium","q":"New DKA: glucose 520, pH 7.1, potassium 3.1 mEq/L. Best first step?","opts":[{"t":"Give IV potassium and hold insulin until K⁺ ≥ 3.3","ok":true,"fb":"Correct. Insulin shifts potassium intracellularly; starting it with K⁺ 3.1 can cause fatal hypokalemia. Replete potassium first."},{"t":"Start the insulin drip immediately","ok":false,"fb":"Insulin with K⁺ 3.1 is dangerous — replete potassium first."},{"t":"Give sodium bicarbonate","ok":false,"fb":"Bicarbonate isn't routinely indicated and doesn't address the potassium risk."}]},{"type":"mcq","kick":"Adding dextrose","q":"On a DKA insulin drip, glucose falls to 200 but the anion gap is still open. Best action?","opts":[{"t":"Add dextrose to the fluids and continue insulin to close the gap","ok":true,"fb":"Correct. Keep insulin running to clear ketoacidosis; add dextrose so glucose doesn't crash while the gap normalizes."},{"t":"Stop the insulin drip now","ok":false,"fb":"Stopping insulin with an open gap lets ketoacidosis persist/rebound."},{"t":"Double the insulin rate","ok":false,"fb":"That risks hypoglycemia; the fix is dextrose plus continued insulin."}]},{"type":"mcq","kick":"Inpatient insulin","q":"Which inpatient insulin strategy is preferred for a patient eating meals?","opts":[{"t":"Scheduled basal-bolus (basal + mealtime + correction)","ok":true,"fb":"Correct. Basal-bolus provides physiologic coverage; sliding-scale-only is reactive and leads to worse control."},{"t":"Sliding-scale insulin alone","ok":false,"fb":"Sliding-scale-only chases highs and is discouraged as sole therapy."},{"t":"Hold all insulin while inpatient","ok":false,"fb":"Withholding insulin risks DKA/hyperglycemia."}]},{"type":"mcq","kick":"Severe hypoglycemia","q":"An unconscious inpatient has a glucose of 38 mg/dL with IV access. Best rescue?","opts":[{"t":"IV dextrose (e.g., D50) now, then recheck and treat the cause","ok":true,"fb":"Correct. With IV access, IV dextrose is fastest; recheck glucose and address the trigger (e.g., insulin timing)."},{"t":"Wait and recheck in an hour","ok":false,"fb":"Severe hypoglycemia is an emergency — treat immediately."},{"t":"Give more insulin","ok":false,"fb":"That deepens hypoglycemia and could be fatal."}]}]},
{"id":"onco","icon":"24","area":"R1","title":"Oncology & Hazardous-Drug Care","blurb":"Chemo verification, tumor lysis, extravasation, and CINV prophylaxis.","brief":"<p class=\"lead\">Oncology pharmacy is unforgiving — double-verification and safety are everything.</p>\n  <table class=\"ref\"><tr><th>Topic</th><th>Point</th></tr>\n  <tr><td><b>Chemo verification</b></td><td>Independent double-check of regimen, BSA/dose, cumulative dose limits, and labs before release</td></tr>\n  <tr><td><b>Tumor lysis (TLS)</b></td><td>Hydration + rasburicase (or allopurinol) for high-risk; watch K⁺/phos/uric acid/Ca</td></tr>\n  <tr><td><b>CINV prophylaxis</b></td><td>Highly emetogenic: 5-HT3 + NK1 antagonist + dexamethasone (± olanzapine)</td></tr></table>\n  <div class=\"callout warn\"><b>Hazardous handling</b> Compound under USP <800>: containment hood, negative pressure, double chemo gloves, gown, and a CSTD.</div>","cases":[{"type":"mcq","kick":"Chemo double-check","q":"Before releasing a cytotoxic order, what is essential?","opts":[{"t":"Independent double-verification of regimen, dose/BSA, cumulative-dose limits, and labs","ok":true,"fb":"Correct. Chemotherapy requires two-pharmacist independent verification; small errors are catastrophic, and drugs like doxorubicin/bleomycin have lifetime cumulative limits."},{"t":"Release it quickly to avoid delay","ok":false,"fb":"Speed over verification is exactly how fatal chemo errors happen."},{"t":"Verify the patient name only","ok":false,"fb":"Dose/BSA, cumulative limits, and labs must all be checked."}]},{"type":"mcq","kick":"Tumor lysis","q":"High tumor burden leukemia starting chemo; high TLS risk. Best prophylaxis?","opts":[{"t":"Aggressive IV hydration plus rasburicase (allopurinol for lower risk)","ok":true,"fb":"Correct. Hydration plus rasburicase rapidly lowers uric acid in high-risk TLS; monitor potassium, phosphate, calcium, and uric acid closely."},{"t":"Fluid restriction","ok":false,"fb":"The opposite — you need aggressive hydration to protect the kidneys."},{"t":"No prophylaxis needed","ok":false,"fb":"High-risk TLS can cause AKI and fatal arrhythmias; prophylaxis is essential."}]},{"type":"mcq","kick":"Highly emetogenic CINV","q":"A highly emetogenic regimen (e.g., cisplatin) needs antiemetic prophylaxis. Best combination?","opts":[{"t":"5-HT3 antagonist + NK1 antagonist + dexamethasone (± olanzapine)","ok":true,"fb":"Correct. Triple/quadruple therapy is standard for highly emetogenic chemo; single-agent coverage is inadequate."},{"t":"A single dose of oral ondansetron only","ok":false,"fb":"Monotherapy under-treats highly emetogenic regimens."},{"t":"No prophylaxis; treat nausea if it occurs","ok":false,"fb":"Reactive-only management leads to poor control and dehydration."}]},{"type":"mcq","kick":"Vesicant extravasation","q":"A vesicant chemo (e.g., an anthracycline) extravasates at the IV site. Immediate steps include:","opts":[{"t":"Stop the infusion, leave the catheter to aspirate, and follow the drug-specific antidote/measures (e.g., dexrazoxane for anthracyclines)","ok":true,"fb":"Correct. Stop, aspirate residual drug, and apply the agent-specific protocol — anthracycline extravasation may use dexrazoxane and cold compresses."},{"t":"Flush the line rapidly with more fluid","ok":false,"fb":"Flushing spreads the vesicant and worsens tissue injury."},{"t":"Ignore it and continue","ok":false,"fb":"Vesicant extravasation can cause severe necrosis; act immediately."}]}]});
Object.assign(TEACH, {"calc":["Alright — the part people fear and shouldn't: the math. You'll do this all day.","Cockcroft-Gault for kidney function, mg/kg for doses, and unit-per-hour to mL/hr for drips.","Corrections matter too — phenytoin and calcium both need adjusting for a low albumin.","Type your number and I'll check it. Small rounding is fine. Let's go."],"critcare":["The ICU is where our pharmacology gets tested in real time.","In septic shock: cultures and antibiotics fast, fluids, then norepinephrine first-line.","For sedation, treat pain first and keep it light — benzodiazepines breed delirium.","Every hour counts here. Let's work through it."],"glycemic":["Insulin is one of the highest-alert drugs we touch — precision both ways.","In DKA, check the potassium before you start insulin. Under 3.3 and you replete first.","Keep the insulin running to close the gap, and add dextrose once glucose drops.","And for the ward, scheduled basal-bolus beats sliding-scale alone. Ready?"],"onco":["Oncology is unforgiving — we double-check everything, twice.","Verify the regimen, the dose against BSA, cumulative limits, and the labs before anything leaves.","Prevent the emergencies: tumor lysis with hydration and rasburicase, and strong CINV prophylaxis.","And we compound these hazardous drugs under strict containment. Let's practice."]});

/* ===== new interactive engines ===== */
function renderHunt(c){
  const holder=document.createElement("div"); holder.id="caseHolder"; holder.className="choices";
  holder.innerHTML='<div class="hunt-hint">Tap every problem you spot, then Submit.</div>'+
    '<div class="hunt-list">'+c.rows.map((r,i)=>'<button class="hunt-row" data-i="'+i+'">'+r.text+'</button>').join("")+'</div>'+
    '<div style="text-align:center"><button class="btn sm" onclick="submitHunt()">Submit</button></div>';
  document.getElementById("choiceLayer").appendChild(holder);
  holder.querySelectorAll(".hunt-row").forEach(b=>b.onclick=()=>b.classList.toggle("sel"));
}
function submitHunt(){
  const m=curM,c=m.cases[caseIdx]; if(G.results[m.id][caseIdx]!==null) return;
  const sel=[...document.querySelectorAll(".hunt-row.sel")].map(b=>+b.dataset.i);
  const probs=c.rows.map((r,i)=>r.problem?i:-1).filter(i=>i>=0);
  const ok = sel.length===probs.length && probs.every(i=>sel.includes(i));
  G.results[m.id][caseIdx]=ok;
  document.querySelectorAll(".hunt-row").forEach((b,i)=>{ b.disabled=true; if(c.rows[i].problem)b.classList.add("correct"); else if(b.classList.contains("sel"))b.classList.add("wrong"); });
  const why=c.rows.filter(r=>r.problem).map(r=>"• "+r.why).join("<br>");
  feedback(ok, (c.note?c.note+"<br>":"")+why);
}
function renderSbar(c){
  const holder=document.createElement("div"); holder.id="caseHolder"; holder.className="choices";
  holder.innerHTML=c.slots.map((s,si)=>'<div class="sbar-slot"><div class="sbar-key">'+s.key+'</div>'+
    s.fragments.map((fr,fi)=>'<button class="sbar-frag" data-s="'+si+'" data-f="'+fi+'">'+fr.t+'</button>').join("")+'</div>').join("")+
    '<div style="text-align:center"><button class="btn sm" onclick="submitSbar()">Submit recommendation</button></div>';
  document.getElementById("choiceLayer").appendChild(holder);
  holder.querySelectorAll(".sbar-frag").forEach(b=>b.onclick=()=>{
    holder.querySelectorAll('.sbar-frag[data-s="'+b.dataset.s+'"]').forEach(x=>x.classList.remove("sel"));
    b.classList.add("sel");
  });
}
function submitSbar(){
  const m=curM,c=m.cases[caseIdx]; if(G.results[m.id][caseIdx]!==null) return;
  let ok=true;
  c.slots.forEach((s,si)=>{
    const chosen=document.querySelector('.sbar-frag.sel[data-s="'+si+'"]');
    let bi=0; s.fragments.forEach((fr,fi)=>{ if(fr.score>s.fragments[bi].score) bi=fi; });
    if(!chosen || +chosen.dataset.f!==bi) ok=false;
  });
  G.results[m.id][caseIdx]=ok;
  document.querySelectorAll(".sbar-frag").forEach(b=>{ b.disabled=true; const s=+b.dataset.s,fi=+b.dataset.f; let bi=0; c.slots[s].fragments.forEach((fr,j)=>{ if(fr.score>c.slots[s].fragments[bi].score) bi=j; }); if(fi===bi)b.classList.add("correct"); else if(b.classList.contains("sel"))b.classList.add("wrong"); });
  feedback(ok, c.note||"A strong recommendation is specific in every part: a clear recommendation, evidence-based rationale, honest risks, and concrete next steps.");
}
var codeState=null;
function renderCode(c){
  codeState={c:c, step:0, timeLeft:(c.seconds||45)};
  const holder=document.createElement("div"); holder.id="caseHolder"; holder.className="choices";
  holder.innerHTML='<div class="code-timer"><i id="codeBar"></i></div><div id="codeStep"></div>';
  document.getElementById("choiceLayer").appendChild(holder);
  renderCodeStep();
  codeState.timer=setInterval(function(){ codeState.timeLeft-=0.1; const bar=document.getElementById("codeBar"); if(bar)bar.style.width=Math.max(0,codeState.timeLeft/(codeState.c.seconds||45)*100)+"%"; if(codeState.timeLeft<=0){ clearInterval(codeState.timer); codeFinish(false,"Time ran out — in a real code, seconds are everything. "+(codeState.c.note||"")); } },100);
}
function renderCodeStep(){
  const s=codeState.c.steps[codeState.step]; const el=document.getElementById("codeStep");
  el.innerHTML='<div class="code-prompt">'+s.prompt+'</div>'+s.options.map((o,i)=>'<button class="choice" onclick="codeAnswer('+i+')"><span class="k">'+String.fromCharCode(65+i)+'</span>'+o.t+'</button>').join("");
}
function codeAnswer(i){
  if(!codeState) return; const s=codeState.c.steps[codeState.step];
  if(!s.options[i].correct){ clearInterval(codeState.timer); codeFinish(false, (s.options[i].fb||"")+" "+(codeState.c.note||"")); return; }
  codeState.step++;
  if(codeState.step>=codeState.c.steps.length){ clearInterval(codeState.timer); codeFinish(true, codeState.c.note||"Fast and correct — that's a code-ready pharmacist."); }
  else renderCodeStep();
}
function codeFinish(ok,expl){ const m=curM; if(G.results[m.id][caseIdx]!==null) return; G.results[m.id][caseIdx]=ok; codeState=null; feedback(ok,expl); }
var jcState=null;
function renderJournal(c){
  jcState={c:c, flawsOk:null};
  const holder=document.createElement("div"); holder.id="caseHolder"; holder.className="choices";
  holder.innerHTML='<div class="jc-abstract">'+c.abstract+'</div><div class="hunt-hint">Tap the weaknesses you spot, then Next.</div>'+
    '<div class="hunt-list">'+c.flaws.map((fl,i)=>'<button class="hunt-row" data-i="'+i+'">'+fl.text+'</button>').join("")+'</div>'+
    '<div style="text-align:center"><button class="btn sm" onclick="jcSubmitFlaws()">Next ▶</button></div>';
  document.getElementById("choiceLayer").appendChild(holder);
  holder.querySelectorAll(".hunt-row").forEach(b=>b.onclick=()=>b.classList.toggle("sel"));
}
function jcSubmitFlaws(){
  const c=jcState.c;
  const sel=[...document.querySelectorAll(".hunt-row.sel")].map(b=>+b.dataset.i);
  const flaws=c.flaws.map((fl,i)=>fl.isFlaw?i:-1).filter(i=>i>=0);
  jcState.flawsOk = sel.length===flaws.length && flaws.every(i=>sel.includes(i));
  const holder=document.getElementById("caseHolder");
  holder.innerHTML='<div class="jc-abstract">'+c.nnt.stem+'</div>'+c.nnt.options.map((o,i)=>'<button class="choice" onclick="jcAnswerNnt('+i+')"><span class="k">'+String.fromCharCode(65+i)+'</span>'+o.t+'</button>').join("");
}
function jcAnswerNnt(i){
  const c=jcState.c,m=curM; if(G.results[m.id][caseIdx]!==null) return;
  const numOk=!!c.nnt.options[i].correct;
  const ok=jcState.flawsOk && numOk;
  G.results[m.id][caseIdx]=ok;
  const why=c.flaws.filter(fl=>fl.isFlaw).map(fl=>"• "+fl.why).join("<br>");
  feedback(ok, (c.nnt.options[i].fb||"")+"<br>"+why);
}
