let STUDY={cards:[],idx:0,flipped:false,filter:'all'};
function stripHTML(s){ const d=document.createElement('div'); d.innerHTML=String(s||''); return String(d.textContent||d.innerText||'').replace(/\s+/g,' ').trim(); }
function escTSV(s){ return String(s||'').replace(/\t/g,' ').replace(/\r?\n/g,'<br>').replace(/\s{2,}/g,' ').trim(); }
function cardId(parts){ return parts.join('::').toLowerCase().replace(/[^a-z0-9:_-]+/g,'-').slice(0,160); }
function loadCardState(){ try{return JSON.parse(localStorage.getItem('clinicalPathCards')||'{}')}catch{return{}} }
function saveCardState(st){ localStorage.setItem('clinicalPathCards',JSON.stringify(st)); }
function answerText(c){
  if(c.type==='mcq') return (c.opts||[]).filter(o=>o.ok).map(o=>o.t+' — '+(o.fb||'')).join(' | ') || 'Review the explanation.';
  if(c.type==='calc') return (c.answer?('Answer: '+c.answer.value+' '+(c.answer.unit||'')): '') + (c.note?'<br>'+c.note:'');
  if(c.type==='order') return 'Order: '+(c.correct||[]).join(' → ')+(c.note?'<br>'+c.note:'');
  if(c.type==='chartHunt') return (c.rows||[]).filter(r=>r.problem).map(r=>stripHTML(r.text)+' — '+(r.why||'')).join('<br>')+(c.note?'<br>'+c.note:'');
  if(c.type==='sbar') return (c.slots||[]).map(sl=>'<b>'+sl.key+':</b> '+((sl.fragments||[]).sort((a,b)=>(b.score||0)-(a.score||0))[0]?.t||'')).join('<br>')+(c.note?'<br>'+c.note:'');
  if(c.type==='code') return (c.steps||[]).map((st,i)=>'<b>Step '+(i+1)+':</b> '+((st.options||[]).find(o=>o.correct)?.t||'')).join('<br>')+(c.note?'<br>'+c.note:'');
  if(c.type==='journal') return (c.flaws||[]).filter(f=>f.isFlaw).map(f=>f.text+' — '+(f.why||'')).join('<br>')+'<br>'+(c.nnt?.options||[]).filter(o=>o.correct).map(o=>o.t+' — '+o.fb).join('');
  if(c.type==='essay') return (c.questions||[]).map((q,i)=>'<b>Q'+(i+1)+':</b> '+stripHTML(q.prompt)+'<br>'+(q.expert||q.answer||'')).join('<br><br>')+(c.note?'<br>'+c.note:'');
  return c.note||'Review this case.';
}
function buildStudyCards(){
  const st=loadCardState(); const cards=[];
  MODULES.forEach(m=>{
    (TEACH[m.id]||[]).forEach((line,i)=>cards.push({id:cardId([m.id,'teach',i]),kind:'Teaching',module:m.title,moduleId:m.id,area:m.area,type:'teach',front:m.title+' teaching point #'+(i+1),back:line,tags:[m.area,m.id,'teach']}));
    (m.cases||[]).forEach((c,i)=>{
      cards.push({id:cardId([m.id,'case',i]),kind:'Case',module:m.title,moduleId:m.id,area:m.area,type:c.type||'mcq',front:(c.kick?c.kick+': ':'')+stripHTML(c.q),back:answerText(c),tags:[m.area,m.id,c.type||'mcq','case']});
      if(c.type==='mcq') (c.opts||[]).forEach((o,j)=>{ if(o.ok||o.fb) cards.push({id:cardId([m.id,'mcqopt',i,j]),kind:'Why',module:m.title,moduleId:m.id,area:m.area,type:'why',front:'Why is this '+(o.ok?'correct':'wrong')+'? '+stripHTML(o.t),back:o.fb||'Review the rationale.',tags:[m.area,m.id,'rationale']}); });
    });
  });
  return cards.map(c=>Object.assign({box:st[c.id]?.box||1,due:st[c.id]?.due||0,seen:st[c.id]?.seen||0},c));
}
function studyFilterIds(filter){ if(!filter||filter==='all')return null; const stage=hubStageDefs().find(d=>d.id===filter); if(stage)return new Set(stage.ids); return new Set([filter]); }
function dueCards(){ const now=Date.now(); const ids=studyFilterIds(STUDY.filter); return STUDY.cards.filter(c=>!ids||ids.has(c.moduleId)).filter(c=>!c.due||c.due<=now); }
function filteredCards(){ const ids=studyFilterIds(STUDY.filter); return STUDY.cards.filter(c=>!ids||ids.has(c.moduleId)); }
function showStudyCards(filter){ STUDY.cards=buildStudyCards(); STUDY.filter=filter||STUDY.filter||'all'; STUDY.idx=0; STUDY.flipped=false; renderStudyCards(); }
function renderStudyCards(){
  const pool=dueCards(); const all=filteredCards(); const c=pool[STUDY.idx%Math.max(pool.length,1)]; const mods=MODULES;
  document.getElementById('app').innerHTML=`
    <div class="stage scene-photo bg-core" id="stage" style="background-image:url('${bgFor('core')}')">${sceneDeco()}</div><div class="fx" id="fx2"></div>
    <div class="center-layer" style="justify-content:center;padding:4vh 18px"><div class="study-panel">
      <div class="study-head"><div><h2>Study Cards</h2><div class="study-sub">Built from ${MODULES.length} rotations · ${STUDY.cards.length} cards · review what is due today</div><div class="download-help"><b>Want to study outside the demo?</b> Save a Quizlet-ready import file from this deck.</div></div>
        <div class="study-actions"><button class="btn ghost sm" onclick="goHub()">Back to year map</button><button class="btn ghost sm" onclick="exportQuizletTXT()">Save Quizlet import file</button><button class="btn ghost sm" onclick="resetCardProgress()">Reset card progress</button></div></div>
      <div class="study-grid"><div>${c?cardHTML(c):'<div class="flash-empty">No due cards in this filter. Switch rotation blocks or reset card progress.</div>'}</div><div class="study-side">
        <div class="study-stat"><div class="statbox"><b>${pool.length}</b><span>Due</span></div><div class="statbox"><b>${all.length}</b><span>Filtered</span></div><div class="statbox"><b>${STUDY.cards.length}</b><span>Total</span></div><div class="statbox"><b>${Math.round((STUDY.cards.filter(x=>x.seen).length/Math.max(STUDY.cards.length,1))*100)}%</b><span>Seen</span></div></div>
        <div class="due-note">Cards come from lessons, cases, rationales, calculations, SBAR practice, journal-club critiques, and guideline diagrams.</div>
        <div class="filter-list">${hubStageDefs().map(d=>`<button class="${STUDY.filter===d.id || (!STUDY.filter&&d.id==='all')?'on':''}" onclick="showStudyCards('${d.id}')">${d.title.replace(/Months? /,'').replace(' · ',' ')}</button>`).join('')}</div>
        <div class="card-list">${all.slice(0,90).map(x=>`<div class="card-mini ${c&&x.id===c.id?'on':''}" onclick="jumpCard('${x.id}')"><b>${x.kind}</b> · ${x.module}<br>${stripHTML(x.front).slice(0,80)}</div>`).join('')}</div>
      </div></div></div></div>`;
}
function cardHTML(c){ return `<div class="flash-card" onclick="flipCard()"><div><div class="flash-kicker"><span class="tag area">${c.area}</span><span class="tag type">${c.type}</span><span class="tag">${c.module}</span><span class="tag">review level ${c.box}</span></div><div class="flash-face">${STUDY.flipped?'Back':'Front'}</div><div class="${STUDY.flipped?'flash-a':'flash-q'}">${STUDY.flipped?c.back:c.front}</div><div class="flash-hint">Click card to flip</div></div>${STUDY.flipped?`<div class="review-buttons" onclick="event.stopPropagation()"><button class="btn ghost" onclick="gradeCard('again')">Again</button><button class="btn mint" onclick="gradeCard('good')">Good</button><button class="btn" onclick="gradeCard('easy')">Easy</button></div>`:`<div class="review-buttons" onclick="event.stopPropagation()"><button class="btn mint" onclick="flipCard()">Show answer</button><button class="btn ghost" onclick="nextCard()">Skip</button></div>`}</div>`; }
function flipCard(){ STUDY.flipped=!STUDY.flipped; renderStudyCards(); }
function nextCard(){ const pool=dueCards(); STUDY.idx=(STUDY.idx+1)%Math.max(pool.length,1); STUDY.flipped=false; renderStudyCards(); }
function jumpCard(id){ const pool=dueCards(); const i=pool.findIndex(c=>c.id===id); STUDY.idx=i>=0?i:0; STUDY.flipped=false; renderStudyCards(); }
function gradeCard(g){ const pool=dueCards(); const c=pool[STUDY.idx%Math.max(pool.length,1)]; if(!c)return; const st=loadCardState(); const now=Date.now(); const box=g==='again'?1:Math.min((c.box||1)+(g==='easy'?2:1),7); const mins=g==='again'?10:Math.pow(2,box-1)*60*(g==='easy'?2:1); st[c.id]={box,due:now+mins*60000,seen:(c.seen||0)+1,last:g}; saveCardState(st); STUDY.cards=buildStudyCards(); STUDY.flipped=false; renderStudyCards(); }
function resetCardProgress(){ if(confirm('Reset local study-card progress?')){ localStorage.removeItem('clinicalPathCards'); showStudyCards(STUDY.filter); } }
function exportStudyCardsTSV(){ const cards=buildStudyCards(); const rows=['Front\tBack\tTags'].concat(cards.map(c=>[escTSV(stripHTML(c.front)),escTSV(stripHTML(c.back)),escTSV(c.tags.join(' '))].join('\t'))); const blob=new Blob([rows.join('\n')],{type:'text/tab-separated-values;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='clinical-path-pgy1-study-cards.tsv'; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},500); }


function escQuizlet(s){ return stripHTML(String(s||'')).replace(/\t/g,' ').replace(/\r?\n/g,' ').replace(/\s{2,}/g,' ').trim(); }
function exportQuizletTXT(){
  const cards=buildStudyCards();
  const rows=cards.map(c=>escQuizlet(c.front)+'\t'+escQuizlet(c.back));
  const blob=new Blob([rows.join('\n')],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='clinical-path-pgy1-quizlet-import.txt';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},500);
}

yndrome and severity", "Obtain cultures if this will not delay therapy", "Check allergy, renal function, weight, and prior cultures", "Give empiric therapy within the time target", "Set de-escalation and duration follow-up"], "note": "The ED starts therapy; stewardship starts at the same moment."}]}, {"id": "surgery_trauma_periop", "icon": "58", "area": "R1", "title": "Surgery, Trauma and Peri-op Pharmacy", "blurb": "Peri-op antibiotics, anticoagulation holds/restarts, trauma resuscitation, pain, VTE prophylaxis, and NPO transitions.", "brief": "<p class=\"lead\">This learning experience closes a real PGY-1 curriculum gap: <b>surgery, trauma, and peri-op pharmacy</b>.</p><div class=\"callout pearl\"><b>Structure:</b> concept checkpoint → practical rotation case → BCPS-style original integration.</div><ul><li><b>Peri-op prophylaxis</b> — Right drug, dose, timing, redosing, and stop time.</li><li><b>Trauma</b> — Hemorrhage, anticoagulant reversal, TXA timing, and massive transfusion support.</li><li><b>Post-op care</b> — VTE prophylaxis, multimodal pain, bowel regimen, and safe restart of home meds.</li></ul>", "cases": [{"type": "mcq", "kick": "Concept check: surgical prophylaxis timing", "q": "For most clean-contaminated surgery, prophylactic antibiotics should generally be administered:", "opts": [{"t": "Within 60 minutes before incision, with redosing as needed for long cases or blood loss", "ok": true, "fb": "Correct. Timing, redosing, and discontinuation are the core peri-op pharmacist checks."}, {"t": "After the patient develops fever on post-op day 3", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Indefinitely until discharge", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "chartHunt", "kick": "Practical case: peri-op antibiotic verification", "q": "Tap every timing, re-dosing, or allergy-assessment problem before surgery.", "rows": [{"text": "Cefazolin ordered after incision rather than before incision", "problem": true, "why": "Prophylaxis works best when tissue levels exist at incision."}, {"text": "Case expected 6 hours but no cefazolin redose plan", "problem": true, "why": "Long cases may need intra-op redosing."}, {"text": "Stop time documented within 24 hours for routine prophylaxis", "problem": false, "why": "Short duration is appropriate for routine prophylaxis."}, {"text": "Vancomycin chosen solely because of vague childhood nausea with penicillin", "problem": true, "why": "Non-allergic intolerance should not force inferior prophylaxis."}], "note": "Peri-op antibiotic stewardship is timing plus allergy clarification."}, {"type": "sbar", "kick": "Practical SBAR: anticoagulant restart", "q": "Build an SBAR for a post-op patient previously on apixaban for AF.", "slots": [{"key": "Situation", "fragments": [{"t": "The team asks when to restart apixaban after surgery.", "score": 2}, {"t": "Something may be wrong, but I am not sure what.", "score": 0}]}, {"key": "Background", "fragments": [{"t": "Procedure bleeding risk is high, hemostasis status is evolving, renal function is stable, and AF stroke risk is elevated.", "score": 2}, {"t": "The patient has a long medication list.", "score": 0}]}, {"key": "Assessment", "fragments": [{"t": "Restart timing must balance post-op bleeding against thromboembolism.", "score": 2}, {"t": "This order seems unusual.", "score": 0}]}, {"key": "Recommendation", "fragments": [{"t": "Recommend holding until surgical hemostasis is adequate, using VTE prophylaxis as appropriate, then restarting apixaban per bleeding-risk protocol with renal-dose confirmation.", "score": 2}, {"t": "Continue for now and reassess later.", "score": 0}]}], "note": "Peri-op anticoagulation is a risk-balance handoff."}, {"type": "order", "kick": "Practical workflow: trauma anticoagulant reversal", "q": "Put the anticoagulant-reversal assessment and follow-up steps in order:", "correct": ["Identify anticoagulant, dose, and last administration time", "Assess bleeding severity and site", "Check renal/hepatic function and coagulation labs as useful", "Select specific reversal or PCC strategy per protocol", "Document re-anticoagulation reassessment plan"], "note": "Reversal is not complete until re-thrombosis and restart plans are considered."}, {"type": "mcq", "kick": "BCPS-style integration: TXA in trauma", "q": "Which trauma patient is the best TXA candidate?", "opts": [{"t": "Major bleeding within 3 hours of injury, no contraindication, as part of hemorrhage protocol", "ok": true, "fb": "Correct. TXA benefit is time-sensitive and tied to significant hemorrhage."}, {"t": "Minor bruise 12 hours after injury", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "All trauma patients indefinitely", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "mcq", "kick": "Concept check: post-op VTE prophylaxis", "q": "The best VTE prophylaxis plan depends on:", "opts": [{"t": "VTE risk, bleeding risk, procedure type, renal function, mobility, and neuraxial catheter status", "ok": true, "fb": "Correct. Post-op prophylaxis is individualized, especially with bleeding and epidural considerations."}, {"t": "Room number only", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Whether the patient asks for injections", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "chartHunt", "kick": "Practical case: post-op pain safety", "q": "Tap every respiratory-depression, constipation, or renal-dose safety problem.", "rows": [{"text": "Hydromorphone PCA basal infusion in an opioid-naive patient", "problem": true, "why": "Basal PCA increases respiratory depression risk in opioid-naive patients."}, {"text": "Scheduled acetaminophen with daily dose within safe limit", "problem": false, "why": "Multimodal non-opioid analgesia is appropriate."}, {"text": "No bowel regimen despite scheduled opioids", "problem": true, "why": "Opioid constipation prevention should start early."}, {"text": "Gabapentin continued at full dose despite CrCl 22 and sedation", "problem": true, "why": "Renal adjustment and CNS depression risk matter."}], "note": "Post-op pain care is multimodal and respiratory-risk aware."}, {"type": "mcq", "kick": "BCPS-style integration: NPO home meds", "q": "A post-op patient is NPO with Parkinson disease. Best pharmacist intervention?", "opts": [{"t": "Prevent abrupt interruption by using an appropriate route/timing strategy and communicating with surgery/nursing", "ok": true, "fb": "Correct. Some chronic medications are time-critical even when NPO."}, {"t": "Hold all neurologic medications until diet returns", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Crush every medication without checking formulation", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "order", "kick": "Practical workflow: neuraxial anticoagulation", "q": "Order the safety check:", "correct": ["Identify epidural/spinal catheter status", "Check anticoagulant type, dose, renal function, and last dose", "Apply neuraxial timing protocol", "Coordinate hold/removal/restart with anesthesia", "Document handoff to nursing and surgery"], "note": "Neuraxial bleeding is rare but catastrophic, so timing rules are strict."}, {"type": "mcq", "kick": "BCPS-style integration: surgical culture stewardship", "q": "In an intra-abdominal infection after source control, what is the best pharmacist focus?", "opts": [{"t": "Appropriate empiric coverage, renal dose, culture follow-up, source-control adequacy, and duration stop date", "ok": true, "fb": "Correct. Surgery cases still need stewardship and duration discipline."}, {"t": "Continue broad-spectrum therapy forever", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Stop antibiotics immediately regardless of contamination or infection", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}]}, {"id": "ids", "icon": "59", "area": "R3", "title": "Investigational Drug Services (IDS)", "blurb": "Protocol adherence, accountability, blinding, randomization, temperature excursions, and research-medication safety.", "brief": "<p class=\"lead\">This learning experience closes a real PGY-1 curriculum gap: <b>investigational drug services</b>.</p><div class=\"callout pearl\"><b>Structure:</b> concept checkpoint → practical rotation case → BCPS-style original integration.</div><ul><li><b>Protocol fidelity</b> — The protocol is the medication order set, safety plan, and legal boundary.</li><li><b>Accountability</b> — Receipt, storage, dispensing, return, destruction, and temperature excursions must reconcile.</li><li><b>Blinding/randomization</b> — Pharmacy protects allocation and prevents unauthorized substitution.</li></ul>", "cases": [{"type": "mcq", "kick": "Concept check: IDS boundary", "q": "A study drug order conflicts with the protocol dosing table. Best action?", "opts": [{"t": "Hold clarification and resolve with PI/study team before dispensing", "ok": true, "fb": "Correct. IDS dispensing follows the IRB-approved protocol and delegation process."}, {"t": "Dispense the closest commercial equivalent", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Change the dose independently without documentation", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "chartHunt", "kick": "Practical case: accountability audit", "q": "Tap the IDS problems.", "rows": [{"text": "Temperature excursion documented but sponsor/study team not notified", "problem": true, "why": "Excursions require quarantine and documented disposition."}, {"text": "Returned bottles reconciled against subject diary and dispensing log", "problem": false, "why": "Accountability reconciliation is expected."}, {"text": "Randomization email visible to blinded study staff", "problem": true, "why": "Blinding must be protected."}, {"text": "Study drug stored in a segregated, labeled IDS area", "problem": false, "why": "Segregated storage supports accountability."}], "note": "IDS errors are often documentation and custody errors."}, {"type": "sbar", "kick": "Practical SBAR: missed protocol lab", "q": "Build an SBAR for a protocol-required lab missing before dose.", "slots": [{"key": "Situation", "fragments": [{"t": "A protocol-required safety lab is missing before the next study-drug dose.", "score": 2}, {"t": "Something may be wrong, but I am not sure what.", "score": 0}]}, {"key": "Background", "fragments": [{"t": "The subject is due today, the protocol requires the lab within 72 hours, and no waiver is documented.", "score": 2}, {"t": "The patient has a long medication list.", "score": 0}]}, {"key": "Assessment", "fragments": [{"t": "Dispensing without the lab could be a protocol deviation and patient-safety risk.", "score": 2}, {"t": "This order seems unusual.", "score": 0}]}, {"key": "Recommendation", "fragments": [{"t": "Hold dispensing until the lab or documented PI/sponsor-approved path is completed, and record the deviation if applicable.", "score": 2}, {"t": "Continue for now and reassess later.", "score": 0}]}], "note": "IDS recommendations protect the patient and the study integrity."}, {"type": "order", "kick": "Practical workflow: study-drug receipt", "q": "Order the receipt workflow:", "correct": ["Verify shipment contents against packing list", "Check temperature log and damage", "Enter receipt into accountability record", "Place in protocol-specified storage", "Quarantine and escalate any discrepancy"], "note": "Receipt is the first safety checkpoint."}, {"type": "mcq", "kick": "BCPS-style integration: concomitant prohibited med", "q": "A patient in an oncology trial is prescribed a strong CYP3A inhibitor prohibited by protocol. Best recommendation?", "opts": [{"t": "Contact study team/PI, assess alternative therapy, and document protocol-safe plan before dispensing", "ok": true, "fb": "Correct. Clinical care comes first, but protocol conflicts need documented study-team resolution."}, {"t": "Dispense both because clinical care always overrides protocol silently", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Tell the patient to stop the study drug without notifying anyone", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "mcq", "kick": "Concept check: unblinding", "q": "Emergency unblinding should occur when:", "opts": [{"t": "Knowledge of assignment is necessary for urgent patient management and the protocol process is followed", "ok": true, "fb": "Correct. Blinding is protected unless patient safety requires otherwise."}, {"t": "A curious resident wants to know", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "The pharmacist wants to simplify inventory", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "chartHunt", "kick": "Practical case: subject visit", "q": "Tap every protocol-accountability, safety-reporting, or consent problem.", "rows": [{"text": "Subject returns with 18 tablets when 20 expected and no missed-dose explanation", "problem": true, "why": "Accountability discrepancy needs reconciliation."}, {"text": "New severe rash reported but no SAE/AESI evaluation note", "problem": true, "why": "Safety events must be assessed and reported per protocol."}, {"text": "Next kit assigned by IRT and matches subject number", "problem": false, "why": "IRT assignment matching is appropriate."}, {"text": "Dose dispensed before consent version update was signed", "problem": true, "why": "Consent status affects study participation and dispensing legality."}], "note": "IDS pharmacists catch protocol deviations before they propagate."}, {"type": "mcq", "kick": "BCPS-style integration: commercial substitution", "q": "The IDS is out of study-labeled rescue medication, but the same drug exists commercially. What is best?", "opts": [{"t": "Follow protocol/sponsor process; do not substitute commercial stock unless allowed and documented", "ok": true, "fb": "Correct. Labeling, blinding, billing, and accountability make substitution a protocol question."}, {"t": "Use commercial stock and chart nothing because the molecule is identical", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Cancel the subject from the study immediately", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "order", "kick": "Practical workflow: temperature excursion", "q": "Order the response:", "correct": ["Quarantine affected product", "Document excursion duration and range", "Notify sponsor/study team per SOP", "Wait for written disposition before use", "Record final action in accountability logs"], "note": "Do not guess product stability after an excursion."}, {"type": "mcq", "kick": "BCPS-style integration: delegation of authority", "q": "A resident not on the delegation log wants to dispense study drug while covering. Best answer?", "opts": [{"t": "Do not allow dispensing until training/delegation requirements are met or an authorized staff member dispenses", "ok": true, "fb": "Correct. IDS work requires protocol training and delegation, not just licensure."}, {"t": "Let them dispense because they are licensed", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Have nursing relabel it instead", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}]}, {"id": "di_formulary_orderset", "icon": "60", "area": "R2", "title": "Drug Information, Formulary and Order Sets", "blurb": "DI consults, formulary monographs, P&T decisions, therapeutic interchange, and order-set governance.", "brief": "<p class=\"lead\">This learning experience closes a real PGY-1 curriculum gap: <b>drug information and formulary work</b>.</p><div class=\"callout pearl\"><b>Structure:</b> concept checkpoint → practical rotation case → BCPS-style original integration.</div><ul><li><b>DI answers</b> — Answer the actual clinical question with cited evidence, applicability, and monitoring.</li><li><b>Formulary</b> — P&T decisions weigh efficacy, safety, operations, cost, equity, and restrictions.</li><li><b>Order sets</b> — Build defaults that make the safest care the easiest care.</li></ul>", "cases": [{"type": "mcq", "kick": "Concept check: DI answer", "q": "What makes a strong drug-information response?", "opts": [{"t": "It answers the specific patient question, cites evidence, states limitations, and gives monitoring/action steps", "ok": true, "fb": "Correct. DI is applied evidence, not a literature dump."}, {"t": "It pastes a database paragraph without interpretation", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "It gives only a yes/no with no patient context", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "chartHunt", "kick": "Practical case: DI request triage", "q": "Tap every scope, citation, or patient-specificity problem in this drug-information response.", "rows": [{"text": "Question asks about lactation safety but response only discusses pregnancy", "problem": true, "why": "The response misses the actual population."}, {"text": "Recommendation includes dose, monitoring, and evidence strength", "problem": false, "why": "That is useful applied DI."}, {"text": "No citation date or source documented", "problem": true, "why": "DI work needs source traceability."}, {"text": "Answer ignores renal failure in the patient case", "problem": true, "why": "Patient-specific applicability is mandatory."}], "note": "A DI answer fails if it answers the wrong question."}, {"type": "sbar", "kick": "Practical SBAR: formulary restriction", "q": "Build an SBAR for a nonformulary high-cost antibiotic request.", "slots": [{"key": "Situation", "fragments": [{"t": "A nonformulary restricted antibiotic is requested for a stable patient.", "score": 2}, {"t": "Something may be wrong, but I am not sure what.", "score": 0}]}, {"key": "Background", "fragments": [{"t": "Cultures show an organism susceptible to formulary alternatives, allergy history is non-severe, and ID has not approved use.", "score": 2}, {"t": "The patient has a long medication list.", "score": 0}]}, {"key": "Assessment", "fragments": [{"t": "The requested agent adds cost/resistance pressure without clear benefit.", "score": 2}, {"t": "This order seems unusual.", "score": 0}]}, {"key": "Recommendation", "fragments": [{"t": "Recommend formulary alternative, document susceptibility rationale, and define escalation criteria for restricted use.", "score": 2}, {"t": "Continue for now and reassess later.", "score": 0}]}], "note": "Formulary stewardship must still be patient-specific."}, {"type": "order", "kick": "Practical workflow: formulary monograph", "q": "Order the monograph workflow:", "correct": ["Define indication and comparator", "Summarize efficacy and safety evidence", "Assess operational and cost impact", "Propose restriction/criteria if needed", "Present recommendation to P&T committee"], "note": "A monograph is a decision tool, not a sales brochure."}, {"type": "mcq", "kick": "BCPS-style integration: order-set default", "q": "A sepsis order set defaults to vancomycin plus piperacillin-tazobactam for every patient indefinitely. Best pharmacist action?", "opts": [{"t": "Revise defaults to syndrome/risk-based empiric choices, renal dosing, culture prompts, and de-escalation stop points", "ok": true, "fb": "Correct. Order sets should encode safe defaults and reassessment."}, {"t": "Keep broad therapy forever because it is safer", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Remove all antibiotics from the order set", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "mcq", "kick": "Concept check: therapeutic interchange", "q": "Therapeutic interchange is safest when:", "opts": [{"t": "It is approved by policy/P&T, clinically appropriate, documented, and includes exceptions", "ok": true, "fb": "Correct. Interchange requires governance and patient-specific exceptions."}, {"t": "Any pharmacist swaps any drug based on preference", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "It ignores allergies, indication, and route", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "chartHunt", "kick": "Practical case: order set build", "q": "Tap unsafe defaults.", "rows": [{"text": "Default potassium chloride 40 mEq IV push", "problem": true, "why": "IV push potassium is unsafe; concentration/rate limits matter."}, {"text": "Renal-dose prompt for enoxaparin when CrCl <30", "problem": false, "why": "Renal-dose prompts are appropriate."}, {"text": "No stop date or reassessment for stress-ulcer prophylaxis", "problem": true, "why": "Order sets should prompt duration and indication."}, {"text": "Weight required before heparin infusion release", "problem": false, "why": "Weight-based high-alert therapy needs weight verification."}], "note": "Order-set work is medication safety engineering."}, {"type": "mcq", "kick": "BCPS-style integration: shortage alternative", "q": "During a norepinephrine shortage, best pharmacist-led plan is:", "opts": [{"t": "Create evidence-based alternatives, concentration standards, smart-pump updates, communication, and monitoring guidance", "ok": true, "fb": "Correct. Shortage management blends evidence, operations, informatics, and communication."}, {"t": "Let each unit improvise its own concentration", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Hide the shortage until stock is gone", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "order", "kick": "Practical workflow: DI consult", "q": "Order the DI workflow:", "correct": ["Clarify the exact clinical question", "Gather patient-specific factors", "Search and appraise sources", "Synthesize recommendation with uncertainty", "Document citation and follow-up plan"], "note": "The first step is always to clarify the question."}, {"type": "mcq", "kick": "BCPS-style integration: formulary ethics", "q": "A new drug is marginally more effective but dramatically increases budget impact and nursing complexity. Best P&T framing?", "opts": [{"t": "Present efficacy, safety, budget, operational feasibility, equity/access, and criteria for restricted use", "ok": true, "fb": "Correct. P&T decisions require balanced, transparent criteria."}, {"t": "Recommend approval solely because it is new", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Reject without discussing patient subgroup benefit", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}]}, {"id": "operations_staffing_oncall", "icon": "61", "area": "R3", "title": "Operations, Staffing and On-call Triage", "blurb": "Central pharmacy workflow, staffing decisions, downtime, on-call prioritization, ADC issues, and service recovery.", "brief": "<p class=\"lead\">This learning experience closes a real PGY-1 curriculum gap: <b>operations and on-call management</b>.</p><div class=\"callout pearl\"><b>Structure:</b> concept checkpoint → practical rotation case → BCPS-style original integration.</div><ul><li><b>Triage</b> — Risk, urgency, reversibility, and system impact determine what gets handled first.</li><li><b>Operations</b> — Verification, compounding, ADC/restocking, courier flow, and staffing are patient-care systems.</li><li><b>On-call</b> — Escalate early, document clearly, and protect the next handoff.</li></ul>", "cases": [{"type": "mcq", "kick": "Concept check: operations mindset", "q": "Which on-call item should usually be prioritized first?", "opts": [{"t": "A crashing ICU patient needing a time-critical vasopressor concentration clarification", "ok": true, "fb": "Correct. Operations triage follows immediate patient harm risk."}, {"t": "A routine refill request for tomorrow morning", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "A preference question about multivitamin timing", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "chartHunt", "kick": "Practical case: evening queue", "q": "Tap the items needing immediate pharmacist action.", "rows": [{"text": "STAT alteplase eligibility question from ED", "problem": true, "why": "Time-critical, high-risk therapy needs immediate review."}, {"text": "Routine therapeutic interchange for tomorrow discharge", "problem": false, "why": "Important but not first if time-critical emergencies exist."}, {"text": "ADC stockout of epinephrine in code cart area", "problem": true, "why": "Emergency medication availability is critical."}, {"text": "Stable patient asks for medication list printout before morning rounds", "problem": false, "why": "This can be queued after urgent safety work."}], "note": "On-call triage is clinical prioritization under resource limits."}, {"type": "sbar", "kick": "Practical SBAR: staffing shortage", "q": "Build an SBAR to the pharmacy manager during a sick-call shortage.", "slots": [{"key": "Situation", "fragments": [{"t": "Evening shift is short one pharmacist and sterile compounding queue is rising.", "score": 2}, {"t": "Something may be wrong, but I am not sure what.", "score": 0}]}, {"key": "Background", "fragments": [{"t": "Current workload includes chemo due times, STAT ICU drips, and routine cart-fill checks.", "score": 2}, {"t": "The patient has a long medication list.", "score": 0}]}, {"key": "Assessment", "fragments": [{"t": "Without reprioritization, high-risk/time-sensitive work may be delayed.", "score": 2}, {"t": "This order seems unusual.", "score": 0}]}, {"key": "Recommendation", "fragments": [{"t": "Recommend redeploying trained staff, delaying low-risk tasks, notifying affected units, and documenting contingency plan.", "score": 2}, {"t": "Continue for now and reassess later.", "score": 0}]}], "note": "Staffing decisions are patient-safety decisions."}, {"type": "order", "kick": "Practical workflow: EHR downtime", "q": "Order the pharmacist downtime workflow:", "correct": ["Activate downtime medication-order policy", "Use approved paper/order communication pathway", "Prioritize high-alert and time-critical medications", "Document verification and administration trail", "Reconcile all orders when EHR returns"], "note": "Downtime safety depends on a clean reconciliation after recovery."}, {"type": "mcq", "kick": "BCPS-style integration: ADC override trend", "q": "ADC reports show frequent override pulls for non-emergent IV antihypertensives. Best action?", "opts": [{"t": "Audit indications, update override list, educate units, and monitor override rate after intervention", "ok": true, "fb": "Correct. Override data is a medication-use-system signal."}, {"t": "Ignore it because nurses are busy", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Remove every medication from ADCs", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "mcq", "kick": "Concept check: batch vs STAT", "q": "Which task should not be delayed for batch workflow?", "opts": [{"t": "Epinephrine infusion for unstable shock", "ok": true, "fb": "Correct. STAT and time-critical medications break batching."}, {"t": "Daily multivitamin fill", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Routine nonformulary review with no doses due", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "chartHunt", "kick": "Practical case: compounding queue", "q": "Tap the unsafe operations signals.", "rows": [{"text": "Chemo due in 20 minutes but pharmacist check not started", "problem": true, "why": "High-risk and time-sensitive."}, {"text": "TPN label differs from compounding worksheet", "problem": true, "why": "Label/worksheet mismatch must be resolved before release."}, {"text": "Routine oral med refill due tomorrow", "problem": false, "why": "Lower risk and less urgent."}, {"text": "Technician reports hood pressure alarm during sterile compounding", "problem": true, "why": "Environmental control failure threatens sterility."}], "note": "Operations cases require knowing what can wait and what cannot."}, {"type": "mcq", "kick": "BCPS-style integration: service recovery", "q": "A unit reports repeated missing first doses. Best pharmacist-led response?", "opts": [{"t": "Map the workflow, identify failure points, communicate interim workaround, and track first-dose turnaround after changes", "ok": true, "fb": "Correct. Operations improvement should fix the system and measure the result."}, {"t": "Blame one technician and move on", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Tell nurses to stop calling", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "order", "kick": "Practical workflow: on-call documentation", "q": "Order the on-call handoff:", "correct": ["State the issue and patient/unit affected", "Document action taken and rationale", "List pending labs/orders/callbacks", "Name escalation threshold", "Send handoff to next pharmacist/team"], "note": "A good handoff prevents the same problem from restarting."}, {"type": "mcq", "kick": "BCPS-style integration: resource allocation", "q": "Two urgent tasks arrive: verifying broad-spectrum antibiotics for septic shock and reviewing a stable home statin substitution. Best choice?", "opts": [{"t": "Verify the septic shock antibiotics first and queue the stable substitution", "ok": true, "fb": "Correct. Risk and time-sensitivity determine operational priority."}, {"t": "Do the easier statin substitution first", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Ignore both until the queue is empty", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}]}, {"id": "rca_fmea", "icon": "62", "area": "R2", "title": "RCA, FMEA and Medication Safety Analytics", "blurb": "Root-cause analysis, failure-mode analysis, just culture, action strength, and safety metrics.", "brief": "<p class=\"lead\">This learning experience closes a real PGY-1 curriculum gap: <b>RCA and FMEA medication safety</b>.</p><div class=\"callout pearl\"><b>Structure:</b> concept checkpoint → practical rotation case → BCPS-style original integration.</div><ul><li><b>RCA</b> — After harm or near miss, identify system causes, not just the last person who touched the order.</li><li><b>FMEA</b> — Before harm, map a process and rank failure modes by severity, occurrence, and detectability.</li><li><b>Action strength</b> — Forcing functions and automation are stronger than reminders and education alone.</li></ul>", "cases": [{"type": "mcq", "kick": "Concept check: just culture", "q": "A resident reports a near miss. Best safety response?", "opts": [{"t": "Thank them, assess patient risk, report the event, and analyze system contributors without reflex blame", "ok": true, "fb": "Correct. Just culture supports reporting while still addressing reckless behavior if present."}, {"t": "Punish immediately before learning what happened", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Hide it because no harm occurred", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "chartHunt", "kick": "Practical case: RCA clues", "q": "Tap system contributors worth investigating.", "rows": [{"text": "Look-alike vials stored adjacent in ADC pocket", "problem": true, "why": "Storage design can set up selection errors."}, {"text": "Barcode scanner alert overridden 90% of the time due to false positives", "problem": true, "why": "Alert fatigue is a system contributor."}, {"text": "One nurse was working alone with double usual patient load", "problem": true, "why": "Staffing/workload can contribute."}, {"text": "The patient prefers morning medications", "problem": false, "why": "Preference may matter clinically but is not the RCA driver here."}], "note": "RCA asks why the error made sense in that system."}, {"type": "order", "kick": "Practical workflow: RCA meeting", "q": "Order the RCA workflow:", "correct": ["Describe what happened and immediate patient impact", "Build a timeline from records and interviews", "Identify contributing factors and root causes", "Select strong corrective actions with owners", "Measure whether risk decreased"], "note": "RCA ends with measured action, not a meeting summary."}, {"type": "sbar", "kick": "Practical SBAR: high-alert event", "q": "Build an SBAR after a heparin near miss.", "slots": [{"key": "Situation", "fragments": [{"t": "A heparin concentration mismatch was caught before administration.", "score": 2}, {"t": "Something may be wrong, but I am not sure what.", "score": 0}]}, {"key": "Background", "fragments": [{"t": "Two concentrations are stocked, smart-pump library names are similar, and barcode scan was bypassed.", "score": 2}, {"t": "The patient has a long medication list.", "score": 0}]}, {"key": "Assessment", "fragments": [{"t": "The system allows selection/programming mismatch for a high-alert medication.", "score": 2}, {"t": "This order seems unusual.", "score": 0}]}, {"key": "Recommendation", "fragments": [{"t": "Standardize concentration if feasible, update pump naming, restrict bypasses, and monitor heparin programming events.", "score": 2}, {"t": "Continue for now and reassess later.", "score": 0}]}], "note": "Strong actions change the system, not just memory."}, {"type": "mcq", "kick": "BCPS-style integration: action strength", "q": "Which corrective action is strongest?", "opts": [{"t": "Remove the wrong concentration from floor stock and hardwire pump limits", "ok": true, "fb": "Correct. Forcing functions and standardization beat reminders."}, {"t": "Email staff to be more careful", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Tell new residents the story once during orientation", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "mcq", "kick": "Concept check: FMEA", "q": "FMEA is best used when:", "opts": [{"t": "A team wants to proactively identify where a new or redesigned process could fail", "ok": true, "fb": "Correct. FMEA is prospective risk analysis."}, {"t": "A patient has already died and only blame is needed", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "There is no defined process to map", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "chartHunt", "kick": "Practical case: FMEA scoring", "q": "Tap high-priority failure modes.", "rows": [{"text": "High severity, frequent occurrence, hard to detect", "problem": true, "why": "This is a high-risk failure mode."}, {"text": "Low severity, rare, immediately detected", "problem": false, "why": "Lower priority compared with severe hidden failures."}, {"text": "Moderate severity but frequent and poorly detected", "problem": true, "why": "Frequency and detectability can raise priority."}, {"text": "High severity but impossible under current workflow", "problem": false, "why": "Occurrence matters in prioritization."}], "note": "FMEA prioritizes limited safety resources."}, {"type": "mcq", "kick": "BCPS-style integration: metric selection", "q": "After changing an insulin order set, the best monitoring metric is:", "opts": [{"t": "A balance of hypoglycemia rate, severe hyperglycemia, order-set use, and override/clarification frequency", "ok": true, "fb": "Correct. Safety metrics should include outcomes and process signals."}, {"t": "Only number of emails sent about the change", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Only whether one pharmacist likes it", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "order", "kick": "Practical workflow: safety dashboard", "q": "Order the dashboard build:", "correct": ["Define the safety question", "Choose numerator and denominator", "Validate data source", "Review trend with frontline context", "Act and remeasure"], "note": "A dashboard without action is decoration."}, {"type": "mcq", "kick": "BCPS-style integration: disclosure", "q": "A medication error reached the patient but no harm is evident yet. Best pharmacist role?", "opts": [{"t": "Ensure patient assessment/monitoring, report internally, support transparent disclosure per policy, and fix contributing factors", "ok": true, "fb": "Correct. Disclosure and monitoring are part of professional safety practice."}, {"t": "Erase the record because harm did not occur", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Wait for harm before documenting", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}]}, {"id": "research_irb_manuscript", "icon": "63", "area": "R2", "title": "Research, IRB and Manuscript Development", "blurb": "QI vs research, IRB timing, data dictionaries, statistics, abstracts, posters, and manuscript-ready writing.", "brief": "<p class=\"lead\">This learning experience closes a real PGY-1 curriculum gap: <b>research and publication skills</b>.</p><div class=\"callout pearl\"><b>Structure:</b> concept checkpoint → practical rotation case → BCPS-style original integration.</div><ul><li><b>IRB first</b> — Know when review or determination is needed before accessing or analyzing data.</li><li><b>Methods discipline</b> — Define population, intervention/exposure, outcomes, time window, and analysis before pulling data.</li><li><b>Dissemination</b> — Poster, platform, and manuscript each need a clear message and limitations.</li></ul>", "cases": [{"type": "mcq", "kick": "Concept check: IRB timing", "q": "For a retrospective outcomes project intended for publication, the safest first step is:", "opts": [{"t": "Obtain IRB review/determination before collecting identifiable data", "ok": true, "fb": "Correct. IRB/determination timing protects patients and publishability."}, {"t": "Pull all charts first and ask later", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Publish without methods because it is QI", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "journal", "kick": "Practical journal case: methods weakness", "q": "Evaluate the abstract.", "abstract": "Single-center retrospective study compares pre/post pharmacist rounding. No baseline severity table is reported. Primary outcome changed after data review. Readmissions decreased from 18% to 14%.", "flaws": [{"text": "No baseline severity comparison", "isFlaw": true}, {"text": "Primary outcome changed after seeing data", "isFlaw": true}, {"text": "Absolute risk difference is provided", "isFlaw": false}, {"text": "Single-center design limits generalizability", "isFlaw": true}], "nnt": {"stem": "Readmissions fell from 18% to 14%. What is the absolute risk reduction?", "options": [{"t": "4 percentage points", "correct": true}, {"t": "22 percentage points", "correct": false}, {"t": "Cannot be calculated from these numbers", "correct": false}]}, "note": "ARR = 18% - 14% = 4 percentage points. Methods limitations still matter."}, {"type": "order", "kick": "Practical workflow: resident research project", "q": "Order the research workflow:", "correct": ["Convert clinical problem into answerable question", "Define population, intervention/exposure, comparator, outcomes", "Get IRB review or determination", "Collect and clean data using a data dictionary", "Analyze, write, present, and revise manuscript"], "note": "A project that starts with data pulling usually has messy methods."}, {"type": "sbar", "kick": "Practical SBAR: manuscript limitation", "q": "Build an SBAR for a preceptor about a manuscript limitation.", "slots": [{"key": "Situation", "fragments": [{"t": "The project result is positive but confounding is likely.", "score": 2}, {"t": "Something may be wrong, but I am not sure what.", "score": 0}]}, {"key": "Background", "fragments": [{"t": "Intervention and control groups differ in ICU admission rate and baseline severity.", "score": 2}, {"t": "The patient has a long medication list.", "score": 0}]}, {"key": "Assessment", "fragments": [{"t": "The apparent benefit may reflect baseline risk rather than the intervention alone.", "score": 2}, {"t": "This order seems unusual.", "score": 0}]}, {"key": "Recommendation", "fragments": [{"t": "Report adjusted analysis if feasible, state limitations honestly, and avoid causal overclaiming.", "score": 2}, {"t": "Continue for now and reassess later.", "score": 0}]}], "note": "Manuscript credibility comes from honest limitations."}, {"type": "mcq", "kick": "BCPS-style integration: outcome choice", "q": "Best primary outcome for an anticoagulation stewardship project is:", "opts": [{"t": "A clinically meaningful, predefined outcome such as inappropriate dosing rate or bleeding/thrombotic event composite with clear definitions", "ok": true, "fb": "Correct. Outcomes must be prespecified and clinically meaningful."}, {"t": "Whichever endpoint becomes significant after analysis", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Number of slides in the final poster", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "mcq", "kick": "Concept check: QI vs research", "q": "Which statement is most accurate?", "opts": [{"t": "QI and research can overlap; get IRB/quality office guidance based on intent, design, risk, and dissemination", "ok": true, "fb": "Correct. Institutions vary, so get the right determination early."}, {"t": "QI never needs any review under any circumstance", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Research is only randomized trials", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "chartHunt", "kick": "Practical case: data dictionary", "q": "Tap the data-definition problems.", "rows": [{"text": "Outcome defined as “renal injury” with no lab threshold or time window", "problem": true, "why": "Ambiguous outcomes cannot be reliably abstracted."}, {"text": "Bleeding defined using a named standardized definition", "problem": false, "why": "Standardized definitions improve reliability."}, {"text": "Exposure window changes from 24 hours to 72 hours midway through abstraction", "problem": true, "why": "Changing definitions midstream biases results."}, {"text": "Two abstractors pilot five charts and resolve discrepancies", "problem": false, "why": "Pilot abstraction improves consistency."}], "note": "Research quality often lives in definitions."}, {"type": "mcq", "kick": "BCPS-style integration: poster conclusion", "q": "A poster shows reduced LOS but no adjustment for baseline severity. Best conclusion wording?", "opts": [{"t": "Pharmacist involvement was associated with shorter LOS; further adjusted/prospective evaluation is needed", "ok": true, "fb": "Correct. Association language matches the design."}, {"t": "Pharmacists definitely caused all LOS reduction", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "The project failed because it was not randomized", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "order", "kick": "Practical workflow: manuscript revision", "q": "Order the revision workflow:", "correct": ["Read reviewer comments without editing immediately", "Group comments by theme and required analysis", "Revise manuscript and tables", "Write point-by-point response", "Have coauthors approve before resubmission"], "note": "A clean response letter is part of publication professionalism."}, {"type": "mcq", "kick": "BCPS-style integration: statistical test selection", "q": "Two independent groups, continuous non-normal LOS data. Best general approach?", "opts": [{"t": "Use an appropriate nonparametric comparison or transform/model with statistical support", "ok": true, "fb": "Correct. Test choice follows data type, distribution, and design."}, {"t": "Use a paired t-test automatically", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Choose the test that gives the lowest p-value", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}]}, {"id": "nicu_picu", "icon": "64", "area": "R1", "title": "NICU and PICU Pharmacy", "blurb": "Neonatal/pediatric dosing, weight and age checks, renal immaturity, medication safety, sedation, nutrition, and infection treatment.", "brief": "<p class=\"lead\">This learning experience closes a real PGY-1 curriculum gap: <b>NICU and PICU pharmacy</b>.</p><div class=\"callout pearl\"><b>Structure:</b> concept checkpoint → practical rotation case → BCPS-style original integration.</div><ul><li><b>Developmental PK</b> — Gestational age, postnatal age, weight, organ maturation, and formulation change dosing.</li><li><b>Safety</b> — mg/kg math, decimal errors, concentration standardization, and max-dose caps are critical.</li><li><b>PICU care</b> — Sedation, vasoactives, antimicrobials, nutrition, and transitions require tight monitoring.</li></ul>", "cases": [{"type": "mcq", "kick": "Concept check: pediatric dosing", "q": "The safest pediatric verification starts with:", "opts": [{"t": "Current weight in kg, age/gestational context, indication, renal/hepatic function, concentration, and max dose", "ok": true, "fb": "Correct. Pediatric errors often begin with weight and unit mistakes."}, {"t": "Room number and adult default dose", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Parent estimate in pounds without conversion", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "calc", "kick": "Practical calc: mg/kg dose", "q": "Amoxicillin 45 mg/kg/day divided BID for a 12 kg child. Approximate mg per dose?", "given": [{"label": "Dose", "value": "45 mg/kg/day"}, {"label": "Weight", "value": "12 kg"}, {"label": "Frequency", "value": "BID"}], "answer": {"value": 270, "tolerance": 10, "unit": "mg/dose"}, "hint": "45 x 12 = 540 mg/day; divided twice daily = 270 mg/dose.", "note": "Always calculate daily dose and per-dose amount separately."}, {"type": "chartHunt", "kick": "Practical case: NICU verification", "q": "Tap every developmental-dosing, bilirubin, or smart-pump safety problem.", "rows": [{"text": "Gentamicin interval selected without gestational/postnatal age or renal trend", "problem": true, "why": "Neonatal aminoglycoside intervals depend on maturation and renal function."}, {"text": "Weight documented in kg and dose band verified", "problem": false, "why": "kg-based verification is appropriate."}, {"text": "Ceftriaxone ordered for a hyperbilirubinemic neonate", "problem": true, "why": "Ceftriaxone can displace bilirubin and has neonatal calcium-related concerns."}, {"text": "Medication concentration differs from smart-pump library concentration", "problem": true, "why": "Concentration mismatch can cause large dosing errors."}], "note": "NICU verification is developmental pharmacology plus systems safety."}, {"type": "sbar", "kick": "Practical SBAR: PICU sedation", "q": "Build an SBAR for oversedation in a ventilated child.", "slots": [{"key": "Situation", "fragments": [{"t": "PICU patient is deeper than target sedation.", "score": 2}, {"t": "Something may be wrong, but I am not sure what.", "score": 0}]}, {"key": "Background", "fragments": [{"t": "RASS/SBS target is light sedation, opioid and benzodiazepine infusions were increased overnight, and extubation is being discussed.", "score": 2}, {"t": "The patient has a long medication list.", "score": 0}]}, {"key": "Assessment", "fragments": [{"t": "Current sedation may delay extubation and increase delirium/withdrawal risk.", "score": 2}, {"t": "This order seems unusual.", "score": 0}]}, {"key": "Recommendation", "fragments": [{"t": "Recommend analgesia/sedation reassessment, daily wean readiness, non-benzodiazepine strategy if appropriate, and withdrawal monitoring plan.", "score": 2}, {"t": "Continue for now and reassess later.", "score": 0}]}], "note": "PICU sedation must balance comfort, ventilation, delirium, and withdrawal."}, {"type": "order", "kick": "Practical workflow: neonatal sepsis antibiotics", "q": "Put the neonatal sepsis antibiotic verification and monitoring steps in order:", "correct": ["Confirm age, weight, cultures, and suspected source", "Verify empiric regimen and neonatal dosing interval", "Assess renal function and drug-level plan if aminoglycoside used", "Set culture follow-up and de-escalation time", "Document monitoring for toxicity and efficacy"], "note": "Neonatal antibiotics require age-specific intervals and planned reassessment."}, {"type": "mcq", "kick": "BCPS-style integration: decimal safety", "q": "Which order is safest for a 3.2 kg infant?", "opts": [{"t": "Dose written with leading zero when needed, no trailing zero, mg and mL checked against concentration, and max dose reviewed", "ok": true, "fb": "Correct. Pediatric medication safety is formatting plus calculation plus concentration."}, {"t": "Dose written as .5 mg with no leading zero", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "Adult dose copied and adjusted by instinct", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "mcq", "kick": "Concept check: neonatal renal function", "q": "Why are neonatal dosing intervals often longer than older children?", "opts": [{"t": "Renal clearance and hepatic metabolism are immature and change rapidly with age", "ok": true, "fb": "Correct. Developmental pharmacokinetics changes clearance."}, {"t": "Neonates absorb no medications", "ok": false, "fb": "That misses the key safety or patient-specific step."}, {"t": "All neonates have adult renal function after birth", "ok": false, "fb": "That is a common shortcut, but not the best pharmacist recommendation."}]}, {"type": "chartHunt", "kick": "Practical case: PICU fluids and nutrition", "q": "Tap every parenteral-nutrition monitoring, refeeding, or compatibility problem.", "rows": [{"text": "PN started without baseline triglyceride, glucose, electrolyte, and line-access review", "problem": true, "why": "PN requires metabolic and access monitoring."}, {"text": "Refeeding-risk child has no phosphorus monitoring plan", "problem": true, "why": "Refeeding can cause dangerous hypophosphatemia."}, {"text": "Enteral nutrition considered once gut is functional", "problem": false, "why": "Enteral route is preferred when feasible."}, {"text": "Calcium and phosphate amounts exceed compatibility limits in PN", "problem": true, "why": "PN compatibility affects precipitation risk."}], "note": "NICU/PICU nutrition is medication safety."}, {"type": "mcq", "kick": "BCPS-style integration: bronchiolitis", "q": "Infant with bronchiolitis has scheduled albuterol, steroids, and antibiotics without bacterial evidence. Best pharmacis function capFirst(s){return String(s||'topic').charAt(0).toUpperCase()+String(s||'topic').slice(1)}
function makeGeneratedCase(m,n){
  const themes=MODULE_CASE_THEMES[m.id]||[m.title+' core concept',m.title+' patient case',m.title+' monitoring issue',m.title+' safety trap'];
  const t=themes[n%themes.length], label=capFirst(t);
  const baseAction='Choose the patient-specific plan, document the rationale, and set a monitoring or follow-up trigger';
  const trap='Pick the fastest-looking answer without checking patient factors, monitoring, or system workflow';
  const monitor='Define the clinical endpoint, toxicity endpoint, lab or symptom timing, and escalation trigger';
  if(n%4===0)return {type:'mcq',kick:'BCPS-style integration',q:label+': a preceptor asks for the best pharmacist recommendation. What is the strongest answer?',opts:[{t:baseAction,ok:true,fb:'Correct. Board-style reasoning integrates evidence, patient factors, monitoring, and workflow.'},{t:trap,ok:false,fb:'This is the common trap. A plausible action is not enough if it skips patient-specific safety checks.'},{t:'Defer all decisions because the pharmacist should only dispense the medication',ok:false,fb:'Clinical pharmacists assess medication therapy and recommend safe changes.'}],note:'BCPS-style original case: defend the best recommendation, not just any reasonable recommendation.'};
  if(n%4===1)return {type:'chartHunt',kick:'Practical chart review',q:label+': tap the items that need pharmacist follow-up.',rows:[{text:'Missing monitoring plan for a high-risk medication or intervention',problem:true,why:'A plan without monitoring is incomplete and unsafe.'},{text:'Patient-specific factor changes the usual dosing or selection logic',problem:true,why:'Renal function, weight, age, organ failure, allergy history, pregnancy, or access can change the best plan.'},{text:'Clear indication, appropriate dose, and documented follow-up',problem:false,why:'This is reasonable if it matches the patient and protocol.'},{text:'No documentation of the rationale for an exception to protocol',problem:true,why:'Protocol exceptions need a clear rationale and follow-up plan.'}],note:'Practical cases train the chart-review reflex before the patient is harmed.'};

  return studyOrderedModules().map((m,i)=>{ const r=results[m.id]||[]; const total=(m.cases||[]).length; const attempted=r.filter(x=>x!==null).length; const correct=r.filter(x=>x===true).length; const types=[...new Set((m.cases||[]).map(c=>caseTypeName(c.type||'mcq')))]; return {seq:i+1,id:m.id,title:m.title,area:m.area,total,attempted,correct,pct:safePct(correct,total),status:attempted===0?'Not started':attempted<total?'In progress':'Completed',types}; });
}
function reportSummary(){ const rows=moduleReportRows(); const totalCases=rows.reduce((n,r)=>n+r.total,0); const attempted=rows.reduce((n,r)=>n+r.attempted,0); const correct=rows.reduce((n,r)=>n+r.correct,0); return {modules:MODULES.length,doneModules:rows.filter(r=>r.status==='Completed').length,totalCases,attempted,correct,pct:safePct(correct,totalCases),attemptPct:safePct(attempted,totalCases),cards:typeof buildStudyCards==='function'?buildStudyCards().length:0}; }
function reportReadinessCards(){
  const rows=areaReportRows();
  return rows.map(r=>{ const pass = r.area==='core' ? r.attemptPct>=80 : (r.attemptPct>=70 && r.pct>=60); const label = pass?'Ready to discuss':'Keep practicing'; return `<div class="ready-card ${pass?'good':'warn'}"><b>${r.area==='core'?'Core':r.area}</b><span>${label}<br>${r.correct}/${r.total} correct · ${r.doneMods}/${r.modules} modules complete</span></div>`; }).join('');
}
function typeMixHTML(types){ return Object.entries(types).sort((a,b)=>b[1]-a[1]).map(([t,n])=>`<span class="report-pill">${caseTypeName(t)} ${n}</span>`).join(''); }
function showCompetencyReport(){
  if(!G){ G={name:'Joey Han',avatar:pickedAv,results:initResults()}; }
  saveProgress('report'); setBG('core');
  const s=reportSummary(), areas=areaReportRows(), mods=moduleReportRows();
  const learner=(G&&G.name)||'Joey Han';
  document.getElementById('app').innerHTML=`
    <div class="stage bg-core" id="stage">${bokehHTML()}</div>
    ${hudHTML('core')}
    <div class="center-layer" style="justify-content:flex-start;padding-top:64px">
      <div class="report-panel">
        <div class="report-head"><div><h2>Preceptor Review</h2><div class="report-sub">Resident: ${learner} · PGY-1 onboarding · ${new Date().toLocaleDateString()}<br>A clean review scene for your rotation progress, strengths, and next practice targets.</div></div><div class="report-actions"><button class="btn ghost sm" onclick="goHub()">Back to rotations</button></div></div>
        <div class="report-grid"><div class="report-metric"><b>${s.doneModules}/${s.modules}</b><span>Rotations finished</span></div><div class="report-metric"><b>${s.correct}/${s.totalCases}</b><span>Cases correct</span></div><div class="report-metric"><b>${s.attemptPct}%</b><span>Cases practiced</span></div><div class="report-metric"><b>${s.cards}</b><span>Study cards ready</span></div></div><div class="report-note"><b>Preceptor note:</b> This page is your end-of-shift review board. Use it to see where you are strong, where you need another pass, and which rotations to revisit next.</div>
        <div class="report-section"><h3>Readiness snapshot</h3><div class="readiness-grid">${reportReadinessCards()}</div><div class="report-note">This is a simulation review for coaching only. Real residency evaluation still comes from your preceptor, site policy, and observed practice.</div></div>
        <div class="report-section"><h3>Competency map</h3><table class="report-table"><thead><tr><th>Area</th><th>Progress</th><th>Practice record</th><th>Practice styles</th></tr></thead><tbody>${areas.map(r=>`<tr><td><b>${r.area}</b><br>${r.label}</td><td><div class="report-bar"><i style="width:${r.pct}%"></i></div><small>${r.pct}% correct · ${r.attemptPct}% attempted</small></td><td>${r.correct}/${r.total} correct<br>${r.doneMods}/${r.modules} modules complete</td><td>${typeMixHTML(r.types)}</td></tr>`).join('')}</tbody></table></div>
        <div class="report-section"><h3>Rotation progress</h3><div class="evidence-scroll"><table class="report-table"><thead><tr><th>#</th><th>Rotation</th><th>Area</th><th>Status</th><th>Progress</th><th>Practice styles</th></tr></thead><tbody>${mods.map(r=>`<tr><td>${String(r.seq).padStart(2,'0')}</td><td><b>${r.title}</b></td><td>${r.area}</td><td>${r.status}</td><td>${r.correct}/${r.total} · ${r.pct}%</td><td>${r.types.map(t=>`<span class="report-pill ${r.status==='Completed'?'good':r.status==='Not started'?'warn':''}">${t}</span>`).join('')}</td></tr>`).join('')}</tbody></table></div></div>
      </div>
    </div>`;
}
function csvCell(v){ return '"'+String(v??'').replace(/"/g,'""').replace(/\s+/g,' ').trim()+'"'; }
function downloadTextFile(name, text, type){ const blob=new Blob([text],{type:type||'text/plain;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},500); }
function exportCompetencyCSV(){ const rows=[['sequence','module_id','module_title','area','status','cases_total','cases_attempted','cases_correct','score_percent','question_formats']].concat(moduleReportRows().map(r=>[r.seq,r.id,r.title,r.area,r.status,r.total,r.attempted,r.correct,r.pct,r.types.join('; ')])); downloadTextFile('clinical-path-pgy1-competency-report.csv', rows.map(row=>row.map(csvCell).join(',')).join('\n'), 'text/csv;charset=utf-8'); }
function exportCompetencyJSON(){ const payload={product:'The Clinical Path: PGY-1', learner:(G&&G.name)||'Joey Han', generatedAt:new Date().toISOString(), summary:reportSummary(), areas:areaReportRows(), modules:moduleReportRows()}; downloadTextFile('clinical-path-pgy1-competency-report.json', JSON.stringify(payload,null,2), 'application/json;charset=utf-8'); }

</script>
