<!DOCTYPE html>
<!-- clinical-path cast-v1: Harlin, Belle Deans, Joey Han + real hospital bg -->
<!-- pages retry: preceptor review polish 2026-07-09 -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Clinical Path — PGY-1 with Your Preceptor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#3a2e4a; --pink:#ff7fa8; --pink2:#ff9db8; --rose:#ffdfe9;
    --teal:#2bb7a8; --sky:#5cb8ff; --lav:#b28bff; --peach:#ffb36b;
    --gold:#ffd166; --font-scale:1;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:"Nunito","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    color:var(--ink);background:#12101a;overflow:hidden;user-select:none;-webkit-tap-highlight-color:transparent}
  .display{font-family:"Jua",sans-serif}
  #app{position:relative;width:100vw;height:100vh;overflow:hidden}

  /* ---------- backgrounds ---------- */
  .stage{position:absolute;inset:0;transition:background .6s ease}
  .bg-title{background:radial-gradient(120% 90% at 50% 0%,#ffd7e6 0%,#c9b8ff 45%,#8fb8ff 100%)}
  .bg-core{background:linear-gradient(160deg,#fff1f6,#ffe0ec 55%,#ffd0e2)}
  .bg-R1{background:linear-gradient(160deg,#e7fbf6,#c8f5ec 55%,#a7ecdf)}
  .bg-R2{background:linear-gradient(160deg,#eaf4ff,#cfe6ff 55%,#b3d6ff)}
  .bg-R3{background:linear-gradient(160deg,#f3ecff,#e3d4ff 55%,#d3bcff)}
  .bg-R4{background:linear-gradient(160deg,#fff4e6,#ffe6c9 55%,#ffd7a8)}
  /* floating bokeh */
  .bokeh{position:absolute;border-radius:50%;background:rgba(255,255,255,.5);filter:blur(2px);
    animation:float 9s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-22px)}}

  /* ---------- HUD ---------- */
  .hud{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:10px;
    padding:14px 18px;z-index:20}
  .hud .area-pill{background:rgba(255,255,255,.75);backdrop-filter:blur(6px);border-radius:20px;
    padding:6px 15px;font-weight:800;font-size:13px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
  .hud .spacer{flex:1}
  .bond{background:rgba(255,255,255,.75);backdrop-filter:blur(6px);border-radius:20px;padding:6px 14px;
    display:flex;align-items:center;gap:8px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
  .bond .lbl{font-size:12px;font-weight:800;color:var(--pink)}
  .bond .hbar{width:78px;height:9px;background:#ffdfe9;border-radius:9px;overflow:hidden}
  .bond .hbar i{display:block;height:100%;background:linear-gradient(90deg,#ff9db8,#ff5f92);transition:width .5s}
  .menu-btn{background:rgba(255,255,255,.75);backdrop-filter:blur(6px);border:none;border-radius:14px;
    width:38px;height:38px;font-size:16px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.08)}

  /* ---------- character ---------- */
  .char-layer{position:absolute;left:50%;bottom:112px;transform:translateX(-50%);
    height:78vh;max-height:740px;z-index:8;animation:breathe 4.5s ease-in-out infinite;
    filter:drop-shadow(0 22px 30px rgba(90,50,90,.3));pointer-events:none}
  @keyframes breathe{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-10px)}}
  .char-layer svg{height:100%}
  .char-layer img{height:100%;width:auto;object-fit:contain;filter:drop-shadow(0 20px 26px rgba(15,25,40,.55))}
  .stage.scene-photo{background-size:cover;background-position:center;background-repeat:no-repeat}
  .scene-tint{position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(10,22,40,.30),rgba(10,22,40,.10) 42%,rgba(10,20,38,.42))}
  .scene-vig{position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 240px rgba(6,14,26,.6)}
  .scene-dim{position:absolute;left:0;right:0;bottom:0;height:46%;pointer-events:none;background:linear-gradient(180deg,rgba(6,14,26,0),rgba(6,14,26,.6))}
  .char-pop{animation:pop .5s cubic-bezier(.3,1.4,.5,1)}
  @keyframes pop{0%{transform:translateX(-50%) scale(.8);opacity:0}100%{transform:translateX(-50%) scale(1);opacity:1}}

  /* sparkles / hearts on praise */
  .fx{position:absolute;inset:0;z-index:9;pointer-events:none;overflow:hidden}
  .fx .p{position:absolute;font-size:26px;animation:rise 1.4s ease-out forwards;opacity:0}
  @keyframes rise{0%{transform:translateY(20px) scale(.5);opacity:0}
    25%{opacity:1}100%{transform:translateY(-160px) scale(1.15);opacity:0}}

  /* ---------- VN dialogue box ---------- */
  .vn-wrap{position:absolute;left:0;right:0;bottom:0;z-index:15;padding:0 16px 18px}
  .vn-name{display:inline-block;background:linear-gradient(120deg,#ff7fa8,#ff4f86);color:#fff;
    font-family:"Jua",sans-serif;font-size:19px;padding:7px 26px;border-radius:18px 18px 4px 0;
    margin-left:26px;box-shadow:0 -2px 12px rgba(255,79,134,.35);position:relative;z-index:2}
  .vn-box{background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(255,244,249,.97));
    backdrop-filter:blur(12px);border:3px solid rgba(255,150,185,.9);
    border-radius:8px 22px 22px 22px;padding:20px 28px 22px;min-height:128px;max-width:960px;margin:0 auto;
    box-shadow:0 18px 46px rgba(120,50,90,.32),inset 0 2px 0 rgba(255,255,255,.7);position:relative;cursor:pointer}
  .vn-box.nameless{border-radius:22px}
  .vn-text{font-size:calc(19px * var(--font-scale,1));line-height:1.6;font-weight:700;color:#4a3540;min-height:52px}
  .vn-ctrl{position:absolute;top:-15px;right:22px;display:flex;gap:6px}
  .vn-ctrl button{font-family:"Jua";font-size:11px;color:#fff;background:rgba(84,64,92,.76);
    border:1px solid rgba(255,255,255,.45);padding:3px 13px;border-radius:12px;letter-spacing:1px;
    box-shadow:0 3px 8px rgba(0,0,0,.12);cursor:pointer;line-height:1.25}
  .vn-ctrl button:hover{background:rgba(42,31,53,.88)}
  .vn-ctrl button.on{background:#2bb7a8;color:#fff}
  .vn-log-ov{position:absolute;inset:0;z-index:80;background:rgba(14,18,34,.55);display:flex;align-items:center;justify-content:center;padding:22px}
  .vn-log-card{width:min(860px,94vw);max-height:82vh;overflow:auto;background:rgba(255,255,255,.97);border:1px solid rgba(255,180,210,.7);border-radius:22px;box-shadow:0 24px 80px rgba(20,15,35,.35);padding:18px 20px;color:#3a2e4a}
  .vn-log-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
  .vn-log-head h3{margin:0;font-family:"Jua";font-size:24px;color:#c23b6b}
  .vn-log-row{border-top:1px solid #f3d6e2;padding:10px 0;font-size:14px;line-height:1.55}
  .vn-log-row b{color:#7a4d8f}
  .stage.scene-photo{backface-visibility:hidden;transform:translateZ(0);will-change:background-image}
  .char-layer img{will-change:opacity,transform}
  .char-glow{position:absolute;left:50%;top:8%;width:74vh;height:74vh;transform:translateX(-50%);
    background:radial-gradient(circle,rgba(255,255,255,.6),rgba(255,255,255,0) 60%);z-index:6;pointer-events:none}
  .scene-floor{position:absolute;left:0;right:0;bottom:0;height:30%;
    background:linear-gradient(180deg,rgba(255,255,255,0),rgba(255,255,255,.3));pointer-events:none}
  .scene-beam{position:absolute;left:-4%;top:0;width:46%;height:120%;pointer-events:none;
    background:linear-gradient(118deg,rgba(255,255,255,.5),rgba(255,255,255,0) 42%);transform:rotate(6deg);transform-origin:top left}
  .scene-win{position:absolute;left:5%;top:12%;width:180px;height:132px;border-radius:14px;pointer-events:none;
    background:linear-gradient(160deg,rgba(255,255,255,.55),rgba(180,220,255,.35));
    border:7px solid rgba(255,255,255,.6);box-shadow:0 10px 34px rgba(255,255,255,.4)}
  .scene-win i{position:absolute;left:50%;top:0;bottom:0;width:5px;background:rgba(255,255,255,.6);transform:translateX(-50%)}
  .scene-win b{position:absolute;top:50%;left:0;right:0;height:5px;background:rgba(255,255,255,.6);transform:translateY(-50%)}
  .vn-note{margin-top:11px;background:#f4f0ff;border-left:4px solid var(--lav);border-radius:10px;
    padding:10px 13px;font-size:calc(13.5px * var(--font-scale,1));line-height:1.5;font-weight:600;color:#4a3d63;cursor:default}
  .vn-note b{color:#2a2140}
  .adv{position:absolute;right:18px;bottom:12px;font-size:14px;color:var(--pink);animation:blink 1s infinite}
  @keyframes blink{0%,100%{opacity:.25}50%{opacity:1}}

  /* choices */
  .vn-choices{max-width:900px;margin:0 auto}
  .choices{max-width:760px;margin:0 auto 12px;display:flex;flex-direction:column;gap:10px}
  .choice{background:rgba(255,255,255,.96);border:2.5px solid #ffd0e0;border-radius:16px;
    padding:13px 18px;font-size:calc(15px * var(--font-scale,1));font-weight:700;cursor:pointer;text-align:left;
    box-shadow:0 6px 18px rgba(90,50,90,.14);transition:.14s}
  .choice:hover{border-color:var(--pink);background:#fff4f8;transform:translateX(4px)}
  .choice:disabled{cursor:default;opacity:.65}
  .choice.correct{border-color:var(--teal);background:#dff9f3}
  .choice.wrong{border-color:#ff6b8a;background:#ffe4ea}
  .choice .k{color:var(--pink);font-family:"Jua";margin-right:8px}

  /* order UI */
  .ord-dst{max-width:760px;margin:0 auto 8px;min-height:46px;background:rgba(255,255,255,.85);
    border:2.5px dashed #ffc4d8;border-radius:16px;padding:8px;display:flex;flex-wrap:wrap;gap:7px}
  .ord-src{max-width:760px;margin:0 auto 10px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  .calc-given{max-width:760px;margin:0 auto 10px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  .calc-given .cg{background:rgba(255,255,255,.9);border:2px solid #ffe0ec;border-radius:12px;padding:6px 12px;font-size:13.5px;font-weight:700;color:#5a3a48}
  .calc-given .cg b{color:var(--teal,#0d9488)}
  .calc-row{max-width:520px;margin:0 auto;display:flex;gap:8px;align-items:center;justify-content:center}
  .calc-input{font-family:'Nunito';font-weight:800;font-size:20px;text-align:center;padding:10px 14px;width:150px;border:2.5px solid #ffd0e0;border-radius:14px;outline:none}
  .calc-input:focus{border-color:var(--teal,#0d9488)}
  .calc-unit{font-weight:800;color:#7a4d8f;font-size:15px;min-width:40px}
  .calc-hint{max-width:640px;margin:10px auto 0;background:#eef7ff;border-left:4px solid #5cb8ff;border-radius:10px;padding:10px 14px;font-size:calc(13.5px * var(--font-scale,1));font-weight:600;color:#37506a}
  .oitem{background:#fff;border:2.5px solid #ffd0e0;border-radius:13px;padding:9px 14px;font-size:14px;
    font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(90,50,90,.12)}
  .oitem:hover{border-color:var(--pink);background:#fff4f8}
  .oitem.placed{opacity:.45;cursor:default}
  .oitem .idx{color:var(--pink);font-family:"Jua";margin-right:5px}
  .ord-btns{max-width:760px;margin:0 auto 10px;display:flex;gap:9px;justify-content:center}

  /* generic pretty button */
  .btn{background:linear-gradient(120deg,#ff7fa8,#ff5f92);color:#fff;border:none;border-radius:16px;
    padding:12px 26px;font-family:"Jua";font-size:17px;cursor:pointer;box-shadow:0 8px 20px rgba(255,95,146,.35);
    transition:.14s}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(255,95,146,.45)}
  .btn.mint{background:linear-gradient(120deg,#3fd0bf,#22a897);box-shadow:0 8px 20px rgba(43,183,168,.35)}
  .btn.ghost{background:#fff;color:var(--pink);border:2.5px solid #ffd0e0;box-shadow:0 6px 16px rgba(90,50,90,.12)}
  .btn.sm{padding:9px 18px;font-size:14px}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

  /* ---------- overlays: title / hub / notes / ending ---------- */
  .center-layer{position:absolute;inset:0;z-index:16;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:24px}
  .logo{font-family:"Jua";line-height:1.15}
  .logo .big{display:block;font-size:min(9.5vw,60px);color:#c23b6b;text-shadow:0 3px 0 #fff,0 6px 16px rgba(150,60,110,.25)}
  .logo .small{display:block;font-size:min(4.6vw,21px);color:#7a4d8f;margin-top:8px;font-weight:800}
  .title-plate{background:rgba(255,255,255,.55);backdrop-filter:blur(8px);border:3px solid rgba(255,255,255,.8);
    border-radius:26px;padding:20px 34px;box-shadow:0 16px 40px rgba(120,70,130,.22)}
  .heart-input{margin-top:26px;display:flex;flex-direction:column;align-items:center;gap:12px}
  .heart-input input{font-family:"Nunito";font-weight:700;padding:12px 18px;border:3px solid #fff;
    border-radius:16px;font-size:16px;width:min(76vw,300px);text-align:center;outline:none;
    box-shadow:0 8px 20px rgba(90,50,90,.2)}
  .avatars{display:flex;gap:10px;margin:6px 0}
  .av{width:52px;height:52px;border-radius:14px;border:3px solid #fff;background:rgba(255,255,255,.7);
    font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .av.sel{border-color:var(--pink);background:#fff;transform:scale(1.08)}

  /* hub / rotation select */
  .hub-panel{background:rgba(255,255,255,.82);backdrop-filter:blur(10px);border-radius:26px;
    padding:20px 22px;max-width:940px;width:100%;box-shadow:0 20px 50px rgba(90,50,90,.28);
    max-height:86vh;overflow:auto}
  .hub-panel h2{font-family:"Jua";font-size:24px;margin:2px 0 4px;color:#c23b6b;text-align:center}
  .hub-sub{text-align:center;font-size:calc(13px * var(--font-scale,1));color:#8a6f82;font-weight:700;margin-bottom:14px}
  .comp-row{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:16px}
  @media(max-width:640px){.comp-row{grid-template-columns:1fr 1fr}}
  .compb{background:#fff;border-radius:14px;padding:9px 12px;box-shadow:0 6px 16px rgba(90,50,90,.1)}
  .compb .k{font-family:"Jua";font-size:12px}
  .compb .n{font-size:11px;color:#8a6f82;font-weight:700;margin-bottom:6px}
  .compb .b{height:8px;background:#efe7f5;border-radius:8px;overflow:hidden}
  .compb .b i{display:block;height:100%;transition:width .5s}
  .mcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
  .mc{background:#fff;border-radius:18px;overflow:hidden;cursor:pointer;position:relative;
    box-shadow:0 8px 20px rgba(90,50,90,.14);transition:.15s;border:2.5px solid transparent}
  .mc:hover{transform:translateY(-3px);box-shadow:0 14px 28px rgba(90,50,90,.2)}
  .mc .top{height:64px;display:flex;align-items:center;justify-content:center;font-size:30px}
  .mc .bd{padding:11px 13px 13px}
  .mc .t{font-family:"Jua";font-size:calc(15px * var(--font-scale,1));line-height:1.25}
  .mc .bl{font-size:calc(11.5px * var(--font-scale,1));color:#8a6f82;font-weight:700;line-height:1.4;margin-top:4px;min-height:32px}
  .mc .f{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
  .mc .cpill{font-family:"Jua";font-size:10px;color:#fff;padding:3px 9px;border-radius:20px}
  .mc .prog{font-size:11px;font-weight:800;color:#b58aa6}
  .mc .heart{position:absolute;top:9px;right:10px;font-size:18px;display:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}
  .mc.done .heart{display:block}
  .mc.done{border-color:#ffbcd2}

  /* notes overlay */
  .notes-ov{position:absolute;inset:0;z-index:40;background:rgba(58,46,74,.55);display:flex;
    align-items:center;justify-content:center;padding:20px}
  .notes-card{background:#fff;border-radius:22px;max-width:760px;width:100%;max-height:84vh;overflow:auto;font-size:calc(16px * var(--font-scale,1));
    padding:22px 26px;box-shadow:0 24px 60px rgba(0,0,0,.4)}
  .notes-card h3{font-family:"Jua";color:#c23b6b}
  .brief{font-size:calc(14px * var(--font-scale,1));line-height:1.6}
  .brief .lead{color:#4a3d63}
  .brief h3{font-size:16px;margin:18px 0 7px;padding-bottom:5px;border-bottom:2px solid #f4eef8;color:#7a4d8f}
  .brief h4{font-size:13px;margin:12px 0 4px;color:#8a6f82}
  .brief ul,.brief ol{margin:5px 0;padding-left:20px}
  .brief li{margin:3px 0}
  .brief b{color:#3a2e4a}
  .callout{border-radius:12px;padding:11px 14px;margin:10px 0;font-size:calc(13px * var(--font-scale,1));line-height:1.5}
  .callout.info{background:#eaf4ff;border-left:4px solid var(--sky)}
  .callout.warn{background:#ffe9ee;border-left:4px solid #ff6b8a}
  .callout.pearl{background:#fff6e0;border-left:4px solid var(--peach)}
  .callout b{display:block;margin-bottom:2px}
  .rolegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:9px;margin:10px 0}
  .rolebox{border:1.5px solid #f0e6f5;border-radius:12px;padding:10px 12px;background:#fffafd}
  .rolebox .num{font-family:"Jua";font-size:11px;color:var(--peach)}
  .rolebox .rt{font-family:"Jua";font-size:14px;margin:2px 0 3px}
  .rolebox .rd{font-size:11.5px;color:#8a6f82;line-height:1.4}
  table.ref{width:100%;border-collapse:collapse;margin:10px 0;font-size:12.5px}
  table.ref th,table.ref td{border:1px solid #f0e6f5;padding:7px 9px;text-align:left;vertical-align:top}
  table.ref th{background:#faf5fe;font-family:"Jua";font-weight:400}
  .duty{display:grid;grid-template-columns:1fr 1fr;gap:5px 14px;margin:7px 0}
  @media(max-width:560px){.duty{grid-template-columns:1fr}}
  .duty div{font-size:12.5px;padding-left:16px;position:relative}
  .duty div:before{content:"";position:absolute;left:0;font-size:9px}

  .hosp{position:absolute;inset:0;width:100%;height:100%;z-index:0;opacity:.92;pointer-events:none}
  .char-glow{z-index:2}
  .hidden{display:none!important}

  /* ending */
  .ending-card{background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-radius:26px;
    padding:28px 26px;max-width:520px;width:100%;box-shadow:0 24px 60px rgba(90,50,90,.3);text-align:center}
  .ending-card .medal{font-size:60px}
  .ending-card h2{font-family:"Jua";font-size:26px;color:#c23b6b;margin:6px 0}
  .ending-card .rk{font-size:14px;color:#6b5a78;font-weight:700;line-height:1.55;margin-bottom:14px}
  .sgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
  .sgrid div{background:#fff6fa;border-radius:11px;padding:8px 12px;font-size:12.5px;font-weight:700;
    display:flex;justify-content:space-between}
  .sgrid b{font-family:"Jua";color:var(--pink)}

  .hunt-hint{max-width:760px;margin:0 auto 8px;text-align:center;font-size:12.5px;font-weight:700;color:#b58aa6}
  .hunt-list{max-width:820px;margin:0 auto 10px;display:flex;flex-direction:column;gap:7px}
  .hunt-row{background:rgba(255,255,255,.96);border:2.5px solid #ffd0e0;border-radius:14px;padding:11px 16px;font-size:14.5px;font-weight:700;color:#4a3540;text-align:left;cursor:pointer;font-family:inherit;transition:.12s}
  .hunt-row:hover{border-color:#ff7fa8;background:#fff4f8}
  .hunt-row.sel{border-color:#5cb8ff;background:#eaf4ff}
  .hunt-row.correct{border-color:#2bb7a8;background:#dff9f3}
  .hunt-row.wrong{border-color:#ff6b8a;background:#ffe4ea}
  .hunt-row:disabled{cursor:default;opacity:.95}
  .sbar-slot{max-width:820px;margin:0 auto 10px;background:rgba(255,255,255,.6);border-radius:14px;padding:8px 10px}
  .sbar-key{font-size:12px;font-weight:800;color:#7a4d8f;letter-spacing:.04em;text-transform:uppercase;margin:2px 4px 6px}
  .sbar-frag{display:block;width:100%;background:rgba(255,255,255,.96);border:2.5px solid #ffe0ec;border-radius:12px;padding:9px 14px;font-size:13.5px;font-weight:700;color:#4a3540;text-align:left;cursor:pointer;font-family:inherit;margin-bottom:6px;transition:.12s}
  .sbar-frag:hover{border-color:#ff7fa8}
  .sbar-frag.sel{border-color:#5cb8ff;background:#eaf4ff}
  .sbar-frag.correct{border-color:#2bb7a8;background:#dff9f3}
  .sbar-frag.wrong{border-color:#ff6b8a;background:#ffe4ea}
  .sbar-frag:disabled{cursor:default}

/* ===== VN romance polish v11 — dating-sim inspired gamification layer ===== */
:root{--rose:#ff5f92;--rose2:#ff8fb1;--lav:#8e77c9;--roseline:#ffd0e0}
/* dialogue frame */
.vn-name{background:linear-gradient(120deg,#ff6f9c,#c86dd7);color:#fff;font-weight:900;font-size:14.5px;letter-spacing:.01em;padding:7px 18px;border-radius:12px 12px 0 0;box-shadow:0 6px 16px rgba(200,60,120,.28)}
.vn-box{background:linear-gradient(180deg,rgba(255,255,255,.985),rgba(255,246,250,.985));border:1.5px solid #ffc9dc;border-radius:0 16px 16px 16px;box-shadow:0 18px 44px rgba(120,40,90,.20)}
.vn-box.nameless{border-radius:16px}
.vn-box .adv{color:var(--rose)}
.dialogue-stack{animation:boxIn .26s ease}
@keyframes boxIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.char-layer img{animation:spriteIn .3s ease}
@keyframes spriteIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* choices */
.choice{border:1.6px solid #f3d3e2;border-radius:14px;box-shadow:0 4px 14px rgba(120,40,90,.08);background:#fff}
.choice:hover{border-color:var(--rose);background:#fff5f9;transform:translateX(6px)}
.choice .k{color:#fff;background:linear-gradient(120deg,#ff7fa8,#c86dd7);border-radius:8px;padding:2px 8px;margin-right:10px;font-size:12px;font-family:"Nunito",sans-serif;font-weight:900}
.choice.correct{border-color:#2bb7a8;background:#e9fbf7}
.choice.wrong{border-color:#ff8fa8;background:#fff0f4}
/* buttons */
.btn{border-radius:14px}
.btn.tmain{background:linear-gradient(120deg,#ff6f9c,#c86dd7);box-shadow:0 10px 26px rgba(200,80,140,.35);font-size:17px;padding:13px 30px}
.btn.tmain:hover{box-shadow:0 14px 30px rgba(200,80,140,.45)}
/* HUD bond hearts */
.bond{gap:9px;padding:6px 12px 6px 14px;border:1px solid var(--roseline)!important;background:rgba(255,255,255,.94)!important}
.bond .lbl{color:#c2427c!important;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.hearts{display:inline-flex;gap:3px;align-items:center}
.hrt{position:relative;width:16px;height:16px;display:inline-block}
.hrt svg{position:absolute;inset:0;width:100%;height:100%}
.hrt .bgp{fill:#f2dce7}
.hrt .fgp{fill:#ff4f86}
.bond .bcount{font-size:11.5px;font-weight:900;color:#a86a8b;background:#fff0f6;border-radius:8px;padding:2px 7px}
.menu-btn{width:auto;padding:0 14px;font-weight:900;font-size:12.5px;color:#5a3d55;border:1px solid var(--roseline)!important;background:rgba(255,255,255,.94)!important;border-radius:12px;height:37px;cursor:pointer}
.menu-btn:hover{color:var(--rose)}
/* particles */
.fx .p{position:absolute;width:22px;height:22px;animation:rise 1.5s ease-out forwards;opacity:0;transform:scale(var(--s,1))}
.fx .p svg{width:100%;height:100%}
.fx .p.ph svg path{fill:#ff6f9c;opacity:.92}
.fx .p.pd svg circle{fill:#a9bfff;opacity:.75}
/* stat toasts */
.stat-toasts{position:fixed;top:64px;right:18px;z-index:90;display:flex;flex-direction:column;gap:6px;pointer-events:none;align-items:flex-end}
.stat-toast{background:#fff;border:1.6px solid var(--c,#ff5f92);color:var(--c,#ff5f92);font-weight:900;font-size:13px;border-radius:999px;padding:7px 14px;box-shadow:0 10px 24px rgba(120,40,90,.16);animation:toastIn .3s ease backwards,toastOut .45s ease 1.6s forwards}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px) scale(.96)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateY(-8px)}}
/* rank up banner */
.rank-banner{position:absolute;top:62px;left:0;right:0;display:flex;justify-content:center;z-index:19;pointer-events:none}
.rank-banner .rk-k{background:#3f2a46;color:#ffd9e6;font-size:11px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;border-radius:14px 0 0 14px}

/* chapter title card */

.cast-panel{background:rgba(255,255,255,.95);border:1.5px solid var(--roseline);border-radius:22px;padding:24px 26px;max-width:860px;width:100%;box-shadow:0 24px 60px rgba(90,40,80,.30);max-height:88vh;overflow:auto;text-align:center}
.cast-panel h2{margin:0 0 16px;font-size:24px;color:#3f2a46;font-weight:900}
.cast-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.cast-card{background:#fffafc;border:1.5px solid #f6dfeb;border-radius:18px;padding:14px;text-align:center}
.cast-card .cimg{height:170px;display:flex;align-items:flex-start;justify-content:center;overflow:hidden;border-radius:12px;background:linear-gradient(180deg,#ffeef5,#fdf3f8);margin-bottom:10px}
.cast-card .cimg img{height:230px;width:auto;object-fit:cover}
.cast-card b{display:block;font-size:15px;color:#3f2a46}
.cast-card .crole{display:block;font-size:11px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;color:#c2427c;margin:3px 0 6px}
.cast-card p{margin:0;font-size:12.5px;font-weight:700;color:#8a6f82;line-height:1.45}
.cast-note{font-size:12px;color:#9a8393;font-weight:700;margin:14px 0 4px}
/* hub cards: done heart */
.mc .heart{position:absolute;top:9px;right:10px;width:19px;height:19px;z-index:2;background:#f0dbe6;-webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 21s-6.7-4.4-9.3-8C.8 10.4 1.9 6.5 5 5.3c2-.8 4.3-.2 5.8 1.5L12 8l1.2-1.2c1.5-1.7 3.8-2.3 5.8-1.5 3.1 1.2 4.2 5.1 2.3 7.7-2.6 3.6-9.3 8-9.3 8z'/></svg>") center/contain no-repeat;mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 21s-6.7-4.4-9.3-8C.8 10.4 1.9 6.5 5 5.3c2-.8 4.3-.2 5.8 1.5L12 8l1.2-1.2c1.5-1.7 3.8-2.3 5.8-1.5 3.1 1.2 4.2 5.1 2.3 7.7-2.6 3.6-9.3 8-9.3 8z'/></svg>") center/contain no-repeat}
.mc.done .heart{background:#ff4f86}
.mc:hover{border-color:var(--roseline)}
/* vn ctrl active state */
.vn-ctrl button.on{background:linear-gradient(120deg,#ff7fa8,#c86dd7);color:#fff;border-color:transparent}


/* nameplate per-character colors */
.vn-name[data-who="harlin"]{background:linear-gradient(120deg,#ff6f9c,#c86dd7)}
.vn-name[data-who="dpark"]{background:linear-gradient(120deg,#4f7cd9,#38b6a5)}
.vn-name[data-who="belle"]{background:linear-gradient(120deg,#9d78c8,#c86dd7)}
.vn-name[data-who="joey"],.vn-name[data-who="riley"]{background:linear-gradient(120deg,#5a6b8c,#7d90b4)}
.vn-name[data-who="nurse"]{background:linear-gradient(120deg,#2fa89a,#4fc3b0)}
.vn-name[data-who="attending"]{background:linear-gradient(120deg,#33415c,#5a6b8c)}
.vn-name[data-who="patient"]{background:linear-gradient(120deg,#b08968,#c9a273)}


/* ===== Pip helper bot ===== */
#pipBtn{position:fixed;left:16px;bottom:16px;z-index:150;width:58px;height:58px;border-radius:50%;border:2px solid #ffd0e0;background:#fff;cursor:pointer;box-shadow:0 10px 26px rgba(120,40,90,.28);padding:0;overflow:hidden;transition:.15s}
#pipBtn:hover{transform:translateY(-2px);border-color:#ff5f92}
#pipBtn.on{border-color:#ff5f92;box-shadow:0 12px 30px rgba(255,95,146,.4)}
#pipBtn img{width:100%;height:100%;object-fit:cover;object-position:center 18%}
#pipBtn .pip-fallback{display:none;font-weight:900;font-size:22px;color:#ff5f92}
#pipBtn.noimg .pip-fallback{display:block}
#pipBtn.noimg img{display:none}
#pipPanel{position:fixed;left:16px;bottom:84px;z-index:150;width:min(320px,calc(100vw - 32px));background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(255,246,250,.98));border:1.6px solid #ffc9dc;border-radius:18px;box-shadow:0 22px 54px rgba(120,40,90,.30);opacity:0;pointer-events:none;transform:translateY(10px);transition:.2s ease}
#pipPanel.on{opacity:1;pointer-events:auto;transform:none}
.pip-head{display:flex;gap:10px;align-items:center;padding:12px 14px 8px}
.pip-head img{width:44px;height:44px;border-radius:12px;object-fit:cover;object-position:center 14%;background:#fff0f6;border:1px solid #f6dfeb}
.pip-head b{display:block;font-size:14.5px;color:#3f2a46}
.pip-head span{display:block;font-size:11px;font-weight:800;color:#c2427c;text-transform:uppercase;letter-spacing:.05em}
.pip-x{margin-left:auto;background:#fff;border:1px solid #f3d3e2;border-radius:10px;width:28px;height:28px;font-size:15px;color:#a86a8b;cursor:pointer;font-weight:900;line-height:1}
.pip-x:hover{color:#ff5f92;border-color:#ff5f92}
.pip-body{padding:4px 14px 12px;font-size:13px;font-weight:700;color:#5d4a5c;line-height:1.55}
.pip-body b{color:#3f2a46}
.pip-hint{display:block;margin-top:8px;font-size:11px;font-weight:800;color:#b58aa6}
.pip-actions{display:flex;gap:6px;padding:0 14px 14px;flex-wrap:wrap}
.pip-actions button{flex:1;min-width:64px;background:#fff;border:1.4px solid #f3d3e2;border-radius:10px;padding:8px 6px;font-family:'Nunito',sans-serif;font-weight:900;font-size:12px;color:#5d4a5c;cursor:pointer;transition:.12s}
.pip-actions button:hover{border-color:#ff5f92;color:#ff5f92;background:#fff5f9}
@media print{#pipBtn,#pipPanel{display:none!important}}


/* ===== v12: bond rewards, calendar, achievements ===== */
.day-chip{background:rgba(255,255,255,.94);border:1px solid var(--roseline);border-radius:20px;padding:6px 13px;font-weight:900;font-size:12px;color:#7a5a72;box-shadow:0 4px 12px rgba(15,23,42,.08)}
.hint-row{display:flex;justify-content:flex-end;margin-bottom:2px}
.hint-btn{background:linear-gradient(120deg,#fff,#fff6fa);border:1.5px dashed #e8b9cf;border-radius:12px;padding:8px 14px;font-family:'Nunito',sans-serif;font-weight:900;font-size:12.5px;color:#c2427c;cursor:pointer;transition:.13s}
.hint-btn:hover{border-style:solid;border-color:#ff5f92}
.hint-btn:disabled{opacity:.75;cursor:default;border-style:solid;color:#8a6f82}
.choice.faded{opacity:.32;text-decoration:line-through;pointer-events:none}
.react-chip{width:40px;height:40px;border-radius:50%;object-fit:cover;object-position:center 12%;border:2px solid #ffd0e0;background:#fff0f6;float:left;margin:0 10px 4px 0}
.streak-tag{display:inline-block;background:linear-gradient(120deg,#ff9b6a,#ff5f92);color:#fff;font-size:10.5px;font-weight:900;letter-spacing:.05em;text-transform:uppercase;border-radius:999px;padding:3px 9px;margin-right:8px;vertical-align:2px}
.unlock-line{display:inline-block;margin-top:8px;font-size:12.5px;font-weight:900;color:#b0792c;background:#fff6e3;border:1px solid #f3ddb0;border-radius:10px;padding:5px 10px}
/* break room */
.break-panel{background:rgba(255,255,255,.95);border:1.5px solid var(--roseline);border-radius:22px;padding:22px 24px;max-width:640px;width:100%;box-shadow:0 24px 60px rgba(90,40,80,.30);text-align:center;max-height:86vh;overflow:auto}
.break-panel h2{margin:0 0 4px;font-size:23px;color:#3f2a46;font-weight:900}
.break-sub{margin:0 0 14px;color:#8a6f82;font-size:13px;font-weight:700}
.story-list{display:flex;flex-direction:column;gap:10px}
.story-card{display:flex;justify-content:space-between;align-items:center;gap:10px;background:#fffafc;border:1.5px solid #f3d3e2;border-radius:14px;padding:14px 16px;cursor:pointer;font-family:'Nunito',sans-serif;transition:.13s;text-align:left}
.story-card:hover{border-color:#ff5f92;background:#fff5f9;transform:translateY(-1px)}
.story-card.locked{opacity:.55;cursor:default}
.story-card.locked:hover{transform:none;border-color:#f3d3e2;background:#fffafc}
.story-card.seen .st-title{color:#8a6f82}
.story-card .st-title{font-size:15px;font-weight:900;color:#3f2a46}
.story-card .st-meta{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:#c2427c;white-space:nowrap}
.story-card.locked .st-meta{color:#a89aa4}
.new-dot{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;background:#ff4f86;color:#fff;font-size:11px;font-weight:900;padding:0 5px;margin-left:4px;vertical-align:1px}
/* achievements */
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.ach-card{position:relative;background:#faf7f2;border:1.5px solid #eee2d0;border-radius:14px;padding:12px 14px 12px 34px;opacity:.55}
.ach-card.got{background:#fffdf5;border-color:#e7c98a;opacity:1;box-shadow:0 6px 16px rgba(176,121,44,.12)}
.ach-card b{display:block;font-size:13.5px;color:#5b4a33}
.ach-card span:not(.ach-dot){font-size:11.5px;font-weight:700;color:#8d7c64;line-height:1.35}
.ach-dot{position:absolute;left:12px;top:15px;width:12px;height:12px;border-radius:50%;background:#d8cbb6}
.ach-card.got .ach-dot{background:linear-gradient(120deg,#e7b54e,#b0792c);box-shadow:0 0 0 3px rgba(231,181,78,.25)}
.stat-toast.ach{background:#fffdf5}
.grad-quote{margin-top:10px;font-size:13px;font-weight:800;color:#7a5a72;background:#fff5f9;border:1px solid #ffd9e6;border-radius:12px;padding:9px 12px;font-style:italic}
@media(max-width:640px){.day-chip{display:none}}


/* ===== v13: rival ===== */
.rival-strip{display:flex;align-items:center;gap:12px;background:linear-gradient(120deg,#f7f4ff,#fff5f9);border:1.5px solid #e4d9f2;border-radius:16px;padding:9px 12px;margin:10px 0 12px}
.rival-strip img{width:46px;height:46px;border-radius:12px;object-fit:cover;object-position:center 10%;background:#efe9f8;border:1px solid #e0d4ef}
.rival-strip .rv-txt{flex:1;min-width:0}
.rival-strip .rv-txt b{display:block;font-size:13px;color:#4b3a5e}
.rival-strip .rv-txt span{display:block;font-size:11.5px;font-weight:800;color:#8a7a9b;line-height:1.35}
.rival-strip .rv-btn{white-space:nowrap}
.rival-strip .rv-next{font-size:11px;font-weight:900;color:#a89ab8;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.fo-score{position:absolute;top:62px;left:0;right:0;display:flex;justify-content:center;gap:10px;z-index:19;pointer-events:none;align-items:center}
.fo-score span{font-weight:900;font-size:13px;border-radius:999px;padding:6px 14px;box-shadow:0 6px 16px rgba(70,35,90,.14)}
.fo-score .fs-you{background:#fff;color:#c2427c;border:1.5px solid #ffc9dc}
.fo-score .fs-vs{background:none;box-shadow:none;color:#fff;font-size:11px;text-shadow:0 1px 6px rgba(0,0,0,.4)}
.fo-score .fs-him{background:#4b3a5e;color:#e9ddfb;border:1.5px solid #6b5787}
.grad-quote.rival-q{background:#f7f4ff;border-color:#e4d9f2;color:#5d4a7c}
@media(max-width:640px){.rival-strip{flex-wrap:wrap}.rival-strip .rv-next{white-space:normal}}


/* ===== v14: mock EHR + patient journeys ===== */
.ehr-win{background:#f4f7fb;border:1px solid #c6d3e3;border-radius:14px;overflow:hidden;box-shadow:0 16px 40px rgba(30,45,70,.18);text-align:left;font-family:'Nunito',sans-serif}
.ehr-top{display:flex;justify-content:space-between;align-items:center;background:#243b55;color:#dce8f7;padding:8px 14px;font-size:11.5px;font-weight:900;letter-spacing:.04em}
.ehr-top .ehr-mod{color:#9db8d8;text-transform:uppercase;font-size:10.5px}
.ehr-banner{display:flex;justify-content:space-between;align-items:center;gap:10px;background:#e9f0f8;border-bottom:1px solid #c6d3e3;padding:9px 14px;flex-wrap:wrap}
.ehr-id b{font-size:14.5px;color:#1d2f45}
.ehr-id span{display:block;font-size:11px;font-weight:800;color:#5b7392}
.ehr-flags{display:flex;gap:6px;flex-wrap:wrap}
.ehr-chip{background:#fff;border:1px solid #c6d3e3;border-radius:999px;font-size:10.5px;font-weight:900;color:#3c5878;padding:4px 10px}
.ehr-chip.warn{background:#fff4e0;border-color:#eccf9a;color:#8a5a00}
.ehr-tabs{display:flex;gap:2px;background:#dde7f2;padding:6px 8px 0}
.ehr-tab{border:1px solid #c6d3e3;border-bottom:none;background:#cfdceb;border-radius:8px 8px 0 0;padding:7px 14px;font-family:'Nunito',sans-serif;font-weight:900;font-size:12px;color:#51698a;cursor:pointer}
.ehr-tab.on{background:#f8fafc;color:#1d2f45}
.ehr-pane{display:none;background:#f8fafc;padding:12px 14px}
.ehr-pane.on{display:block}
.ehr-snap{font-size:13px;font-weight:700;color:#33465e;line-height:1.55;background:#fff;border:1px solid #dbe5f0;border-radius:10px;padding:10px 12px}
.ehr-orders .hunt-row{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#fff;border:1px solid #dbe5f0;border-radius:10px;padding:10px 12px;margin:0 0 6px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;color:#243447;transition:.12s}
.ehr-orders .hunt-row:hover{border-color:#7ba3d4}
.ehr-orders .ord-status{font-size:10px;font-weight:900;letter-spacing:.05em;color:#2e7d5b;background:#e2f5ec;border-radius:6px;padding:3px 7px;white-space:nowrap}
.ehr-orders .ord-text{flex:1;font-size:12.8px;line-height:1.4}
.ehr-orders .ord-flag{font-size:10px;font-weight:900;letter-spacing:.06em;color:#b34a6b;border:1.5px dashed #e5b9c8;border-radius:7px;padding:3px 8px;opacity:.55;white-space:nowrap}
.ehr-orders .hunt-row.sel{border-color:#ff5f92;background:#fff5f9}
.ehr-orders .hunt-row.sel .ord-flag{opacity:1;background:#ff5f92;color:#fff;border-style:solid;border-color:#ff5f92}
.ehr-orders .hunt-row.correct{border-color:#2bb7a8;background:#e9fbf7}
.ehr-orders .hunt-row.wrong{border-color:#ff8fa8;background:#fff0f4}
.ehr-foot{display:flex;justify-content:space-between;align-items:center;gap:10px;background:#e9f0f8;border-top:1px solid #c6d3e3;padding:8px 14px}
.ehr-user{font-size:11px;font-weight:900;color:#51698a}
.ehr-win .hunt-hint{color:#51698a;background:none;font-size:12px;font-weight:800;margin:0 0 8px}
/* journeys */
.arc-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:8px;margin:0 0 12px}
.arc-chip{display:flex;flex-direction:column;align-items:flex-start;gap:4px;background:#fffdfa;border:1.5px solid #f0e2cf;border-radius:14px;padding:9px 12px;cursor:pointer;font-family:'Nunito',sans-serif;text-align:left;transition:.13s}
.arc-chip:hover{border-color:#d8a760;transform:translateY(-1px)}
.arc-chip.done{background:#fbfff9;border-color:#cfe8cd}
.arc-chip b{font-size:12.5px;color:#59431f}
.arc-chip.done b{color:#2e5d33}
.arc-chip .dots{display:inline-flex;gap:4px}
.arc-chip .dots i{width:9px;height:9px;border-radius:50%;background:#eadfce;display:inline-block}
.arc-chip .dots i.on{background:#d8a760}
.arc-chip.done .dots i.on{background:#5c9e63}
.arc-chip .arc-next{font-size:10.5px;font-weight:800;color:#9b8763;line-height:1.3}
.journey-block{background:#fffdfa;border:1.5px solid #f0e2cf;border-radius:16px;padding:12px 14px;margin:0 0 10px;text-align:left}
.jb-head b{font-size:15px;color:#59431f}
.jb-head span{margin-left:8px;font-size:11.5px;font-weight:800;color:#9b8763}
.jb-stage{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px dashed #efe3d0}
.jb-stage:first-of-type{border-top:none}
.jb-dot{width:11px;height:11px;border-radius:50%;background:#eadfce;flex:none}
.jb-stage.seen .jb-dot{background:#5c9e63}
.jb-stage.next .jb-dot{background:#d8a760;box-shadow:0 0 0 3px rgba(216,167,96,.25)}
.jb-t{font-size:13px;font-weight:900;color:#4b3a24;min-width:0}
.jb-m{flex:1;font-size:11px;font-weight:800;color:#a08e6e;text-align:right}
.jb-lock{font-size:10.5px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:#c3b394}
.jb-stage.locked{opacity:.6}
@media(max-width:640px){.jb-m{display:none}}


/* ===== v15: save slots ===== */
.slot-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;text-align:left}
.slot-card{background:#fffafc;border:1.6px solid #f3d3e2;border-radius:16px;padding:13px 15px}
.slot-card.on{border-color:#ff5f92;box-shadow:0 0 0 3px rgba(255,95,146,.12)}
.slot-card.empty{opacity:.85;background:#fcfafc;border-style:dashed}
.slot-no{font-size:10.5px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:#b58aa6;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.slot-cur{background:#ff5f92;color:#fff;border-radius:999px;padding:2px 8px;font-size:9.5px}
.slot-card b{display:block;font-size:16px;color:#3f2a46}
.slot-meta{display:block;font-size:11.5px;font-weight:800;color:#8a6f82;margin:3px 0 10px;line-height:1.4}
.slot-actions{display:flex;gap:6px;flex-wrap:wrap}
.slot-del{color:#b05a6e!important;border-color:#eec3cd!important}
.slot-del:hover{color:#d23b5e!important;border-color:#d23b5e!important}


/* ===== v16: settings + credits ===== */
.set-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0;border-top:1px dashed #f0dfe9;flex-wrap:wrap}
.set-row:first-of-type{border-top:none}
.set-row b{font-size:13.5px;color:#3f2a46}
.seg{display:inline-flex;gap:4px;background:#f7eef4;border-radius:12px;padding:3px}
.seg-btn{border:none;background:transparent;border-radius:9px;padding:7px 14px;font-family:'Nunito',sans-serif;font-weight:900;font-size:12px;color:#8a6f82;cursor:pointer;transition:.12s}
.seg-btn.on{background:#fff;color:#c2427c;box-shadow:0 3px 8px rgba(120,40,90,.14)}
.credits-wrap{position:absolute;inset:0;z-index:30;overflow:hidden;cursor:pointer}
.credits-roll{position:absolute;left:50%;transform:translateX(-50%);width:min(480px,92vw);text-align:center;animation:crRoll 36s linear forwards;top:100%}
@keyframes crRoll{from{top:100%}to{top:-260%}}
.cr-title{margin-bottom:34px}
.cr-title span{display:block;font-size:12px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:#c2427c}
.cr-title b{display:block;font-size:34px;color:#3f2a46;font-weight:900}
.cr-card{background:rgba(255,255,255,.88);border:1.5px solid #ffd0e0;border-radius:18px;padding:14px;margin:0 0 18px;box-shadow:0 10px 26px rgba(120,40,90,.14)}
.cr-card img{height:150px;width:auto;object-fit:cover;object-position:top;border-radius:12px;background:linear-gradient(180deg,#ffeef5,#fdf3f8)}
.cr-card b{display:block;font-size:17px;color:#3f2a46;margin-top:8px}
.cr-card span{display:block;font-size:12px;font-weight:800;color:#8a6f82}
.cr-stats{margin:22px 0;font-size:14px;font-weight:800;color:#5d4a5c;background:rgba(255,255,255,.85);border-radius:14px;padding:12px}
.cr-stats b{color:#c2427c}
.cr-note{font-size:14px;font-weight:800;color:#6b5262;line-height:1.7;margin:22px 0}
.cr-thanks{font-size:19px;font-weight:900;color:#3f2a46;margin:26px 0 18px}
.cr-end{padding-bottom:40px}

/* Year map: clear calendar rail + focused rotation board */
.hub-panel{max-width:1120px;padding:18px 20px 20px;background:rgba(255,253,255,.94)}
.hub-panel>h2{text-align:left;font-size:26px;margin-left:2px}.hub-sub{text-align:left;margin:0 2px 12px}
.hub-workspace{display:grid;grid-template-columns:220px minmax(0,1fr);gap:16px;margin-top:14px;align-items:start}
.year-rail{background:#fbf8fb;border:1px solid #eadfea;border-radius:18px;padding:10px;position:sticky;top:0}
.rail-label{padding:4px 7px 9px;color:#8c7184;font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}
.rail-stop{width:100%;display:grid;grid-template-columns:28px 1fr;gap:0 8px;align-items:center;text-align:left;border:0;border-top:1px solid #eee5ed;background:transparent;padding:10px 7px;color:#55424f;cursor:pointer}
.rail-stop span{grid-row:1/3;font-size:11px;color:#a58e9d;font-weight:900}.rail-stop b{font-size:13px;line-height:1.2}.rail-stop small{font-size:10.5px;color:#978391;font-weight:700;margin-top:2px}

  const bt=ARCQ.beats[ARCQ.b]; ARCQ.b++;

  const below=first?`<div class="rank-banner"><span class="rk-k">${a.patient}</span><span class="rk-v">${stTitle}</span></div>`:'';

function calcHeparin(){ const dose=nnum('hp_dose'),wt=nnum('hp_wt'),conc=nnum('hp_conc'); if([dose,wt,conc].some(v=>v===null)||conc<=0){setCalcResult('hp_out','Enter dose, weight, and concentration.');return;} const units=dose*wt,rate=units/conc; setCalcResult('hp_out',`${fmtCalc(units,0)} units/hr → <b>${fmtCalc(rate,1)} mL/hr</b>`); }

function deBiasGeneratedMCQs(){
  const good='Choose the patient-specific plan with monitoring and follow-up';
  const trap1='Use the default order because it already looks familiar';
  const trap2='Delay the recommendation until every minor detail is known';
  MODULES.forEach(m=>(m.cases||[]).forEach(c=>{ if(c.type==='mcq' && c.kick==='BCPS-style integration' && c.opts&&c.opts.length>=3){ c.opts[0].t=good; c.opts[1].t=trap1; c.opts[2].t=trap2; } }));
}
function balanceMCQOptionLengths(){
  const suffixes=[
    ' with documented rationale and follow-up monitoring',
    ' while tracking efficacy, toxicity, and updated labs',
    ' with team communication and a defined reassessment time',
    ' and reassess after updated labs and clinical response'
  ];
  MODULES.forEach(m=>(m.cases||[]).forEach(c=>{
    if(c.type!=='mcq'||!Array.isArray(c.opts)||!c.opts.length||c.patient)return;
    const correct=c.opts.find(o=>o.ok); if(!correct)return;
    const correctLen=String(correct.t||'').length;
    const maxLen=Math.max(...c.opts.map(o=>String(o.t||'').length));
    if(correctLen<75 || correctLen<maxLen*0.95)return;
    const target=Math.min(95, Math.max(55, Math.round(correctLen*0.78)));
    c.opts.forEach((o,i)=>{
      if(o.ok)return;
      let t=String(o.t||''); let guard=0;
      while(t.length<target && guard<2){ t += suffixes[(i+guard)%suffixes.length]; guard++; }
      o.t=t;
    });
  }));
}

  id:"pk", icon:"04", area:"R1", title:"Pharmacokinetics & TDM",
  blurb:"Dosing math and monitoring for vancomycin, aminoglycosides, DOACs and more.",
  brief:`
   <p class="lead">Therapeutic drug monitoring is a signature clinical-pharmacist service. You individualize
   doses of narrow-therapeutic-index (NTI) drugs so they work without harming the patient.</p>
   <h3>Renal function first</h3>
   <p>Estimate <b>CrCl (Cockcroft-Gault)</b> before dosing renally-cleared drugs. Many antibiotics, DOACs,
   enoxaparin, gabapentinoids and more require adjustment when CrCl falls.</p>
   <table class="ref">
     <tr><th>Drug</th><th>Target / rule</th><th>Watch for</th></tr>
     <tr><td><b>Vancomycin</b></td><td>AUC/MIC 400–600 (AUC-guided, not trough-only)</td><td>Nephrotoxicity, esp. with piperacillin-tazobactam</td></tr>
     <tr><td><b>Aminoglycosides</b></td><td>Extended-interval dosing; monitor levels &amp; renal function</td><td>Nephro- &amp; ototoxicity</td></tr>
     <tr><td><b>Warfarin</b></td><td>INR to goal (usually 2–3)</td><td>Interactions, diet, bleeding</td></tr>
     <tr><td><b>Apixaban (AFib)</b></td><td>2.5 mg BID if ≥2 of: age ≥80, wt ≤60 kg, SCr ≥1.5</td><td>Renal function, bleeding</td></tr>
   </table>
   <div class="callout pearl"><b>Draw levels at steady state</b>
     Sample when the drug has reached steady state and at the right time (e.g., a true trough right before the
     next dose). A level drawn at the wrong time leads to the wrong dose change.</div>
   <div class="callout warn"><b>NTI drugs demand respect</b>
     Vancomycin, warfarin, phenytoin, digoxin, cyclosporine, tacrolimus, carbamazepine, lithium, theophylline —
     small changes can tip from ineffective to toxic. Always double-check.</div>
  `,

 {
  id:"safety", icon:"05", area:"R1", title:"Medication Safety & Stewardship",
  blurb:"ADRs, interactions, error prevention, and antimicrobial stewardship.",
  brief:`
   <p class="lead">You are the safety net of the medication-use system: detect, mitigate, and prevent adverse
   drug events, and steward antimicrobials to protect patients and the community.</p>
   <h3>Beyond the"5 rights"</h3>
   <p>Right patient, drug, dose, route, time — plus verify <b>indication, duration, and monitoring</b>. Most
   errors hide in the last three.</p>
   <h4>High-alert med vigilance</h4>
   <ul>
     <li><b>Anticoagulants</b> — dosing, renal function, interactions, reversal readiness.</li>
     <li><b>Insulin &amp; hypoglycemics</b> — basal/bolus vs sliding scale, renal dosing.</li>
     <li><b>Opioids &amp; sedatives</b> — start low/go slow, avoid stacking, watch respiratory depression.</li>
     <li><b>QT-prolonging combos</b> — ondansetron + haloperidol + methadone + azithromycin stack risk.</li>
   </ul>
   <h3>Antimicrobial stewardship</h3>
   <ul>
     <li>In sepsis, give appropriate <b>broad-spectrum antibiotics early</b>; time-to-antibiotics matters.</li>
     <li><b>De-escalate</b> to the narrowest effective agent once cultures return.</li>
     <li>Convert <b>IV → PO</b> when the patient can absorb.</li>
     <li>Set a <b>stop date / duration</b>; a negative MRSA nares can support stopping vancomycin.</li>

 {
  id:"jclub", icon:"07", area:"R2", title:"Journal Club & Critical Appraisal",
  blurb:"How to run a journal club and appraise a trial (PICO, validity, NNT).",
  brief:`
   <p class="lead">Evidence-based practice is a core R2 skill. Running a journal club means picking a relevant,
   recent, peer-reviewed article and leading the team through a structured critical appraisal.</p>
   <h3>Step 1 — Frame the question with PICO</h3>
   <table class="ref">
     <tr><th>P</th><th>I</th><th>C</th><th>O</th></tr>
     <tr><td>Population — who was studied?</td><td>Intervention — what was tested?</td><td>Comparison — vs what?</td><td>Outcome — measured how?</td></tr>
   </table>
   <h3>Step 2 — Appraise validity</h3>
   <h4>Internal validity (is it true?) — freedom from bias</h4>
   <ul>
     <li>Was randomization truly random and <b>allocation concealed</b>?</li>
     <li>Were groups balanced at baseline?</li>
     <li>Were patients, clinicians, and outcome assessors <b>blinded</b>?</li>
     <li>Was analysis <b>intention-to-treat</b>, with minimal loss to follow-up?</li>
   </ul>
   <h4>External validity (does it apply?) — generalizability</h4>
   <ul><li>Are your patients and setting similar enough to the trial's to use the result?</li></ul>
   <h3>Step 3 — Interpret the effect size</h3>
   <div class="callout info"><b>Don't be fooled by relative risk</b>
     If events drop from 8% to 4%: the flashy <b>relative</b> reduction is 50%, but the <b>absolute</b> risk
     reduction (ARR) is only 4%, and <b>NNT = 1 ÷ ARR = 1/0.04 = 25</b>. Always report ARR and NNT.</div>
   <h3>Presenting flow (a simple template)</h3>
   <ol>
     <li>Clinical question that led you to the paper</li>
     <li>The article, authors, journal, funding</li>
     <li>PICO / hypothesis &amp; design</li>
     <li>Methods &amp; validity (risk of bias)</li>
     <li>Results (effect size + CI, ARR/NNT)</li>
     <li>Applicability to your patients</li>
     <li>Your bottom-line recommendation</li>
   </ol>
  `,
  cases:[
   {type:"order", kick:"Run the club",
    q:"Order a journal-club presentation:",
    correct:["State the clinical question","Introduce article, authors & journal","Lay out PICO & study design","Appraise methods & risk of bias","Present results (effect size, ARR/NNT)","Assess applicability to your patients","Give your bottom-line recommendation"],
    note:"Question → article → PICO/design → methods/validity → results → applicability → recommendation. Structure keeps the discussion focused."},
   {type:"mcq", kick:"Biostatistics",

     {t:"ARR 4%, NNT = 25", ok:true,

 {
  id:"lead", icon:"09", area:"R3", title:"Leadership & Management",
  blurb:"Prioritize workload, work within formulary/P&T, and act professionally.",
  brief:`
   <p class="lead">R3 is about running the practice well: managing your time and the medication-use system,
   and modeling professionalism.</p>
   <h3>Prioritization &amp; triage</h3>
   <p>You'll never have zero pending tasks. Triage by <b>patient risk and time-sensitivity</b>:</p>
   <ul>
     <li><b>Now:</b> a STAT order for an unstable patient, a critical lab (K⁺ 6.9), a code, a serious interaction about to reach the patient.</li>
     <li><b>Soon:</b> renal dose adjustments, missing home meds on a stable patient, IV-to-PO opportunities.</li>
     <li><b>Later:</b> non-urgent documentation, routine restocking, project work.</li>
   </ul>
   <div class="callout warn"><b>Escalate what's outside your scope</b>
     Triage and escalate questions/issues beyond your scope rather than guessing — that's part of the job description.</div>
   <h3>Formulary &amp; P&amp;T</h3>
   <p>The <b>Pharmacy &amp; Therapeutics committee</b> owns the formulary and medication-use policy. You support it
   with evidence (monographs), enforce it fairly, and process non-formulary requests through the right pathway.</p>
   <h3>Professionalism &amp; resource stewardship</h3>
   <ul>
     <li>Own your work quality; set and meet realistic goals and timelines.</li>
     <li>Collaborate, manage conflict, and build consensus respectfully.</li>
     <li>Consider cost-effectiveness and safe use of finite resources.</li>
   </ul>
  `,
  cases:[
   {type:"mcq", kick:"Triage",
    q:"All at once: (a) a routine restock, (b) a critical K⁺ 6.9 with ECG changes just resulted, (c) a discharge-counseling request for a stable patient. What do you do first?",

      fb:"Never let a quick, low-risk task delay an emergent, high-risk one."},

   {type:"mcq", kick:"Formulary",
    q:"A prescriber wants a non-formulary drug that duplicates a formulary agent with equal evidence. Best action?",
    opts:[

      fb:"Correct. Support the formulary decision, offer the equivalent, and reserve the non-formulary pathway for genuine clinical need."},
     {t:"Automatically stock every drug any prescriber requests", ok:false,
