MODULES.push({"id":"chart","icon":"25","area":"R1","title":"Chart Review: Find the Problem","blurb":"Scan a real medication list and catch the drug-therapy problems before they reach the patient.","brief":"<p class=\"lead\">Order verification is pattern recognition. Learn to scan a med list and spot what's wrong fast.</p>\n  <div class=\"callout pearl\"><b>Common catches</b> Renal-dose mismatches, duplicate therapy, drug interactions, missing monitoring, wrong route, and untreated indications.</div>","cases":[{"type":"chartHunt","kick":"Renal + interactions","q":"CrCl is 25 mL/min. Tap every problem in this med list.","rows":[{"text":"<b>Enoxaparin 1 mg/kg SubQ q12h</b> (treatment dose)","problem":true,"why":"At CrCl 25, treatment enoxaparin should be q24h — this q12h dose accumulates and bleeds."},{"text":"<b>Lisinopril 10 mg PO daily</b>","problem":false},{"text":"<b>Metformin 1000 mg PO BID</b>","problem":true,"why":"Metformin is contraindicated/avoided at low CrCl (~<30) due to lactic-acidosis risk."},{"text":"<b>Atorvastatin 40 mg PO nightly</b>","problem":false},{"text":"<b>Ibuprofen 600 mg PO q6h</b>","problem":true,"why":"An NSAID in renal impairment (and on an ACE inhibitor) worsens kidney function — avoid."},{"text":"<b>Pantoprazole 40 mg IV daily</b>","problem":false}],"note":"Renal patients need renal eyes: LMWH q24h, avoid metformin and NSAIDs."},{"type":"chartHunt","kick":"Duplicate & QT","q":"Tap every problem in this list.","rows":[{"text":"<b>Ondansetron 4 mg IV q6h</b> + <b>Haloperidol 5 mg IV q4h PRN</b> + <b>Azithromycin 500 mg IV daily</b>","problem":true,"why":"Three additive QT-prolonging drugs — torsades risk; check ECG and K/Mg or reconsider agents."},{"text":"<b>Lisinopril 10 mg daily</b>","problem":false},{"text":"<b>Warfarin 5 mg daily</b> + <b>Apixaban 5 mg BID</b>","problem":true,"why":"Duplicate anticoagulation — never two full anticoagulants together; a serious bleeding error."},{"text":"<b>Acetaminophen 650 mg q6h PRN</b>","problem":false}],"note":"Scan for additive toxicities (QT) and duplicate therapy (two anticoagulants) — classic verification catches."},{"type":"mcq","kick":"Missing monitoring","q":"A patient is started on IV vancomycin and amikacin but no levels or renal labs are ordered. Best action?","opts":[{"t":"Recommend baseline renal function and appropriate level/AUC monitoring before continuing","ok":true,"fb":"Correct. Both are nephrotoxic and need level-guided dosing; verifying an order includes ensuring monitoring is in place."},{"t":"Verify as-is — monitoring is the nurse's job","ok":false,"fb":"Ensuring monitoring for narrow/toxic drugs is a core pharmacist responsibility."},{"t":"Cancel both antibiotics","ok":false,"fb":"They may be indicated; the fix is adding monitoring, not stopping therapy."}]}]},
{"id":"id","icon":"26","area":"R1","title":"Infectious Disease Deep Dive","blurb":"Empiric coverage, resistant organisms, C. difficile, endocarditis, and appraising the evidence.","brief":"<p class=\"lead\">ID is where stewardship, PK, and evidence all meet.</p>\n  <table class=\"ref\"><tr><th>Scenario</th><th>Point</th></tr>\n  <tr><td><b>MRSA</b></td><td>Vancomycin or linezolid/daptomycin (daptomycin NOT for pneumonia — inactivated by surfactant)</td></tr>\n  <tr><td><b>C. difficile</b></td><td>Oral vancomycin or fidaxomicin; stop the inciting antibiotic; metronidazole is no longer first-line</td></tr>\n  <tr><td><b>Pseudomonas</b></td><td>Anti-pseudomonal β-lactam (pip-tazo, cefepime, meropenem)</td></tr></table>","cases":[{"type":"mcq","kick":"Daptomycin pitfall","q":"MRSA pneumonia — a resident suggests daptomycin. Problem?","opts":[{"t":"Daptomycin is inactivated by pulmonary surfactant and cannot be used for pneumonia","ok":true,"fb":"Correct. Daptomycin is great for MRSA bacteremia/endocarditis but is inactivated in the lung — use vancomycin or linezolid for MRSA pneumonia."},{"t":"Daptomycin is fine for any MRSA infection","ok":false,"fb":"Not pneumonia — surfactant inactivates it."},{"t":"Daptomycin only works orally","ok":false,"fb":"Daptomycin is IV; the real issue is lung inactivation."}]},{"type":"mcq","kick":"C. diff first-line","q":"First episode of C. difficile infection. Preferred therapy now?","opts":[{"t":"Oral vancomycin or fidaxomicin (and stop the inciting antibiotic)","ok":true,"fb":"Correct. Current IDSA guidance favors oral vancomycin or fidaxomicin; metronidazole is no longer first-line for non-severe CDI."},{"t":"Oral metronidazole as first-line","ok":false,"fb":"Metronidazole was downgraded; it's now reserved for when preferred agents aren't available."},{"t":"IV vancomycin","ok":false,"fb":"IV vancomycin doesn't reach the colon lumen; C. diff needs ORAL vancomycin."}]},{"type":"journal","kick":"Appraise the trial","q":"A rep cites a new antibiotic trial. Read the abstract, flag the weaknesses, then do the math.","abstract":"Open-label trial, sponsor-run: new antibiotic 'X' vs standard. Primary outcome was a surrogate lab marker, not clinical cure. In the intention-to-treat analysis, the 30-day event rate was 8% with standard therapy vs 4% with drug X. The press release calls it a '50% reduction'.","flaws":[{"text":"Open-label and sponsor-run (bias risk)","isFlaw":true,"why":"Open-label + industry sponsorship raises bias; blinding and independent analysis strengthen validity."},{"text":"Primary outcome is a surrogate marker, not clinical cure","isFlaw":true,"why":"A lab surrogate may not translate to patient-important outcomes like cure or survival."},{"text":"Headline uses relative risk reduction ('50%')","isFlaw":true,"why":"Relative reduction (4/8 = 50%) overstates impact; the absolute reduction is only 4%."},{"text":"Used an intention-to-treat analysis","isFlaw":false,"why":"ITT is actually a strength — it preserves randomization and reflects real-world use."}],"nnt":{"stem":"Events 8% (standard) vs 4% (drug X). Absolute risk reduction and NNT?","options":[{"t":"ARR 4%, NNT = 25","correct":true,"fb":"Correct. ARR = 8 − 4 = 4%; NNT = 1/0.04 = 25. Always convert a flashy relative number to the absolute."},{"t":"ARR 50%, NNT = 2","fb":"50% is the relative reduction, not absolute."},{"t":"Cannot be calculated","fb":"It can — ARR is the difference in event rates."}]},"note":"Blinding, patient-important outcomes, and absolute (not relative) numbers are how you judge a trial."}]},
{"id":"lytes","icon":"27","area":"R1","title":"Electrolytes & Fluids","blurb":"Sodium correction limits, potassium/magnesium repletion, and the refeeding electrolytes.","brief":"<p class=\"lead\">Electrolyte fixes can harm if done too fast or in the wrong order.</p>\n  <table class=\"ref\"><tr><th>Electrolyte</th><th>Rule</th></tr>\n  <tr><td><b>Sodium</b></td><td>Correct hyponatremia slowly — no more than ~8 mEq/L per 24 h (osmotic demyelination if faster)</td></tr>\n  <tr><td><b>Potassium</b></td><td>~10 mEq raises serum ~0.1; peripheral IV rate ≤ 10 mEq/hr; replete magnesium too</td></tr>\n  <tr><td><b>Magnesium</b></td><td>Low Mg causes refractory hypokalemia — fix Mg first</td></tr></table>","cases":[{"type":"mcq","kick":"Correction rate","q":"Severe chronic hyponatremia (Na 112). What is the key safety limit?","opts":[{"t":"Raise sodium slowly — no more than ~8 mEq/L in 24 hours to avoid osmotic demyelination","ok":true,"fb":"Correct. Overly rapid correction of chronic hyponatremia causes osmotic demyelination syndrome; cap the rise per 24 h."},{"t":"Correct to normal within 2–3 hours","ok":false,"fb":"Rapid overcorrection is exactly what causes permanent neurologic injury."},{"t":"Fluid-restrict only and never give sodium","ok":false,"fb":"Symptomatic severe cases may need hypertonic saline — but corrected slowly."}]},{"type":"mcq","kick":"Refractory hypokalemia","q":"Potassium stays low despite repletion. Commonly missed cause?","opts":[{"t":"Coexisting hypomagnesemia — replete magnesium and the potassium will correct","ok":true,"fb":"Correct. Low magnesium promotes renal potassium wasting; you can't fix the K until you fix the Mg."},{"t":"Too much potassium already","ok":false,"fb":"The problem is persistent low potassium, not excess."},{"t":"Dehydration is never relevant","ok":false,"fb":"The classic teaching point here is unrecognized hypomagnesemia."}]},{"type":"calc","kick":"Potassium estimate","q":"Roughly how much will serum potassium rise after giving 40 mEq KCl (rule of thumb)?","given":[{"label":"Dose","value":"40 mEq"},{"label":"Rule","value":"~10 mEq → ~0.1 mEq/L"}],"answer":{"value":0.4,"tolerance":0.15,"unit":"mEq/L"},"hint":"~10 mEq raises serum potassium about 0.1 mEq/L (rough, depends on losses).","note":"40 mEq ÷ 10 × 0.1 ≈ 0.4 mEq/L rise. It's an estimate — always recheck the level."},{"type":"mcq","kick":"Refeeding","q":"A severely malnourished patient starts aggressive nutrition. Which electrolytes must you watch drop?","opts":[{"t":"Phosphate, potassium, and magnesium — refeeding syndrome; start low, go slow, and replete","ok":true,"fb":"Correct. Refeeding drives phosphate/potassium/magnesium into cells; hypophosphatemia can be fatal. Advance calories slowly with repletion and thiamine."},{"t":"Only sodium","ok":false,"fb":"The hallmark refeeding electrolytes are phosphate, potassium, and magnesium."},{"t":"None — feed as fast as possible","ok":false,"fb":"Aggressive feeding is exactly what precipitates fatal refeeding syndrome."}]}]},
{"id":"seizure","icon":"28","area":"R1","title":"Status Epilepticus & Neuro Emergencies","blurb":"The timed status-epilepticus pathway — benzo first, then a second agent, fast.","brief":"<p class=\"lead\">Status epilepticus is a stopwatch. Every minute of seizing causes injury.</p>\n  <table class=\"ref\"><tr><th>Phase</th><th>Drug</th></tr>\n  <tr><td><b>First-line</b></td><td>IV lorazepam (or IM midazolam if no IV)</td></tr>\n  <tr><td><b>Second-line</b></td><td>IV levetiracetam, fosphenytoin, or valproate</td></tr>\n  <tr><td><b>Refractory</b></td><td>Continuous infusion / anesthesia (midazolam, propofol)</td></tr></table>","cases":[{"type":"code","kick":"Status epilepticus","q":"A patient is in convulsive status epilepticus. Move fast and correctly.","seconds":40,"steps":[{"prompt":"Seizing 6 minutes, IV access present. First drug?","options":[{"t":"IV lorazepam (benzodiazepine)","correct":true},{"t":"Oral levetiracetam","fb":"Oral won't work in an actively seizing patient; benzodiazepine IV is first-line."},{"t":"Wait and observe","fb":"Waiting causes neuronal injury — benzodiazepines are given immediately."}]},{"prompt":"Still seizing after adequate benzodiazepine. Next?","options":[{"t":"IV levetiracetam, fosphenytoin, or valproate (second-line)","correct":true},{"t":"Repeat benzodiazepines endlessly","fb":"After adequate benzodiazepine dosing, move to a second-line agent."},{"t":"Give IV dextrose only","fb":"Check glucose, yes, but the pathway needs a second-line antiseizure drug."}]},{"prompt":"Refractory despite two agents. Next level?","options":[{"t":"Continuous infusion / anesthesia (e.g., midazolam or propofol) with EEG","correct":true},{"t":"Send home","fb":"Refractory status needs ICU-level continuous therapy."},{"t":"Oral medication","fb":"Refractory status is managed with IV continuous infusions."}]}],"note":"Benzodiazepine → second-line IV agent → continuous infusion. Speed saves neurons."},{"type":"mcq","kick":"No IV access","q":"Actively seizing patient, no IV yet. Best immediate option?","opts":[{"t":"IM midazolam","ok":true,"fb":"Correct. IM midazolam is first-line when there's no IV — rapid and effective (RAMPART trial)."},{"t":"Wait for IV access before any drug","ok":false,"fb":"Delaying to get IV access prolongs the seizure; give IM midazolam now."},{"t":"Oral diazepam","ok":false,"fb":"You can't safely give oral meds to an actively seizing patient."}]}]},
{"id":"pain","icon":"29","area":"R1","title":"Pain & Opioid Stewardship","blurb":"Multimodal analgesia, MME, naloxone co-prescribing, and building the recommendation.","brief":"<p class=\"lead\">Balance real pain relief against opioid harm — multimodal, lowest effective dose, and safety nets.</p>\n  <table class=\"ref\"><tr><th>Concept</th><th>Point</th></tr>\n  <tr><td><b>Multimodal</b></td><td>Combine acetaminophen/NSAIDs, adjuvants, and regional techniques to spare opioids</td></tr>\n  <tr><td><b>MME</b></td><td>Convert to morphine equivalents to gauge risk; higher MME = higher overdose risk</td></tr>\n  <tr><td><b>Naloxone co-Rx</b></td><td>Offer naloxone at higher MME (≈≥50/day) or with concurrent benzodiazepines</td></tr></table>","cases":[{"type":"mcq","kick":"Dangerous combo","q":"A patient on chronic high-dose opioids is newly prescribed a benzodiazepine for sleep. Concern?","opts":[{"t":"Additive respiratory depression — high overdose risk; reconsider, and ensure naloxone is available","ok":true,"fb":"Correct. Opioid + benzodiazepine markedly increases fatal respiratory depression (a boxed warning). Avoid if possible and co-prescribe naloxone."},{"t":"No interaction — both are safe together","ok":false,"fb":"This is one of the deadliest common combinations."},{"t":"It improves pain control with no risk","ok":false,"fb":"The risk is respiratory depression, not analgesic benefit."}]},{"type":"mcq","kick":"Opioid-sparing","q":"Best first step to reduce opioid requirement after surgery?","opts":[{"t":"Scheduled multimodal analgesia (acetaminophen ± NSAID, adjuvants, regional) with opioids as needed","ok":true,"fb":"Correct. Multimodal analgesia lowers opioid need and side effects; opioids become rescue, not the foundation."},{"t":"Higher opioid doses only","ok":false,"fb":"Escalating opioids alone increases harm without better outcomes."},{"t":"No analgesia to avoid opioids","ok":false,"fb":"Untreated pain is harmful; the goal is opioid-sparing, not pain-ignoring."}]},{"type":"sbar","kick":"Build the recommendation","q":"A post-op patient needs an opioid-sparing plan. Pick the strongest fragment for each SBAR part.","slots":[{"key":"Situation","fragments":[{"t":"Post-op day 1, uncontrolled pain on opioids alone, oversedated at times.","score":2},{"t":"Patient has some pain.","score":0}]},{"key":"Background","fragments":[{"t":"No contraindication to acetaminophen or NSAIDs; normal renal/hepatic function.","score":2},{"t":"Patient had surgery.","score":0}]},{"key":"Assessment","fragments":[{"t":"Opioid-only analgesia is causing sedation without adequate relief — an opioid-sparing gap.","score":2},{"t":"Pain is a problem, not sure why.","score":0}]},{"key":"Recommendation","fragments":[{"t":"Start scheduled acetaminophen 1 g q6h + an NSAID, reduce the opioid, and monitor sedation/respiratory rate.","score":2},{"t":"Maybe increase the opioid a lot.","score":0}]}],"note":"A strong SBAR names the drug, dose, frequency, and monitoring — and ties back to the patient's goal."},{"type":"calc","kick":"MME conversion","q":"Hydromorphone 8 mg/day. Approximate morphine milligram equivalents (conversion factor 4)?","given":[{"label":"Hydromorphone","value":"8 mg/day"},{"label":"Factor","value":"×4"}],"answer":{"value":32,"tolerance":2,"unit":"MME"},"hint":"MME = hydromorphone dose × 4.","note":"8 × 4 = 32 MME/day. Hydromorphone is ~4× as potent as oral morphine — a common conversion error to avoid."}]},
{"id":"peds","icon":"30","area":"R1","title":"Pediatric & Neonatal Dosing","blurb":"Weight-based dosing, adult-dose caps, and the errors that hurt small patients.","brief":"<p class=\"lead\">Children aren't small adults — nearly everything is weight-based, and a decimal error can be fatal.</p>\n  <div class=\"callout warn\"><b>Always</b> Dose in mg/kg, verify the weight in <b>kilograms</b>, and never exceed the usual adult maximum dose.</div>","cases":[{"type":"calc","kick":"Weight-based dose","q":"Acetaminophen 15 mg/kg for a 12 kg child. Dose in mg?","given":[{"label":"Dose","value":"15 mg/kg"},{"label":"Weight","value":"12 kg"}],"answer":{"value":180,"tolerance":5,"unit":"mg"},"hint":"Dose = mg/kg × weight(kg).","note":"15 × 12 = 180 mg per dose. Confirm the total daily dose stays within limits too."},{"type":"mcq","kick":"Dose cap","q":"A weight-based antibiotic calculates to more than the usual adult dose for a large teenager. Best action?","opts":[{"t":"Cap at the usual adult maximum dose","ok":true,"fb":"Correct. Weight-based dosing should not exceed the adult maximum; caps prevent overdose in heavier children/teens."},{"t":"Give the full weight-based dose no matter how high","ok":false,"fb":"Uncapped weight-based dosing can massively overdose a large adolescent."},{"t":"Halve every pediatric dose reflexively","ok":false,"fb":"Arbitrary halving under-doses; use mg/kg with an adult cap."}]},{"type":"mcq","kick":"Neonatal red flag","q":"Which is a classic neonatal drug hazard to flag?","opts":[{"t":"Ceftriaxone in a neonate receiving calcium-containing IV fluids (precipitation risk) — and displacing bilirubin","ok":true,"fb":"Correct. Ceftriaxone + IV calcium can form fatal precipitates in neonates, and it displaces bilirubin (kernicterus risk); use an alternative cephalosporin."},{"t":"Acetaminophen weight-based dosing","ok":false,"fb":"Weight-based acetaminophen is standard and appropriate."},{"t":"Using kilograms for weight","ok":false,"fb":"Kilograms is correct — that's good practice, not a hazard."}]}]},
{"id":"preg","icon":"31","area":"R1","title":"Pregnancy & Lactation","blurb":"Teratogens to avoid and the safer options to recommend.","brief":"<p class=\"lead\">In pregnancy, the wrong drug harms two patients. Know the definite avoids and the go-to safe options.</p>\n  <table class=\"ref\"><tr><th>Avoid</th><th>Prefer</th></tr>\n  <tr><td>ACE inhibitors/ARBs, warfarin, isotretinoin, valproate, tetracyclines</td><td>Labetalol/methyldopa/nifedipine (HTN), LMWH (anticoagulation), acetaminophen, insulin, penicillins</td></tr></table>","cases":[{"type":"mcq","kick":"HTN in pregnancy","q":"A pregnant patient needs blood-pressure control. Which is contraindicated?","opts":[{"t":"Lisinopril (ACE inhibitor) — fetal toxicity; use labetalol, methyldopa, or nifedipine instead","ok":true,"fb":"Correct. ACE inhibitors/ARBs cause fetal renal and other injury; pregnancy-safe options are labetalol, methyldopa, or nifedipine."},{"t":"Labetalol","ok":false,"fb":"Labetalol is a preferred, safe option in pregnancy."},{"t":"Methyldopa","ok":false,"fb":"Methyldopa is a classic pregnancy-safe antihypertensive."}]},{"type":"mcq","kick":"Anticoagulation","q":"A pregnant patient needs therapeutic anticoagulation for a clot. Best choice?","opts":[{"t":"Low-molecular-weight heparin (does not cross the placenta)","ok":true,"fb":"Correct. LMWH is preferred in pregnancy; warfarin is teratogenic and DOAC safety data are insufficient."},{"t":"Warfarin","ok":false,"fb":"Warfarin crosses the placenta and is teratogenic (warfarin embryopathy)."},{"t":"Apixaban","ok":false,"fb":"DOACs are not recommended in pregnancy due to insufficient safety data."}]},{"type":"mcq","kick":"Acne drug danger","q":"A patient of childbearing potential is prescribed isotretinoin. Key requirement?","opts":[{"t":"iPLEDGE enrollment with strict pregnancy prevention — isotretinoin is a potent teratogen","ok":true,"fb":"Correct. Isotretinoin causes severe birth defects; iPLEDGE mandates pregnancy testing and two forms of contraception."},{"t":"No special precautions are needed","ok":false,"fb":"Isotretinoin is one of the most teratogenic common drugs."},{"t":"It is safe to continue if pregnancy occurs","ok":false,"fb":"It must be stopped immediately; it causes severe fetal malformations."}]}]},
{"id":"immun","icon":"32","area":"R2","title":"Immunization","blurb":"Live-vaccine cautions, spacing rules, and pharmacist-led vaccination.","brief":"<p class=\"lead\">Pharmacists are frontline immunizers. Know the contraindications and timing rules cold.</p>\n  <table class=\"ref\"><tr><th>Rule</th><th>Point</th></tr>\n  <tr><td><b>Live vaccines</b></td><td>(MMR, varicella, LAIV) — avoid in pregnancy and significant immunocompromise</td></tr>\n  <tr><td><b>Live-vaccine spacing</b></td><td>Give two live vaccines the same day, or separate by at least 28 days</td></tr>\n  <tr><td><b>Not a contraindication</b></td><td>Mild illness or a low-grade fever is fine to vaccinate</td></tr></table>","cases":[{"type":"mcq","kick":"Live vaccine safety","q":"Which patient should NOT receive the live MMR vaccine today?","opts":[{"t":"A pregnant patient (live vaccines are contraindicated in pregnancy)","ok":true,"fb":"Correct. Live vaccines (MMR, varicella, LAIV) are contraindicated in pregnancy and significant immunocompromise."},{"t":"A healthy adult with a mild cold","ok":false,"fb":"Mild illness is not a contraindication to vaccination."},{"t":"An adult overdue for MMR","ok":false,"fb":"That's an indication to vaccinate, not a contraindication."}]},{"type":"mcq","kick":"Spacing rule","q":"A patient got the varicella (live) vaccine 10 days ago and now needs MMR (live). Best action?","opts":[{"t":"Wait — separate two live vaccines by at least 28 days if not given the same day","ok":true,"fb":"Correct. If live vaccines aren't given simultaneously, separate them by ≥28 days for a reliable response."},{"t":"Give MMR now","ok":false,"fb":"Giving a second live vaccine 10 days after another can blunt the immune response."},{"t":"Never give MMR to this patient","ok":false,"fb":"They can get it — just after the 28-day interval."}]}]},
{"id":"nutrition","icon":"33","area":"R1","title":"Nutrition & Parenteral Nutrition","blurb":"TPN components, refeeding safety, and electrolyte/line considerations.","brief":"<p class=\"lead\">When the gut can't be used, parenteral nutrition keeps patients alive — but it's high-risk.</p>\n  <table class=\"ref\"><tr><th>Concept</th><th>Point</th></tr>\n  <tr><td><b>Components</b></td><td>Dextrose, amino acids, lipids, electrolytes, vitamins, trace elements</td></tr>\n  <tr><td><b>Refeeding</b></td><td>Start low, advance slowly; give thiamine; watch phosphate/potassium/magnesium</td></tr>\n  <tr><td><b>Access</b></td><td>High-dextrose/high-osmolarity PN needs central access</td></tr></table>","cases":[{"type":"mcq","kick":"Line selection","q":"A high-concentration (high-osmolarity) parenteral nutrition is ordered through a peripheral IV. Problem?","opts":[{"t":"High-osmolarity PN requires central venous access — peripheral infusion causes phlebitis/damage","ok":true,"fb":"Correct. Concentrated dextrose/amino-acid PN is too hyperosmolar for a peripheral vein; it needs a central line."},{"t":"No issue — any IV works for any PN","ok":false,"fb":"Osmolarity dictates the line; concentrated PN needs central access."},{"t":"PN should never be given IV","ok":false,"fb":"Parenteral nutrition is by definition given IV; the issue is the type of access."}]},{"type":"order","kick":"Starting PN safely","q":"Order the steps to start PN in a malnourished patient:","correct":["Assess refeeding risk & baseline electrolytes","Give thiamine before/with dextrose","Start PN at a low calorie/dextrose rate","Replete phosphate, potassium, magnesium as needed","Advance calories slowly while monitoring labs"],"note":"Risk assessment → thiamine → start low → replete electrolytes → advance slowly. This prevents fatal refeeding syndrome."},{"type":"mcq","kick":"Refeeding electrolyte","q":"Which lab most needs close monitoring in the first days of refeeding?","opts":[{"t":"Phosphate — severe hypophosphatemia is the hallmark, and can be fatal","ok":true,"fb":"Correct. Refeeding drives phosphate into cells; profound hypophosphatemia causes respiratory and cardiac failure."},{"t":"Total cholesterol","ok":false,"fb":"Not the acute refeeding concern."},{"t":"Hemoglobin A1c","ok":false,"fb":"A1c reflects months of glucose, not acute refeeding risk."}]}]});
Object.assign(TEACH, {"chart":["Order verification is really pattern recognition — you learn to scan and feel what's off.","Renal-dose mismatches, duplicate therapy, interactions, missing monitoring — those are your bread and butter.","Tap everything that looks wrong, then submit. Don't overthink the safe ones.","This is the skill that quietly prevents the most harm. Let's train it."],"id":["ID is where stewardship, kinetics, and evidence all come together.","Know the traps: daptomycin doesn't work in the lung, and C. diff needs oral vancomycin.","And when a rep waves a trial at you — read it critically. Surrogate outcomes and relative numbers hide a lot.","Let's practice picking the right drug and reading the evidence."],"lytes":["Electrolytes can hurt if you fix them too fast or in the wrong order.","Sodium comes up slow — overcorrect chronic hyponatremia and you cause demyelination.","Can't fix the potassium? Check the magnesium first.","And in refeeding, watch phosphate, potassium, and magnesium crash. Let's go."],"seizure":["Status epilepticus is a stopwatch — every minute of seizing injures the brain.","Benzodiazepine first, always. Lorazepam IV, or midazolam IM if there's no line.","Still seizing? Second-line agent — levetiracetam, fosphenytoin, or valproate.","This one's timed. Move fast and get it right."],"pain":["Pain is real — our job is to treat it while minimizing opioid harm.","Go multimodal: acetaminophen, NSAIDs, adjuvants, regional — opioids as rescue, not the base.","Watch the deadly combos, especially opioids with benzodiazepines, and offer naloxone.","Let's build a clean recommendation together."],"peds":["Kids aren't small adults — nearly everything is weight-based, and a decimal can kill.","Dose in mg per kilogram, confirm the weight is in kilograms, and never blow past the adult max.","Neonates have their own traps — ceftriaxone with calcium, bilirubin displacement.","Let's get the math and the flags right."],"preg":["In pregnancy you're treating two patients, so the wrong drug does double harm.","Hard avoids: ACE inhibitors, warfarin, isotretinoin, valproate, tetracyclines.","Reach for the safe ones: labetalol or methyldopa for pressure, LMWH for clots, acetaminophen, insulin.","Let's sort the avoids from the go-tos."],"immun":["Pharmacists are frontline immunizers — the contraindications have to be reflexive.","Live vaccines — MMR, varicella — steer clear in pregnancy and real immunocompromise.","Space two live vaccines the same day or by at least 28 days.","And a mild cold is not a reason to defer. Let's practice."],"nutrition":["When the gut can't be used, parenteral nutrition keeps people alive — but it's high-risk.","Know the components, and match the access to the osmolarity — concentrated PN needs a central line.","Start low, go slow, give thiamine, and watch the refeeding electrolytes.","Let's build a safe start."]});

MODULES.push({"id":"onco_emerg","icon":"34","area":"R1","title":"Oncology Emergencies & Supportive Care","blurb":"Febrile neutropenia, tumor lysis, spinal cord compression, CINV, extravasation, and hazardous-drug workflow.","brief":"<p class=\"lead\">Oncology pharmacy is supportive care plus emergency recognition.</p><table class=\"ref\"><tr><th>Problem</th><th>Pharmacist move</th></tr><tr><td>Febrile neutropenia</td><td>Culture, assess risk, give empiric antipseudomonal therapy fast</td></tr><tr><td>TLS</td><td>Hydration, allopurinol or rasburicase, monitor K/Phos/Ca/uric acid</td></tr><tr><td>Extravasation</td><td>Stop infusion, leave catheter, aspirate, antidote/cold/heat by agent</td></tr></table>","cases":[{"type":"mcq","kick":"Febrile neutropenia","q":"ANC 300, temp 38.5 C after chemotherapy. Best initial pharmacy priority?","opts":[{"t":"Treat as a medical emergency: obtain cultures and start empiric antipseudomonal antibiotics promptly","ok":true,"fb":"Correct. Febrile neutropenia can progress to sepsis quickly; empiric therapy should not wait for culture results."},{"t":"Wait for cultures to turn positive before antibiotics","ok":false,"fb":"Waiting is unsafe in neutropenia."},{"t":"Give acetaminophen only and recheck tomorrow","ok":false,"fb":"Fever plus neutropenia is an emergency, not routine fever control."}]},{"type":"mcq","kick":"Low-risk outpatient FN","q":"Which outpatient regimen is commonly used for carefully selected low-risk febrile neutropenia?","opts":[{"t":"Fluoroquinolone plus amoxicillin/clavulanate, if no prior fluoroquinolone prophylaxis and follow-up is reliable","ok":true,"fb":"Correct. Low-risk outpatient management requires strict criteria, observation, logistics, and reliable follow-up."},{"t":"Oral metronidazole alone","ok":false,"fb":"No antipseudomonal coverage."},{"t":"No antibiotics if stable","ok":false,"fb":"Even low-risk FN needs empiric antibacterial therapy."}]},{"type":"chartHunt","kick":"Chemo order verification","q":"Tap every dangerous issue before this chemo is verified.","rows":[{"text":"Cisplatin ordered with no hydration or antiemetic plan","problem":true,"why":"Cisplatin is highly emetogenic and nephrotoxic; hydration and CINV prophylaxis are core verification items."},{"text":"BSA documented and dose rounded per institutional policy","problem":false},{"text":"ANC 400, platelets 38k, full-dose myelosuppressive chemotherapy scheduled today","problem":true,"why":"Severe cytopenias usually require hold/delay or prescriber review depending regimen intent."},{"text":"No signed consent visible for first cycle","problem":true,"why":"Do not verify first-cycle chemo without consent per institutional process."},{"text":"Creatinine and bilirubin checked today","problem":false}]},{"type":"mcq","kick":"Tumor lysis syndrome","q":"Burkitt lymphoma, bulky disease, uric acid 12, K 5.8, phosphate high, creatinine rising. Best TLS move?","opts":[{"t":"Aggressive hydration, rasburicase if appropriate, frequent electrolytes, and avoid routine calcium unless symptomatic","ok":true,"fb":"Correct. Rasburicase rapidly lowers uric acid; calcium can worsen calcium-phosphate precipitation unless symptomatic."},{"t":"Give calcium for every low calcium value","ok":false,"fb":"Asymptomatic hypocalcemia in TLS is usually not treated because calcium-phosphate precipitation can worsen."},{"t":"Delay all monitoring until next morning","ok":false,"fb":"TLS needs frequent labs and rapid intervention."}]},{"type":"mcq","kick":"CINV prophylaxis","q":"Highly emetogenic chemotherapy. Which prophylaxis is most appropriate?","opts":[{"t":"Multidrug prophylaxis: 5-HT3 antagonist + NK1 antagonist + dexamethasone ± olanzapine","ok":true,"fb":"Correct. Highly emetogenic regimens need layered prophylaxis, often including olanzapine."},{"t":"PRN ondansetron only after nausea starts","ok":false,"fb":"Prevention is the goal; PRN-only is inadequate for high-emetic-risk regimens."},{"t":"No dexamethasone ever with checkpoint inhibitors","ok":false,"fb":"ASCO notes adding checkpoint inhibitors to chemotherapy does not remove guideline-based antiemetic dexamethasone."}]},{"type":"mcq","kick":"Extravasation","q":"Vesicant extravasation suspected during doxorubicin infusion. First action?","opts":[{"t":"Stop infusion immediately, leave catheter in place, aspirate if possible, notify team, and follow antidote/thermal protocol","ok":true,"fb":"Correct. Do not flush or remove the line first; preserve access for aspiration/antidote."},{"t":"Flush hard with saline","ok":false,"fb":"Flushing spreads vesicant injury."},{"t":"Ignore if pain improves","ok":false,"fb":"Vesicant injury can evolve; treat immediately."}]},{"type":"order","kick":"Hazardous spill response","q":"Order a safe hazardous-drug spill response:","correct":["Alert and restrict the area","Put on appropriate PPE from spill kit","Contain and absorb the spill","Decontaminate/clean per policy","Dispose and document exposure/spill"],"note":"USP 800 logic: protect people first, contain, clean, dispose, document."}]},
{"id":"onco_ici","icon":"35","area":"R1","title":"Oral Oncology & Immunotherapy Toxicities","blurb":"TKI interactions, adherence, immune-related adverse events, and oral chemo safety counseling.","brief":"<p class=\"lead\">Oral oncology makes the patient the infusion center. Pharmacists own adherence, interactions, toxicity triage, and REMS-like safety workflows.</p>","cases":[{"type":"mcq","kick":"Immune-related colitis","q":"Patient on pembrolizumab has 8 watery stools/day and abdominal pain. Best action?","opts":[{"t":"Hold immunotherapy, assess grade/severity, rule out infection, and escalate for corticosteroids if moderate-severe","ok":true,"fb":"Correct. Immune-mediated colitis can be serious; do not simply give loperamide and continue therapy."},{"t":"Continue pembrolizumab and add loperamide only","ok":false,"fb":"Severe diarrhea on ICI needs immune-toxicity workup and hold/escalation."},{"t":"Start chronic antibiotics automatically","ok":false,"fb":"Rule out infection, but immune colitis management often requires steroids."}]},{"type":"mcq","kick":"ICI endocrinopathy","q":"New fatigue, hypotension, hyponatremia, low cortisol on nivolumab. Concern?","opts":[{"t":"Immune-mediated adrenal insufficiency/hypophysitis — urgent endocrine evaluation and steroid replacement","ok":true,"fb":"Correct. Endocrinopathies can be life-threatening and may need hormone replacement."},{"t":"Expected nausea only","ok":false,"fb":"Hyponatremia/hypotension/low cortisol is not routine nausea."},{"t":"Give levothyroxine before checking adrenal status","ok":false,"fb":"In adrenal insufficiency, thyroid replacement before glucocorticoids can precipitate adrenal crisis."}]},{"type":"chartHunt","kick":"Oral chemo interaction scan","q":"Tap the unsafe items in this oral oncology profile.","rows":[{"text":"Imatinib plus newly started clarithromycin","problem":true,"why":"Strong CYP3A inhibition can increase TKI exposure/toxicity; consider alternatives or close adjustment."},{"text":"Capecitabine patient has severe diarrhea but keeps taking full dose","problem":true,"why":"Severe diarrhea requires hold and toxicity management to avoid dehydration/hand-foot syndrome escalation."},{"text":"Pharmacist confirms exact cycle days and rest days with patient","problem":false},{"text":"Patient takes oral chemo from an unlabeled pill organizer with no regimen calendar","problem":true,"why":"Oral chemo needs a clear calendar; cycle errors are common and dangerous."}]},{"type":"sbar","kick":"ICI pneumonitis call","q":"Build the recommendation for new dyspnea and CT ground-glass opacities on pembrolizumab.","slots":[{"key":"Situation","fragments":[{"t":"Patient on pembrolizumab has new dyspnea, O2 need, and CT ground-glass opacities.","score":2},{"t":"Patient breathes differently.","score":0}]},{"key":"Background","fragments":[{"t":"No fever; infectious workup pending; immune checkpoint inhibitor started 8 weeks ago.","score":2},{"t":"Cancer history exists.","score":0}]},{"key":"Assessment","fragments":[{"t":"Concern for immune-mediated pneumonitis; continuing ICI could worsen respiratory failure.","score":2},{"t":"Probably anxiety.","score":0}]},{"key":"Recommendation","fragments":[{"t":"Hold ICI, rule out infection/PE, notify oncology, and start guideline-based steroids if grade ≥2.","score":2},{"t":"Continue ICI and monitor only.","score":0}]}],"note":"A good oncology SBAR ties symptom grade, drug timing, alternative diagnoses, and immediate hold/escalation."},{"type":"mcq","kick":"Oral chemo counseling","q":"Which counseling point matters most for capecitabine?","opts":[{"t":"Take within 30 minutes after meals, know the cycle schedule, and report severe diarrhea/hand-foot symptoms early","ok":true,"fb":"Correct. Administration timing, cycle literacy, and early toxicity reporting prevent harm."},{"t":"Take only when nauseated","ok":false,"fb":"Capecitabine is scheduled therapy, not PRN."},{"t":"Crush tablets to make swallowing easier","ok":false,"fb":"Hazardous oral chemo should not be crushed casually; follow safety guidance."}]},{"type":"journal","kick":"Surrogate oncology endpoint","q":"A trial headline says the drug improved progression-free survival. Appraise the abstract.","abstract":"Open-label phase 2 trial: new oral agent improved median PFS from 5.0 to 6.2 months. Overall survival was immature. Grade 3 diarrhea doubled. Sponsor press release says the drug is practice-changing.","flaws":[{"text":"Open-label phase 2 design limits certainty","isFlaw":true,"why":"Phase 2/open-label data are hypothesis-generating, not automatically practice-changing."},{"text":"PFS improved only 1.2 months and OS is immature","isFlaw":true,"why":"Magnitude and patient-important outcomes matter."},{"text":"Toxicity doubled","isFlaw":true,"why":"Benefit must be weighed against serious adverse events."},{"text":"Reports adverse events transparently","isFlaw":false,"why":"Transparent AE reporting is a strength, not a flaw."}],"nnt":{"stem":"If response improves from 20% to 30%, ARR and NNT?","options":[{"t":"ARR 10%, NNT = 10","correct":true,"fb":"Correct. 30%-20%=10%; NNT=1/0.10=10."},{"t":"ARR 50%, NNT = 2","fb":"That is relative improvement, not absolute."},{"t":"ARR 1%, NNT = 100","fb":"The absolute difference is 10 percentage points."}]},"note":"Oncology evidence appraisal needs endpoint quality, magnitude, toxicity, and trial phase."}]},
{"id":"txp","icon":"36","area":"R1","title":"Solid Organ Transplant Pharmacy","blurb":"Tacrolimus TDM, CYP3A interactions, rejection vs infection, prophylaxis, and vaccine counseling.","brief":"<p class=\"lead\">Transplant pharmacy is narrow therapeutic index medicine under constant infection-vs-rejection tension.</p><table class=\"ref\"><tr><th>Core</th><th>Watch</th></tr><tr><td>Tacrolimus/CNI</td><td>Troughs, nephrotoxicity, neurotoxicity, hyperkalemia, hypomagnesemia, CYP3A interactions</td></tr><tr><td>Prophylaxis</td><td>PJP, CMV, fungal based on organ/risk/protocol</td></tr><tr><td>Vaccines</td><td>Inactivated generally ok; live vaccines generally avoided post-transplant</td></tr></table>","cases":[{"type":"mcq","kick":"Tacrolimus toxicity","q":"Kidney transplant patient on tacrolimus starts voriconazole. Tac trough rises, creatinine up, tremor. Explanation?","opts":[{"t":"Voriconazole inhibits CYP3A and increases tacrolimus exposure; hold/reduce and monitor trough/renal function","ok":true,"fb":"Correct. Azoles are classic tacrolimus boosters and can cause CNI toxicity."},{"t":"Voriconazole induces tacrolimus metabolism","ok":false,"fb":"It inhibits CYP3A, raising exposure."},{"t":"Trough levels are unnecessary for tacrolimus","ok":false,"fb":"Tacrolimus is NTI and requires TDM."}]},{"type":"chartHunt","kick":"Transplant med list","q":"Tap every transplant safety issue.","rows":[{"text":"Tacrolimus trough drawn after the morning dose","problem":true,"why":"Tacrolimus trough must be drawn before the dose; post-dose levels mislead dosing."},{"text":"TMP-SMX prophylaxis documented for PJP","problem":false},{"text":"Live attenuated vaccine ordered 2 months post kidney transplant","problem":true,"why":"Live vaccines are generally contraindicated after transplant immunosuppression."},{"text":"Mycophenolate given to pregnant patient without counseling","problem":true,"why":"Mycophenolate is teratogenic; pregnancy prevention/counseling is mandatory."},{"text":"Creatinine, potassium, magnesium monitored","problem":false}]},{"type":"mcq","kick":"Rejection vs infection","q":"Post-transplant patient has fever, graft dysfunction, and rising creatinine. Best pharmacist framing?","opts":[{"t":"Consider both infection and rejection; avoid reflexively increasing immunosuppression without evaluation/cultures","ok":true,"fb":"Correct. Transplant workups often balance infection risk against rejection risk."},{"t":"Always double immunosuppression immediately","ok":false,"fb":"Could worsen occult infection."},{"t":"Always stop all immunosuppression immediately","ok":false,"fb":"Could precipitate rejection."}]},{"type":"mcq","kick":"PJP prophylaxis","q":"Standard PJP prophylaxis after many solid organ transplants is usually:","opts":[{"t":"TMP-SMX if tolerated","ok":true,"fb":"Correct. TMP-SMX covers PJP and some other pathogens; alternatives exist for intolerance."},{"t":"Vancomycin","ok":false,"fb":"Vancomycin does not prevent PJP."},{"t":"Oseltamivir lifelong","ok":false,"fb":"Not PJP prophylaxis."}]},{"type":"mcq","kick":"CMV risk","q":"Highest CMV risk pairing?","opts":[{"t":"Donor CMV positive / recipient CMV negative (D+/R-)","ok":true,"fb":"Correct. D+/R- is a high-risk scenario and usually drives prophylaxis/intense monitoring."},{"t":"D-/R-","ok":false,"fb":"Lowest risk, though transfusion/community exposures still matter."},{"t":"R+ always zero risk","ok":false,"fb":"R+ can reactivate; risk is lower than D+/R- but not zero."}]},{"type":"calc","kick":"Tac dose adjustment estimate","q":"Tacrolimus trough is 16 ng/mL, goal is 8 ng/mL, current total daily dose is 6 mg/day. Rough proportional new daily dose?","given":[{"label":"Current trough","value":"16 ng/mL"},{"label":"Goal trough","value":"8 ng/mL"},{"label":"Current dose","value":"6 mg/day"}],"answer":{"value":3,"tolerance":0.5,"unit":"mg/day"},"hint":"Very rough proportional estimate: new dose = current dose × goal/current.","note":"6 × 8/16 = 3 mg/day. In practice, adjust per protocol, timing, toxicity, interacting drugs, and trend."},{"type":"sbar","kick":"Tacrolimus interaction call","q":"Build the recommendation after fluconazole is started in a tacrolimus patient.","slots":[{"key":"Situation","fragments":[{"t":"Tacrolimus patient just started fluconazole; trough and creatinine may rise.","score":2},{"t":"A new antifungal exists.","score":0}]},{"key":"Background","fragments":[{"t":"Tacrolimus is a CYP3A substrate with narrow therapeutic index.","score":2},{"t":"Tacrolimus is a vitamin.","score":0}]},{"key":"Assessment","fragments":[{"t":"High risk of CNI toxicity: nephrotoxicity, tremor, hyperkalemia, hypomagnesemia.","score":2},{"t":"No monitoring needed.","score":0}]},{"key":"Recommendation","fragments":[{"t":"Preemptively reduce/hold per protocol, check trough and renal/electrolyte labs within 2-3 days, coordinate transplant team.","score":2},{"t":"Continue unchanged for a month.","score":0}]}],"note":"Transplant SBAR should always include interacting drug, trough plan, organ function, and team ownership."}]},
{"id":"icu_sed","icon":"37","area":"R1","title":"ICU Sedation, Analgesia & Delirium","blurb":"PADIS-style pain-first sedation, RASS targets, SAT/SBT, delirium, paralytics, and ICU liberation.","brief":"<p class=\"lead\">ICU pharmacy is about keeping people alive without over-sedating them into harm.</p><table class=\"ref\"><tr><th>Principle</th><th>Translation</th></tr><tr><td>Pain-first</td><td>Treat pain before sedatives</td></tr><tr><td>Light sedation</td><td>Use a target such as RASS 0 to -2 unless deep sedation indicated</td></tr><tr><td>Delirium</td><td>Assess, prevent, remove drivers; avoid benzodiazepines when possible</td></tr></table>","cases":[{"type":"mcq","kick":"Pain-first sedation","q":"Ventilated patient grimacing, tachycardic, RASS +1, no analgesic on board. Best next step?","opts":[{"t":"Assess/treat pain first, then titrate sedative to target","ok":true,"fb":"Correct. PADIS logic is analgesia-first, not reflexive sedative escalation."},{"t":"Bolus benzodiazepine repeatedly","ok":false,"fb":"Treat pain first and avoid unnecessary benzos."},{"t":"Paralyze without sedation/analgesia","ok":false,"fb":"Paralysis without analgesia/sedation awareness protection is unsafe."}]},{"type":"mcq","kick":"Light sedation target","q":"Stable mechanically ventilated patient has no special indication for deep sedation. Best default target?","opts":[{"t":"Light sedation, e.g., RASS 0 to -2, with daily reassessment","ok":true,"fb":"Correct. Light sedation shortens ventilation and improves ICU outcomes when appropriate."},{"t":"RASS -5 for everyone","ok":false,"fb":"Deep sedation has harms and should be reserved for specific indications."},{"t":"No target needed","ok":false,"fb":"Sedation should have an explicit target."}]},{"type":"chartHunt","kick":"Delirium driver scan","q":"Tap the likely medication/system drivers of ICU delirium.","rows":[{"text":"Continuous benzodiazepine infusion without indication","problem":true,"why":"Benzodiazepines are deliriogenic and should be minimized when possible."},{"text":"Untreated pain","problem":true,"why":"Pain drives agitation and delirium; analgesia matters."},{"text":"Sleep-wake disruption with nighttime vitals/labs every hour despite stability","problem":true,"why":"Sleep disruption worsens delirium risk."},{"text":"Daily SAT/SBT assessment documented","problem":false},{"text":"Glasses/hearing aids available","problem":false}]},{"type":"mcq","kick":"Propofol monitoring","q":"High-dose propofol infusion for several days. What should the pharmacist monitor?","opts":[{"t":"Triglycerides, calories from lipid, hypotension, and rare propofol infusion syndrome risk","ok":true,"fb":"Correct. Propofol is lipid-based and has hemodynamic/metabolic toxicities."},{"t":"INR only","ok":false,"fb":"Not the key propofol monitoring parameter."},{"t":"Nothing because propofol is always benign","ok":false,"fb":"Long/high-dose propofol requires active monitoring."}]},{"type":"mcq","kick":"Dexmedetomidine niche","q":"When is dexmedetomidine especially useful?","opts":[{"t":"Light, cooperative sedation where respiratory drive preservation is helpful; monitor bradycardia/hypotension","ok":true,"fb":"Correct. Dex can facilitate extubation/light sedation but causes bradycardia/hypotension."},{"t":"Deep paralysis-level sedation alone","ok":false,"fb":"Dex is usually not enough for deep sedation needs."},{"t":"Severe bradycardia with heart block","ok":false,"fb":"That is a major caution."}]},{"type":"order","kick":"ICU liberation flow","q":"Order the daily ICU liberation medication review:","correct":["Set analgesia and sedation goals","Assess pain and RASS/CAM-ICU","Perform SAT/SBT eligibility screen","Stop deliriogenic/nonessential meds","Restart only what matches today’s goals"],"note":"Goal → assess → SAT/SBT → deprescribe → restart intentionally."}]},
{"id":"icu_hemo","icon":"38","area":"R1","title":"ICU Hemodynamics, Shock & Organ Support","blurb":"Vasopressors, septic shock, fluids, stress-dose steroids, CRRT dosing, VTE/SUP, and emergency sequences.","brief":"<p class=\"lead\">Shock cases are about sequence: fluid when helpful, norepinephrine early, source control, and dose antibiotics to organ support.</p>","cases":[{"type":"mcq","kick":"First-line pressor","q":"Septic shock after fluids, MAP remains low. First-line vasopressor?","opts":[{"t":"Norepinephrine","ok":true,"fb":"Correct. Norepinephrine is first-line for septic shock."},{"t":"Dopamine for everyone","ok":false,"fb":"Dopamine has more arrhythmia risk and is not first-line broadly."},{"t":"Phenylephrine first-line for all septic shock","ok":false,"fb":"Phenylephrine is not the standard first-line choice."}]},{"type":"mcq","kick":"Balanced crystalloids","q":"Initial fluid in sepsis resuscitation?","opts":[{"t":"Crystalloids first; balanced crystalloids are often preferred over normal saline","ok":true,"fb":"Correct. SSC supports crystalloids first and suggests balanced crystalloids rather than saline."},{"t":"Hydroxyethyl starch","ok":false,"fb":"Starches are avoided due to harm."},{"t":"Albumin as the only first-line fluid for everyone","ok":false,"fb":"Albumin may be considered after large crystalloid volumes, not routine first-line only."}]},{"type":"code","kick":"Septic shock sequence","q":"The ICU team calls: hypotension, lactate high, suspected infection. Move through the sequence.","seconds":45,"steps":[{"prompt":"First medication priority?","options":[{"t":"Broad empiric antimicrobials after cultures if this does not delay therapy","correct":true},{"t":"Wait for final cultures","fb":"Do not wait for final cultures in septic shock."},{"t":"Only acetaminophen","fb":"Fever control is not source treatment."}]},{"prompt":"MAP remains <65 after initial fluid. Pressor?","options":[{"t":"Norepinephrine","correct":true},{"t":"Oral midodrine as sole agent","fb":"Not appropriate for acute septic shock as sole pressor."},{"t":"No pressor until 24 hours","fb":"Delayed hemodynamic support is unsafe."}]},{"prompt":"Cultures identify susceptible E. coli, patient improving. Stewardship move?","options":[{"t":"De-escalate and define duration/source control plan","correct":true},{"t":"Keep all broad agents forever","fb":"Daily de-escalation is a core stewardship move."},{"t":"Stop all antibiotics immediately","fb":"Need a targeted course, not abrupt stop without plan."}]}],"note":"Sepsis sequence: early empiric therapy, hemodynamic support, source control, daily de-escalation."},{"type":"mcq","kick":"Stress-dose steroids","q":"Septic shock still requiring escalating vasopressors despite fluids and norepinephrine. Steroid role?","opts":[{"t":"Consider hydrocortisone for refractory septic shock per ICU protocol","ok":true,"fb":"Correct. Steroids are considered when shock remains vasopressor-dependent despite resuscitation."},{"t":"Never use steroids in shock","ok":false,"fb":"There is a role in refractory septic shock."},{"t":"Use chronic high-dose dexamethasone for every septic patient","ok":false,"fb":"Steroids are not automatic for all sepsis."}]},{"type":"chartHunt","kick":"CRRT antibiotic review","q":"Tap the ICU dosing problems.","rows":[{"text":"Meropenem ordered standard low renal dose after CRRT started at high effluent rate","problem":true,"why":"CRRT can clear beta-lactams substantially; underdosing is common. Dose to CRRT intensity and severity."},{"text":"Vancomycin AUC/levels planned after CRRT change","problem":false},{"text":"Piperacillin-tazobactam maintenance prolonged infusion considered after loading dose","problem":false},{"text":"Aminoglycoside continued daily without levels in unstable renal function","problem":true,"why":"Aminoglycosides need level-guided dosing, especially with changing renal replacement."}]},{"type":"sbar","kick":"Vasopressin add-on","q":"Build a recommendation when norepinephrine dose is climbing in septic shock.","slots":[{"key":"Situation","fragments":[{"t":"Septic shock patient remains MAP <65 on rising norepinephrine after adequate fluid assessment.","score":2},{"t":"Patient is in ICU.","score":0}]},{"key":"Background","fragments":[{"t":"Source control underway; lactate elevated; central access and arterial monitoring present.","score":2},{"t":"They are sick.","score":0}]},{"key":"Assessment","fragments":[{"t":"Catecholamine dose is escalating; adjunct vasopressin may reduce norepinephrine requirement.","score":2},{"t":"Need to stop all pressors.","score":0}]},{"key":"Recommendation","fragments":[{"t":"Add vasopressin per protocol while continuing norepinephrine titration and perfusion monitoring.","score":2},{"t":"Switch to oral agent now.","score":0}]}],"note":"Pressor SBAR should state MAP goal, current dose trend, perfusion, source control, and monitoring."}]},
{"id":"id_syndrome","icon":"39","area":"R1","title":"ID Syndromes: Pneumonia, UTI, Bacteremia, Meningitis","blurb":"Syndrome-based empiric coverage, de-escalation, duration, source control, and culture interpretation.","brief":"<p class=\"lead\">ID pharmacists think by syndrome, severity, resistance risk, source control, and narrowing.</p>","cases":[{"type":"mcq","kick":"HAP/VAP duration","q":"Patient with VAP improves, cultures susceptible, source controlled. Typical treatment duration?","opts":[{"t":"About 7 days for most HAP/VAP when improving and source controlled","ok":true,"fb":"Correct. ATS/IDSA recommends short-course therapy for most HAP/VAP plus de-escalation."},{"t":"Always 28 days","ok":false,"fb":"Long courses increase harm and resistance without routine benefit."},{"t":"One dose only","ok":false,"fb":"Too short for VAP."}]},{"type":"mcq","kick":"Meningitis empiric therapy","q":"Older adult with suspected bacterial meningitis. Which empiric concept is key?","opts":[{"t":"Ceftriaxone/cefotaxime + vancomycin, plus ampicillin for Listeria risk","ok":true,"fb":"Correct. Older adults/immunocompromised need Listeria coverage with ampicillin."},{"t":"Nitrofurantoin","ok":false,"fb":"Nitrofurantoin does not treat meningitis."},{"t":"Oral azithromycin only","ok":false,"fb":"Inadequate CNS coverage."}]},{"type":"chartHunt","kick":"Positive blood culture review","q":"Tap the true bloodstream infection concerns.","rows":[{"text":"Staphylococcus aureus in 1 of 2 blood culture sets","problem":true,"why":"S. aureus in blood is never dismissed as contaminant; evaluate source, repeat cultures, echo as appropriate."},{"text":"Coagulase-negative staph in 1 bottle, no line, clinically well","problem":false},{"text":"Candida in blood culture","problem":true,"why":"Candidemia requires treatment, source evaluation, line consideration, eye exam per local protocol."},{"text":"Gram-negative rod bacteremia with no source control plan","problem":true,"why":"Source control and targeted therapy/duration are core."}]},{"type":"mcq","kick":"Asymptomatic bacteriuria","q":"Elderly patient has positive urine culture but no urinary symptoms or systemic signs. Best action?","opts":[{"t":"Do not treat asymptomatic bacteriuria unless special indication such as pregnancy or urologic procedure","ok":true,"fb":"Correct. Treating asymptomatic bacteriuria is a major stewardship miss."},{"t":"Treat every positive urine culture","ok":false,"fb":"Culture positivity alone is not infection."},{"t":"Give carbapenem for all urine cultures","ok":false,"fb":"Overly broad and usually unnecessary."}]},{"type":"sbar","kick":"De-escalation call","q":"Build a stewardship recommendation after cultures return MSSA from pneumonia isolate.","slots":[{"key":"Situation","fragments":[{"t":"VAP culture grew MSSA; patient improving on vancomycin plus cefepime.","score":2},{"t":"Culture exists.","score":0}]},{"key":"Background","fragments":[{"t":"No Pseudomonas or MRSA isolated; renal function worsening.","score":2},{"t":"Antibiotics are broad.","score":0}]},{"key":"Assessment","fragments":[{"t":"Current regimen is broader than needed and nephrotoxicity risk is rising.","score":2},{"t":"Broad is always better.","score":0}]},{"key":"Recommendation","fragments":[{"t":"De-escalate to targeted anti-MSSA beta-lactam and define total duration if clinical response continues.","score":2},{"t":"Continue vancomycin indefinitely.","score":0}]}],"note":"A stewardship recommendation is stronger when it gives the target drug and duration logic."},{"type":"journal","kick":"Noninferiority ID trial","q":"A new oral step-down trial is presented. Appraise it.","abstract":"Randomized noninferiority trial: stable gram-negative bacteremia after source control, oral step-down vs continued IV therapy. Noninferiority margin 10%. Primary failure 8% oral vs 7% IV. Excluded endocarditis, CNS infection, and uncontrolled sources.","flaws":[{"text":"Noninferiority margin must be clinically acceptable","isFlaw":true,"why":"A wide margin can make a worse therapy look acceptable."},{"text":"Excluded uncontrolled sources and endocarditis/CNS infection","isFlaw":true,"why":"External validity is limited to stable, source-controlled patients."},{"text":"Randomized design","isFlaw":false,"why":"Randomization is a strength."},{"text":"Oral arm failure 1% absolute higher","isFlaw":false,"why":"That alone may be acceptable if within margin; the flaw is whether margin/population apply."}],"nnt":{"stem":"Failure 8% oral vs 7% IV. Absolute risk difference?","options":[{"t":"1% higher failure with oral","correct":true,"fb":"Correct. 8%-7%=1% absolute difference."},{"t":"10% higher failure","fb":"10% is the margin, not the observed difference."},{"t":"50% lower failure","fb":"No; oral failure is slightly higher."}]},"note":"ID trials often hinge on source control, exclusions, margin, and whether the patient matches the trial."}]},
{"id":"id_resist","icon":"40","area":"R1","title":"Resistant Pathogens & Stewardship Edge Cases","blurb":"ESBL, AmpC, CRE, MRSA, VRE, Candida, source control, allergy delabeling, and IV-to-PO conversion.","brief":"<p class=\"lead\">Resistant-ID pharmacy is choosing the narrowest effective regimen that still wins.</p>","cases":[{"type":"mcq","kick":"ESBL bacteremia","q":"ESBL E. coli bacteremia from pyelonephritis, patient septic. Preferred definitive backbone?","opts":[{"t":"Carbapenem such as meropenem/ertapenem depending severity/source","ok":true,"fb":"Correct. Serious ESBL bloodstream infections generally favor carbapenem therapy."},{"t":"Ceftriaxone despite resistance","ok":false,"fb":"If resistant/ESBL bloodstream infection, ceftriaxone is inappropriate."},{"t":"Oral nitrofurantoin for bacteremia","ok":false,"fb":"Nitrofurantoin does not treat bacteremia."}]},{"type":"mcq","kick":"AmpC risk","q":"Enterobacter cloacae bloodstream isolate initially ceftriaxone susceptible. Concern?","opts":[{"t":"Inducible AmpC resistance; avoid ceftriaxone for serious infection, consider cefepime/carbapenem per susceptibility/severity","ok":true,"fb":"Correct. AmpC organisms can develop resistance during therapy."},{"t":"No concern ever","ok":false,"fb":"AmpC induction is a classic stewardship edge case."},{"t":"Always use vancomycin","ok":false,"fb":"Vancomycin has no gram-negative activity."}]},{"type":"chartHunt","kick":"Stewardship audit","q":"Tap every stewardship problem.","rows":[{"text":"Piperacillin-tazobactam continued 10 days after cultures show MSSA only","problem":true,"why":"Narrow to targeted MSSA therapy and define duration."},{"text":"Vancomycin trough/AUC monitoring planned for serious MRSA infection","problem":false},{"text":"Patient labeled penicillin allergic from childhood nausea; no delabeling assessment","problem":true,"why":"Non-allergic intolerance labels drive unnecessary broad therapy; assess/delabel when appropriate."},{"text":"IV levofloxacin continued despite patient tolerating PO and high oral bioavailability","problem":true,"why":"IV-to-PO conversion is a stewardship win when absorption is reliable."},{"text":"Source control consult placed for abscess","problem":false}]},{"type":"mcq","kick":"Candidemia","q":"Candida grows in blood culture. Best initial concept?","opts":[{"t":"Treat as true infection, start echinocandin initially in many hospitalized patients, repeat cultures/source evaluation","ok":true,"fb":"Correct. Candidemia is never dismissed as contaminant."},{"t":"Ignore as skin contaminant","ok":false,"fb":"Candida in blood is clinically significant."},{"t":"Oral nystatin only","ok":false,"fb":"Nystatin is not systemic candidemia therapy."}]},{"type":"order","kick":"Antibiotic timeout","q":"Order the 48-72 hour antibiotic timeout:","correct":["Review diagnosis and clinical response","Review cultures and susceptibilities","Confirm source control","Narrow spectrum / convert IV-to-PO when appropriate","Set duration and monitoring plan"],"note":"Antibiotic timeouts convert empiric chaos into targeted therapy."},{"type":"mcq","kick":"Daptomycin monitoring","q":"Daptomycin for VRE bacteremia. Key monitoring?","opts":[{"t":"Baseline and at least weekly CK; watch myopathy and statin interaction risk","ok":true,"fb":"Correct. Daptomycin requires CK monitoring, especially with myopathy risk."},{"t":"Amylase only","ok":false,"fb":"CK is the key safety lab."},{"t":"Use for pneumonia","ok":false,"fb":"Daptomycin is inactivated by surfactant and should not treat pneumonia."}]}]},
{"id":"amb_core","icon":"41","area":"R2","title":"Ambulatory Care Core: Diabetes, HTN, Lipids, CKD","blurb":"Chronic disease pharmacotherapy, adherence, home monitoring, labs, preventive care, and patient-centered goals.","brief":"<p class=\"lead\">Amb care pharmacists turn guidelines into plans patients can actually follow.</p><table class=\"ref\"><tr><th>Domain</th><th>Move</th></tr><tr><td>Diabetes</td><td>Individualized A1c, GLP-1/SGLT2 for ASCVD/HF/CKD when appropriate</td></tr><tr><td>HTN</td><td>Home BP technique, lifestyle, two first-line agents for many stage 2 patients</td></tr><tr><td>Lipids</td><td>ASCVD risk, statin intensity, adherence and side effects</td></tr></table>","cases":[{"type":"mcq","kick":"Diabetes with CKD/HF","q":"T2DM with CKD and heart failure, A1c above goal. Which drug class often has organ-protection priority if eGFR allows?","opts":[{"t":"SGLT2 inhibitor","ok":true,"fb":"Correct. SGLT2 inhibitors are key for CKD/HF benefit beyond glucose lowering, if eGFR/contraindications allow."},{"t":"Sulfonylurea only because cheapest","ok":false,"fb":"Cost matters, but CKD/HF benefit should be considered."},{"t":"Sliding-scale insulin only outpatient","ok":false,"fb":"Sliding-scale-only outpatient therapy is poor chronic care."}]},{"type":"mcq","kick":"GLP-1 counseling","q":"Starting semaglutide. Best counseling?","opts":[{"t":"Titrate slowly, expect GI effects, eat smaller meals, know pancreatitis/gallbladder red flags","ok":true,"fb":"Correct. Counseling improves persistence and safety."},{"t":"Double dose if nausea occurs","ok":false,"fb":"Nausea usually calls for slower titration/supportive measures, not dose doubling."},{"t":"No monitoring or counseling needed","ok":false,"fb":"Education is central."}]},{"type":"calc","kick":"ASCVD adherence math","q":"Patient misses 2 doses/week of daily statin. Approximate adherence percentage over 7 days?","given":[{"label":"Taken","value":"5 doses/week"},{"label":"Prescribed","value":"7 doses/week"}],"answer":{"value":71,"tolerance":3,"unit":"%"},"hint":"5 divided by 7 times 100.","note":"5/7 × 100 ≈ 71%. Adherence conversation beats simply escalating therapy."},{"type":"chartHunt","kick":"Amb care medication review","q":"Tap every ambulatory care issue.","rows":[{"text":"BP readings from wrist cuff over clothing, no rest period","problem":true,"why":"Bad technique can cause pseudo-uncontrolled hypertension."},{"text":"ACE inhibitor plus potassium supplement, K 5.6","problem":true,"why":"Hyperkalemia risk needs action."},{"text":"Statin intolerance documented as muscle pain with no rechallenge/alternate plan","problem":true,"why":"Many patients can tolerate alternate statin/dosing; document and problem-solve."},{"text":"Patient brings home BP log with dates/times","problem":false},{"text":"Annual urine albumin/creatinine ordered for diabetes","problem":false}]},{"type":"sbar","kick":"Hypertension intensification","q":"Build an amb care recommendation for uncontrolled stage 2 hypertension.","slots":[{"key":"Situation","fragments":[{"t":"Home BP average is 158/94 despite lifestyle work and amlodipine 5 mg daily.","score":2},{"t":"BP is kind of high.","score":0}]},{"key":"Background","fragments":[{"t":"Technique verified; no orthostasis; BMP normal; adherence confirmed.","score":2},{"t":"Patient has blood pressure.","score":0}]},{"key":"Assessment","fragments":[{"t":"Confirmed uncontrolled stage 2 HTN; needs intensification with a complementary first-line class.","score":2},{"t":"Probably white coat only.","score":0}]},{"key":"Recommendation","fragments":[{"t":"Add losartan or thiazide-like diuretic per profile, check BMP in 1-2 weeks, continue home BP log.","score":2},{"t":"Wait a year.","score":0}]}],"note":"Amb care SBAR includes home data quality, adherence, labs, med choice, and follow-up."},{"type":"mcq","kick":"Severe asymptomatic HTN","q":"Clinic BP 186/112, no chest pain, neuro deficits, pulmonary edema, or AKI symptoms. Best approach?","opts":[{"t":"Assess for target-organ damage; if none, intensify/restart oral meds and arrange close follow-up rather than rapid IV lowering","ok":true,"fb":"Correct. Severe asymptomatic hypertension is usually managed outpatient with oral therapy and follow-up."},{"t":"Give IV antihypertensive to normalize within minutes","ok":false,"fb":"Rapid lowering without emergency can harm."},{"t":"Ignore completely","ok":false,"fb":"Needs timely oral management and follow-up."}]}]},
{"id":"amb_resp_anticoag","icon":"42","area":"R2","title":"Ambulatory Respiratory & Anticoagulation Care","blurb":"Asthma controller/reliever logic, COPD inhalers, warfarin/DOAC management, peri-procedure holds, adherence.","brief":"<p class=\"lead\">Ambulatory pharmacists catch technique, access, interactions, and monitoring gaps that guidelines assume are solved.</p>","cases":[{"type":"mcq","kick":"Asthma reliever safety","q":"Adult with asthma uses albuterol-only therapy and refills 5 canisters/year. Best pharmacist concern?","opts":[{"t":"SABA overuse and no ICS-containing therapy increases exacerbation risk; step toward ICS-containing regimen","ok":true,"fb":"Correct. GINA recommends against SABA-only asthma treatment in adults/adolescents."},{"t":"Albuterol-only is always preferred","ok":false,"fb":"SABA-only treatment is no longer preferred due to risk."},{"t":"Stop all inhalers permanently","ok":false,"fb":"Need controller/reliever optimization, not abandonment."}]},{"type":"chartHunt","kick":"Inhaler technique audit","q":"Tap every inhaler-care issue.","rows":[{"text":"Patient actuates MDI before inhaling and exhales into inhaler","problem":true,"why":"Poor coordination reduces lung delivery."},{"text":"No spacer despite coordination difficulty","problem":true,"why":"Spacer can improve MDI delivery."},{"text":"Rinses mouth after inhaled corticosteroid","problem":false},{"text":"Uses dry powder inhaler with weak inspiratory flow","problem":true,"why":"DPIs require adequate inspiratory flow; switch device if needed."},{"text":"Has written asthma action plan","problem":false}]},{"type":"mcq","kick":"Warfarin high INR","q":"INR 5.5, no bleeding, on warfarin for AF. General approach?","opts":[{"t":"Hold warfarin and monitor; vitamin K depends on bleeding/risk/protocol","ok":true,"fb":"Correct. No-bleed supratherapeutic INR is usually hold/monitor, not automatic PCC."},{"t":"Give PCC to everyone","ok":false,"fb":"PCC is for serious/life-threatening bleeding or ur let STUDY={cards:[],idx:0,flipped:false,filter:'all'};
function stripHTML(s){ const d=document.createElement('div'); d.innerHTML=String(s||''); return String(d.textContent||d.innerText||'').replace(/\s+/g,' ').trim(); }
function escTSV(s){ return String(s||'').replace(/\t/g,' ').replace(/\r?\n/g,'<br>').replace(/\s{2,}/g,' ').trim(); }
function cardId(parts){ return parts.join('::').toLowerCase().replace(/[^a-z0-9:_-]+/g,'-').slice(0,160); }
function loadCardState(){ try{return JSON.parse(localStorage.getItem('clinicalPathCards')||'{}')}catch{return{}} }
function saveCardState(st){ localStorage.setItem('clinicalPathCards',JSON.stringify(st)); }
function answerText(c){
  if(c.type==='mcq') return (c.opts||[]).filter(o=>o.ok).map(o=>o.t+' — '+(o.fb||'')).join(' | ') || 'Review the explanation.';
  if(c.type==='calc') return (c.answer?('Answer: '+c.answer.value+' '+(c.answer.unit||'')): '') + (c.note?'<br>'+c.note:'');
  if(c.type==='order') return 'Order: '+(c.correct||[]).join(' → ')+(c.note?'<br>'+c.note:'');
  if(c.type==='chartHunt') return (c.rows||[]).filter(r=>r.problem).map(r=>stripHTML(r.text)+' — '+(r.why||'')).join('<br>')+(c.note?'<br>'+c.note:'');
  if(c.type==='sbar') return (c.slots||[]).map(sl=>'<b>'+sl.key+':</b> '+((sl.fragments||[]).sort((a,b)=>(b.score||0)-(a.score||0))[0]?.t||'')).join('<br>')+(c.note?'<br>'+c.note:'');
  if(c.type==='code') return (c.steps||[]).map((st,i)=>'<b>Step '+(i+1)+':</b> '+((st.options||[]).find(o=>o.correct)?.t||'')).join('<br>')+(c.note?'<br>'+c.note:'');
  if(c.type==='journal') return (c.flaws||[]).filter(f=>f.isFlaw).map(f=>f.text+' — '+(f.why||'')).join('<br>')+'<br>'+(c.nnt?.options||[]).filter(o=>o.correct).map(o=>o.t+' — '+o.fb).join('');
  return c.note||'Review this case.';
}
function buildStudyCards(){
  const st=loadCardState(); const cards=[];
  MODULES.forEach(m=>{
    (TEACH[m.id]||[]).forEach((line,i)=>cards.push({id:cardId([m.id,'teach',i]),kind:'Teaching',module:m.title,moduleId:m.id,area:m.area,type:'teach',front:m.title+' teaching point #'+(i+1),back:line,tags:[m.area,m.id,'teach']}));
    (m.cases||[]).forEach((c,i)=>{
      cards.push({id:cardId([m.id,'case',i]),kind:'Case',module:m.title,moduleId:m.id,area:m.area,type:c.type||'mcq',front:(c.kick?c.kick+': ':'')+stripHTML(c.q),back:answerText(c),tags:[m.area,m.id,c.type||'mcq','case']});
      if(c.type==='mcq') (c.opts||[]).forEach((o,j)=>{ if(o.ok||o.fb) cards.push({id:cardId([m.id,'mcqopt',i,j]),kind:'Why',module:m.title,moduleId:m.id,area:m.area,type:'why',front:'Why is this '+(o.ok?'correct':'wrong')+'? '+stripHTML(o.t),back:o.fb||'Review the rationale.',tags:[m.area,m.id,'rationale']}); });
    });
  });
  return cards.map(c=>Object.assign({box:st[c.id]?.box||1,due:st[c.id]?.due||0,seen:st[c.id]?.seen||0},c));
}
function dueCards(){ const now=Date.now(); return STUDY.cards.filter(c=>STUDY.filter==='all'||c.moduleId===STUDY.filter).filter(c=>!c.due||c.due<=now); }
function filteredCards(){ return STUDY.cards.filter(c=>STUDY.filter==='all'||c.moduleId===STUDY.filter); }
function showStudyCards(filter){ STUDY.cards=buildStudyCards(); STUDY.filter=filter||STUDY.filter||'all'; STUDY.idx=0; STUDY.flipped=false; renderStudyCards(); }
function renderStudyCards(){
  const pool=dueCards(); const all=filteredCards(); const c=pool[STUDY.idx%Math.max(pool.length,1)]; const mods=MODULES;
  document.getElementById('app').innerHTML=`
    <div class="stage scene-photo bg-core" id="stage" style="background-image:url('${bgFor('core')}')">${sceneDeco()}</div><div class="fx" id="fx2"></div>
    <div class="center-layer" style="justify-content:center;padding:4vh 18px"><div class="study-panel">
      <div class="study-head"><div><h2>Study Cards</h2><div class="study-sub">Auto-generated from ${MODULES.length} modules · ${STUDY.cards.length} cards · local spaced review</div></div>
        <div class="study-actions"><button class="btn ghost sm" onclick="goHub()">Back to rotations</button><button class="btn ghost sm" onclick="exportStudyCardsTSV()">Export TSV</button><button class="btn ghost sm" onclick="exportQuizletTXT()">Export Quizlet</button><button class="btn ghost sm" onclick="resetCardProgress()">Reset progress</button></div></div>
      <div class="study-grid"><div>${c?cardHTML(c):'<div class="flash-empty">No due cards in this filter. Use Export TSV, switch filters, or reset progress.</div>'}</div><div class="study-side">
        <div class="study-stat"><div class="statbox"><b>${pool.length}</b><span>Due</span></div><div class="statbox"><b>${all.length}</b><span>Filtered</span></div><div class="statbox"><b>${STUDY.cards.length}</b><span>Total</span></div><div class="statbox"><b>${Math.round((STUDY.cards.filter(x=>x.seen).length/Math.max(STUDY.cards.length,1))*100)}%</b><span>Seen</span></div></div>
        <div class="due-note">Generated from teaching lines, cases, rationales, SBAR/order sequences, calculation answers, and journal-club appraisal points.</div>
        <div class="filter-list"><button class="${STUDY.filter==='all'?'on':''}" onclick="showStudyCards('all')">All</button>${mods.slice(-24).map(m=>`<button class="${STUDY.filter===m.id?'on':''}" onclick="showStudyCards('${m.id}')">${m.icon} ${m.title.split(':')[0].slice(0,18)}</button>`).join('')}</div>
        <div class="card-list">${all.slice(0,90).map(x=>`<div class="card-mini ${c&&x.id===c.id?'on':''}" onclick="jumpCard('${x.id}')"><b>${x.kind}</b> · ${x.module}<br>${stripHTML(x.front).slice(0,80)}</div>`).join('')}</div>
      </div></div></div></div>`;
}
function cardHTML(c){ return `<div class="flash-card" onclick="flipCard()"><div><div class="flash-kicker"><span class="tag area">${c.area}</span><span class="tag type">${c.type}</span><span class="tag">${c.module}</span><span class="tag">box ${c.box}</span></div><div class="flash-face">${STUDY.flipped?'Back':'Front'}</div><div class="${STUDY.flipped?'flash-a':'flash-q'}">${STUDY.flipped?c.back:c.front}</div><div class="flash-hint">Click card to flip</div></div>${STUDY.flipped?`<div class="review-buttons" onclick="event.stopPropagation()"><button class="btn ghost" onclick="gradeCard('again')">Again</button><button class="btn mint" onclick="gradeCard('good')">Good</button><button class="btn" onclick="gradeCard('easy')">Easy</button></div>`:`<div class="review-buttons" onclick="event.stopPropagation()"><button class="btn mint" onclick="flipCard()">Show answer</button><button class="btn ghost" onclick="nextCard()">Skip</button></div>`}</div>`; }
function flipCard(){ STUDY.flipped=!STUDY.flipped; renderStudyCards(); }
function nextCard(){ const pool=dueCards(); STUDY.idx=(STUDY.idx+1)%Math.max(pool.length,1); STUDY.flipped=false; renderStudyCards(); }
function jumpCard(id){ const pool=dueCards(); const i=pool.findIndex(c=>c.id===id); STUDY.idx=i>=0?i:0; STUDY.flipped=false; renderStudyCards(); }
function gradeCard(g){ const pool=dueCards(); const c=pool[STUDY.idx%Math.max(pool.length,1)]; if(!c)return; const st=loadCardState(); const now=Date.now(); const box=g==='again'?1:Math.min((c.box||1)+(g==='easy'?2:1),7); const mins=g==='again'?10:Math.pow(2,box-1)*60*(g==='easy'?2:1); st[c.id]={box,due:now+mins*60000,seen:(c.seen||0)+1,last:g}; saveCardState(st); STUDY.cards=buildStudyCards(); STUDY.flipped=false; renderStudyCards(); }
function resetCardProgress(){ if(confirm('Reset local study-card progress?')){ localStorage.removeItem('clinicalPathCards'); showStudyCards(STUDY.filter); } }
function exportStudyCardsTSV(){ const cards=buildStudyCards(); const rows=['Front\tBack\tTags'].concat(cards.map(c=>[escTSV(stripHTML(c.front)),escTSV(stripHTML(c.back)),escTSV(c.tags.join(' '))].join('\t'))); const blob=new Blob([rows.join('\n')],{type:'text/tab-separated-values;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='clinical-path-pgy1-study-cards.tsv'; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},500); }


function escQuizlet(s){ return stripHTML(String(s||'')).replace(/\t/g,' ').replace(/\r?\n/g,' ').replace(/\s{2,}/g,' ').trim(); }
function exportQuizletTXT(){
  const cards=buildStudyCards();
  const rows=cards.map(c=>escQuizlet(c.front)+'\t'+escQuizlet(c.back));
  const blob=new Blob([rows.join('\n')],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='clinical-path-pgy1-quizlet-import.txt';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},500);
}
